name: Update Persecutio
on:
  schedule:
    - cron: '0 6 1,15 * *'
  workflow_dispatch: {}

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: python3 -m pip install --upgrade pip pyyaml requests beautifulsoup4
      - run: python3 scripts/collect_data.py
      - run: python3 scripts/generate_website_data.py
      - run: python3 -m py_compile scripts/collect_data.py scripts/generate_website_data.py
      - run: |
          test -s data/countries.yml
          test -s assets/data/geojson.json
          test -s assets/data/search.json
          test -s countries/geojson.json
          test -s countries/search.json
          COUNTRY_COUNT=$(ls countries/*.html | wc -l)
          GEOJSON_FEATURES=$(python3 -c "import json; print(len(json.load(open('assets/data/geojson.json'))['features']))")
          if [ "$COUNTRY_COUNT" != "$GEOJSON_FEATURES" ]; then
            echo "Country page count '$COUNTRY_COUNT' does not match geojson feature count '$GEOJSON_FEATURES'"
            exit 1
          fi
          for page in countries/*.html; do
            if ! grep -q 'Historical Background' "$page"; then
              echo "Missing Historical Background in $page"
              exit 1
            fi
            if ! grep -q 'Modern-Day Situation' "$page"; then
              echo "Missing Modern-Day Situation in $page"
              exit 1
            fi
            if ! grep -q 'All References</h2>' "$page"; then
              echo "Missing All References section in $page"
              exit 1
            fi
            if ! grep -q 'href="http' "$page"; then
              echo "Missing source links in $page"
              exit 1
            fi
          done
      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v4
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
      - run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: update persecution data and site [skip ci]"
            git push origin HEAD:main
          fi
