name: Update Persecutio
on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch: {}

concurrency:
  group: update-persecutio
  cancel-in-progress: true

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  update:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: python3 -m pip install --upgrade pip -r requirements.txt
      - name: Fetch external data sources
        id: fetch
        run: |
          FAIL=0
          # Primary sources — failures abort the job before generate/deploy
          python3 scripts/fetch_opendoors.py || FAIL=1
          python3 scripts/fetch_freedom_house.py || FAIL=1
          python3 scripts/fetch_owid.py || FAIL=1
          python3 scripts/fetch_gdelt.py || FAIL=1
          python3 scripts/fetch_uscirf.py || FAIL=1
          python3 scripts/fetch_state_dept.py || FAIL=1

          # Secondary / flaky sources — enrich when available; never abort deploy
          python3 scripts/fetch_ohchr.py || true
          python3 scripts/fetch_morningstarnews.py || true
          python3 scripts/fetch_vid.py || true
          python3 scripts/fetch_gcr_stats.py || true
          python3 scripts/fetch_acn.py || true
          python3 scripts/fetch_csw.py || true
          python3 scripts/fetch_icc.py || true
          python3 scripts/fetch_forum18.py || true
          python3 scripts/fetch_mec.py || true
          python3 scripts/fetch_bitterwinter.py || true
          python3 scripts/fetch_releaseintl.py || true

          # Gate on primary status JSON only
          python3 - <<'PY'
          import json, sys
          from pathlib import Path
          PRIMARY = {
              "opendoors", "freedomhouse", "owid", "gdelt",
              "uscirf", "statedepartment",
          }
          failed = []
          for p in sorted(Path("data/fetched").glob("*_status.json")):
              try:
                  s = json.loads(p.read_text(encoding="utf-8"))
              except Exception as e:
                  name = p.stem.replace("_status", "")
                  if name in PRIMARY:
                      failed.append(f"{p.name}: corrupt ({type(e).__name__})")
                  continue
              name = s.get("name") or p.stem.replace("_status", "")
              if name in PRIMARY and s.get("status") == "failed":
                  failed.append(f"{name}: {s.get('message') or 'failed'}")
          if failed:
              print("Failed primary sources:")
              for f in failed:
                  print(f"  - {f}")
              sys.exit(1)
          print("Primary source status files ok or partial/cached")
          PY
          STATUS_FAIL=$?
          if [ "$STATUS_FAIL" -ne 0 ]; then
            FAIL=1
          fi

          echo "fetch_failed=$FAIL" >> "$GITHUB_OUTPUT"
          if [ "$FAIL" -ne 0 ]; then
            echo "::error::One or more primary data source fetches failed — aborting before generate/deploy"
            exit 1
          fi
      - run: python3 scripts/collect_data.py
      - run: python3 scripts/generate_website_data.py
      - run: python3 -m py_compile scripts/collect_data.py scripts/generate_website_data.py scripts/fetch_common.py scripts/fetch_*.py tests/*.py
      - run: python3 -m pytest tests
      - run: |
          test -s data/countries.yml
          test -s data/sources.yml
          test -s assets/data/geojson.json
          test -s assets/data/search.json
          test -s assets/data/meta.json
          COUNTRY_COUNT=$(ls countries/*.html | wc -l)
          GEOJSON_FEATURES=$(python3 -c "import json; print(len(json.load(open('assets/data/geojson.json'))['features']))")
          if [ "$COUNTRY_COUNT" != "$GEOJSON_FEATURES" ]; then
            echo "Country page count '$COUNTRY_COUNT' does not match geojson feature count '$GEOJSON_FEATURES'"
            exit 1
          fi
          for page in countries/*.html; do
            if ! grep -q 'Historical Background' "$page"; then
              echo "Missing Historical Background in $page"
              exit 1
            fi
            if ! grep -q 'Modern-Day Situation' "$page"; then
              echo "Missing Modern-Day Situation in $page"
              exit 1
            fi
            if ! grep -q 'All References</h2>' "$page"; then
              echo "Missing All References section in $page"
              exit 1
            fi
            if ! grep -q 'href="http' "$page"; then
              echo "Missing source links in $page"
              exit 1
            fi
            if grep -q 'href="/persecutio/index.html">Map</a> · <a href="/persecutio/about.html">About</a>' "$page"; then
              echo "Footer navigation still present in $page"
              exit 1
            fi
          done
      - name: Commit and push updates
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add \
            data/countries.yml \
            data/sources.yml \
            assets/data/ \
            countries/ \
            index.html \
            about.html \
            assets/css/ \
            assets/js/ \
            assets/img/ || true
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: update persecution data and site [skip ci]"
            git push origin HEAD:main
          fi
      - name: Stage public site for Pages
        run: |
          mkdir -p _site
          cp index.html about.html LICENSE _site/
          cp -R countries assets _site/
          # Do not publish scrape caches, scripts, tests, or local backups
          find _site/assets -name '*.bak-*' -delete 2>/dev/null || true
          rm -rf _site/assets/data/fetched 2>/dev/null || true
      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v4
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
