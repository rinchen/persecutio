    wiki_url: https://en.wikipedia.org/wiki/Mexico
    wiki_extract: Mexico, officially the United Mexican States, is a country in North America. It is the
      northernmost country in Latin America, bordering the United States of America to the north and Guatemala
      and Belize to the southeast, while having maritime boundaries with the Pacific Ocean to the west,
      the Caribbean Sea to the southeast, and the Gulf of Mexico to the east. Mexico covers 1,972,550 km2,
      and is the thirteenth-largest country in the world by land area. With a population exceeding 134
      million as of 2026, Mexico is the tenth-most populous country in the world and is home to the largest
      number of native Spanish speakers. Mexico City is the capital and largest city in Mexico, which
      ranks among the most populous metropolitan areas in the world.
