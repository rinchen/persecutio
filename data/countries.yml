    wiki_url: https://en.wikipedia.org/wiki/Malaysia
    wiki_extract: 'Malaysia is a country in Southeast Asia. A federal constitutional monarchy, it consists
      of 13 states and three federal territories, separated by the South China Sea into two regions: Peninsular
      Malaysia on Mainland Southeast Asia and East Malaysia on the island of Borneo. Peninsular Malaysia
      shares land and maritime borders with Thailand, as well as maritime borders with Singapore, Vietnam,
      and Indonesia; East Malaysia shares land borders with Brunei and Indonesia, and maritime borders
      with the Philippines and Vietnam. Kuala Lumpur is the country''s national capital, largest city,
      and the seat of the legislative branch of the federal government, while Putrajaya is the federal
      administrative capital, representing the seat of both the executive branch and the judicial branch
      of the federal government. With a population of over 34 million, it is the world''s 43rd-most populous
      country.'
