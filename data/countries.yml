    archive_od_brief: The government puts heavy pressure on all 'deviating' groups by tightening existing
      laws and by enforcing them strictly. Indigenous Christians with a Muslim background bear the brunt
      of rights violations both at the hands of the state and from family, frie nds and community. Russian
      Orthodox churches experience the least problems from the government as they do not usually attempt
