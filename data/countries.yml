  modern: Apostasy from Islam carries the death penalty under Mauritanian law. Christian converts live
    in extreme secrecy. No churches are permitted, and any Christian activity is closely monitored by
    authorities. Mauritania is staunchly Islamic and the restrictive environment makes it very difficult
    for Christians (and impossible for converts from Islam) to openly meet and conduct services for collective
    worship. Any expression of faith by non-Mauritanian Christians (e.g., migrants from Sub-Saharan Africa
    or aid- workers) also carries the risk of being understood as attempted proselytization of Muslims
    and can lead to… The constitution defines the country as an Islamic republic and designates Islam
    as the sole religion of the citizenry and state. The law prohibits blasphemy and apostasy and defines
    them as crimes punishable by death; however, the government has never applied the death penalty for
    these crimes.
  historical: Mauritania has been exclusively Muslim since its founding. Christian presence has always
    been minimal, limited to a handful of foreign workers and secret converts. government estimates the
    total population at 4.2 million (midyear 2023). According to Mauritanian government estimates, Sunni
    Muslims constitute approximately 99 percent of the population. Unofficial estimates indicate Sunni
    Muslims are approximately 98 percent of the population, Shia Muslims 1 percent, and non-Muslims, mostly
    Christians and a small group of Jews, a further 1 percent.
