    state_dept_executive_summary: The 1987 constitution provides for the free exercise of all religions.
      Any religious group seeking official recognition must obtain it through a multistep registration
      process with the Bureau of Worship (BOW), a unit within the Ministry of Foreign Affairs. The government
      has a special relationship with the Roman Catholic Church originating from a concordat between the
      government and the Holy See that affords the Catholic Church certain privileges. The concordat also
      accords the government the right of consent over the appointment of Catholic archbishops and bishops,
      although the government has not exercised this right in recent years. While religious leaders representing
      Catholic, Protestant, evangelical Christian, Muslim, Vodou, and Jewish communities said the government
      did not restrict their religious freedom during the year, many religious leaders said the government’s
      failure to maintain security and order hampered their communities’ abilities to practice their religions
      freely. In April, the local news site Vant Bef Info published an editorial condemning what it called
      government complicity in the country’s continuing insecurity and economic downturn, which editors
      said prevented citizens from celebrating Easter traditions. In March, the Archdiocese of Port-au-Prince
      called on authorities to protect worshippers and places of worship after armed men broke into a
      church during Mass, kidnapping several worshippers and leaving numerous others with serious injuries.
      In September, the Catholic Haitian Conference of Religious denounced the “indifference of political
      leaders” in the face of “an abandoned people… seeking nothing more than to live in dignity and peace.”
      A Catholic priest working in Port-au-Prince’s Cite Soleil neighborhood said he believed continuing
      gang violence across the capital was a “serious impediment” to the free practice of all religions,
      “not just for Catholics or Christians.”
