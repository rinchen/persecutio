      as per the law of the country but without upholding the right of conscientious objection. This intensified
      during the war in northern Ethiopia where Eritrea allegedly fought on the side of the Ethiopian
      government against the Tigray People's Liberation Front (TPLF). Both recognized and unregistered
      Christian denominations face serious problems in accessing community resources, especially social
      services provided by the state authorities. Christians from non- traditional church groups face
      the harshest violations of the ir rights both from the government and from the Eritrean Orthodox
      Church (EOC). The government has refused to register or recognize any religious groups except the
      Eritrean Orthodox, Catholic and Lutheran churches, and Islam. Converts from a Muslim background
