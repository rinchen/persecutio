- title: Sudan
  slug: sudan
  iso3: SDN
  status: warning
  persecution_level: Moderate
  lat: 12.86
  lng: 30.21
  modern: Post-Bashiri transition eased some restrictions, but violence in the Nuba Mountains and Blue
    Nile and periodic militia threats still imperil Christian communities, schools, and churches. It was
    believed that the downfall of the al-Bashir regime in April 2019 would lead to an improvement of the
    situation of Christians. Initially, that seemed very likely; the intended reforms by the civilian
    Transitional Council could have opened up politica l and civil space in the country, leading to more
    freedom for Christians. The 2019 constitutional declaration includes several provisions protecting
    the right to freedom of religious belief and worship “in accordance with the requirements of the law
    and public order.” As stipulated in the declaration, existing laws and institutions governing religion
    are to remain in effect while the government works to amend and restructure them.
  historical: Christianity in Sudan traces back to ancient Nubian kingdoms and continued under centuries
    of Islamic sultanates. Late-20th-century missionary activity expanded churches in the south and among
    displaced communities.
