- title: Somalia
  slug: somalia
  iso3: SOM
  status: severe
  persecution_level: Extreme
  lat: 5.15
  lng: 46.19
  modern: Al-Shabaab executes or violently expels suspected Christians. The weak federal
    government cannot protect religious minorities. Foreign Christian aid workers
    face surveillance, threats, and expulsion for religious activity, and no church
    buildings are operational.
  historical: Byzantine and Ethiopian trade linked early coastal Christian communities
    to wider Christian networks. European Catholic and Anglican missions grew in the
    late 19th and early 20th centuries, then were expelled or closed under Siad Barre's
    secular socialist rule after 1969. Civil war destroyed remaining institutions
    in the 1990s.
  sources:
