      faith originate from four different backgrounds, namely from Muslim, Hindu, Buddhist and ethnic/tribal
      background. All, however, face restrictions, discrimination and attacks. They often gather in small
      house churches or secret groups due to fear of attack. Churches which are active in sharing the
      faith, particularly those working among the Muslim majority, face the most persecution, but even
      historical church communities like the Roman Catholic Church are increasingly experiencing attacks
      and death-threats. Tribal Christians, like the Santal or the Bawm, face an increasing double vulnerability
      (belonging to both an ethnic and religious minority) and struggle with land-grabbing issues and
