- title: Laos
  slug: laos
  iso3: LAO
  status: restricted
  persecution_level: High
  lat: 19.85
  lng: 102.49
  modern: The Lao state oversees all religious activity, restricting church construction,
    religious education and training, and material imports. Protestant and Catholic
    groups face local harassment and surveillance; some Christians remain imprisoned,
    especially in remote villages.
  historical: Catholic missionaries arrived in the 17th century; French colonial rule
    expanded Protestant and Catholic presence. After 1975, the communist government
    restricted religious life to state-sanctioned bodies and drove many churches underground.
