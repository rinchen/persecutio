    state_dept_executive_summary: According to the 1992 Basic Law of Governance, the country’s official
      religion is Islam, and the constitution is the Quran and Sunna (traditions and practices based on
      the life of the Prophet Muhammad). The legal system is based largely on sharia as interpreted by
      the Hanbali school of Sunni Islamic jurisprudence. Freedom of religion is not provided for under
      the law. The law criminalizes “anyone who challenges, either directly or indirectly, the religion
      or justice of the King or Crown Prince.” The law prohibits “the promotion of atheistic ideologies
      in any form,” “any attempt to cast doubt on the fundamentals of Islam,” publications that “contradict
      the provisions of Islamic law,” and other acts, including non-Islamic public worship, public display
      of non-Islamic religious symbols, conversion by a Muslim to another religion, and proselytizing
      by a non-Muslim. During the year, authorities continued to prosecute Shia citizens at a rate disproportionate
      with the percentage of Shia present in the overall population. As many as 66 individuals, including
      56 Shia individuals, faced the possibility of execution, according to a December report by the Berlin-based
      European Saudi Organization for Human Rights (ESOHR). Some Shia were sentenced to death for crimes
      that were nonviolent in nature, and in some cases, persons were sentenced to death for crimes allegedly
      committed while under the age of 18. Local Shia activists and international human rights groups
      questioned the competence, independence, and impartiality of the judiciary and said that the underlying
      charges were inconsistent with human rights, including exercise of the freedoms of peaceful assembly,
      expression, and association. The government also continued – but indefinitely postponed – the prosecution
      of a number of academics, members of the media, and Islamic clerics for alleged membership in the
      Muslim Brotherhood, which the government designated a terrorist organization in 2014.
