- title: Sri Lanka
  slug: sri-lanka
  iso3: LKA
  status: warning
  persecution_level: Moderate/High
  lat: 7.87
  lng: 80.77
  modern: Buddhist nationalist groups attack churches and Christian converts. Anti-conversion
    laws are proposed or enforced in some areas. Church construction faces opposition,
    and pastors receive threats.
  historical: Catholicism arrived with Portuguese colonization in the 16th century.
    Dutch and British rule added Protestant missions. Post-independence Buddhist nationalism
    has periodically targeted Christian minorities.
