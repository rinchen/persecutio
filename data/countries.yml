    wiki_extract: Venezuela, officially the Bolivarian Republic of Venezuela, is a country on the northern
      coast of South America, consisting of a continental landmass and various islands and islets in the
      Caribbean Sea. It comprises an area of 912,050 km2 (352,140 sq mi), with a population estimated
      at 31.8 million in 2025. The capital and largest urban agglomeration is Caracas. The continental
      territory is bordered on the north by the Caribbean Sea and the Atlantic Ocean, on the west by Colombia,
      on the south by Brazil, on the east by Guyana, and on the northeast by Trinidad and Tobago.
