    uscirf_key_findings:
    - The government in Eritrea systematically persecutes individuals for their faith and only permits
      four recognized religions to register. The government continues to imprison hundreds of Christians
      and dozens of Jehovah's Witnesses, many of whom face violence – including torture – and harsh prison
      conditions without access to adequate health care. Government officers apprehend religious conscientious
      objectors and hold them in military camps indefinitely where they endure various punishments.
    uscirf_url: https://www.uscirf.gov/countries/eritrea
    state_dept_url: https://www.state.gov/reports/2023-report-on-international-religious-freedom/eritrea/
    state_dept_executive_summary: 'The law and unimplemented constitution prohibit religiously motivated
      discrimination and provide for freedom of thought, conscience, and belief, as well as the freedom
      to practice any religion. The government recognizes four officially registered religious groups:
      the Eritrean Orthodox Tewahedo Church, Sunni Islam, the Catholic Church, and the Evangelical Lutheran
      Church of Eritrea. During the year, the government again arrested individuals based on religion.
      The Christian nongovernmental organization (NGO) Release International reported the arrest of 177
      members of unregistered Christian groups between January and April as they gathered in private homes
      to worship or record worship music. The NGO said the detainees were held in Mai Serwa Prison. Pastor
      Tesfay Seyoum, founder and leader of Meserete Kristos Church, died of a brain hemorrhage during
      the year while he was detained in Mai Serwa. In July, the Christian NGO Voice of the Martyrs Canada
      reported that two pastors remained in detention without charges since 2004. There was no information
      on the conditions under which these detainees were being held, or on the charges against them, if
      any. NGOs said that in the past, authorities kept some Christian detainees in shipping containers
      and beat and tortured them to try to force them to renounce their faith. The government released
      22 Christian detainees between March and July, including some who had been in prison for more than
      nine years, according to international NGOs. The government provided no information about the charges
      against the detainees or why they were released. The government also released 300 Muslims from prison
      in July. These were mostly students who were arrested after protesting government efforts to regulate
      their school in 2017. Release International estimated that even factoring the number of prisoners
      freed during the year, there were more than 500 Christians in detention at year’s end.'
