    uscirf_key_findings:
    - Religious freedom conditions in Malaysia are poor amid a troubling rise in religious polarization
      and restrictions. The country’s dual legal system of Shari’a and civil courts privilege Islamic
      law, according to the Shaf’i school of Sunni jurisprudence. The legal system further limits dissenting
      interpretations of its principles through fatwas, legal action, and intrusive monitoring. The state
      discriminates against Muslim groups that it views as representing “deviant” versions of Islam.
    uscirf_url: https://www.uscirf.gov/countries/malaysia
    state_dept_url: https://www.state.gov/reports/2023-report-on-international-religious-freedom/malaysia/
    state_dept_executive_summary: The constitution states, “Islam is the religion of the Federation; but
      other religions may be practiced in peace and harmony.” Federal and state governments have the power
      to mandate doctrine for Muslims and promote Sunni Islam above all other religious groups. The government
      continued to maintain restrictions on religious assembly and practices by Islamic religious groups
      that were not Sunni. Sedition laws criminalize speech that “promotes ill will, hostility, or hatred
      on the grounds of religion.” The government maintains a parallel legal system with certain civil
      matters for Muslims covered by sharia. The relationship between sharia and civil law remains unresolved
      in the legal system, with state governments having responsibility for sharia. Most citizens are
      Muslim, with Buddhism, Christianity, and Hinduism as the other major religions practiced. The government
      continued to arrest individuals during the year for blasphemy. The Royal Malaysia Police (RMP) said
      its 3R (race, religion, and royalty) task force, which was formed in March, opened 61 investigations,
      and that police had arrested at least 12 individuals as of July. The government continued to take
      action against some individuals who diverged from the official interpretation of Islam, including
      subjecting some to “rehabilitation” in centers that taught and enforced government-approved Islamic
      practice. Police investigations into the “enforced disappearances” in 2016 of a social activist
      accused of spreading Shia teachings, and in 2017 of a Christian pastor, remained ongoing. The courts
      ordered a limited release of a 2019 government report on the Human Rights Commission of Malaysia
      (SUHAKAM) investigation of the Shia Muslim social activist s disappearance to his wife, but the
      government appealed the decision and obtained an order from the court to block release of the report.
    state_dept_christian_mentions: true
