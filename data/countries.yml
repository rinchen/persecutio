    state_dept_executive_summary: The constitution prohibits religious discrimination and stipulates there
      shall be no state religion. It provides for freedom of belief, the right to practice and promote
      any religion, and the right to belong to and participate in the practices of any religious organization
      in a manner consistent with the constitution. The government requires religious groups to register.
      The Computer Misuse Amendment Act criminalizes as hate speech forms of expression that “ridicule,
      degrade, or demean” individuals based on their religion. In June, security agents forced their way
      into the residence of Muslim cleric Sheikh Yunus Kamoga, whom they accused of “unlawfully detaining
      over 40 individuals for purposes of religious indoctrination.” The agents assaulted and arrested
      at least 45 persons during the raid. Kamoga stated the arrested individuals were receiving religious
      training and decried the violence against his followers; police later took disciplinary action against
      the officers involved in the incident, and the Minister of Internal Security criticized police for
      “profiling” members of the Muslim community as terrorists. In February, police in Butaleja District
      arrested nine Muslims due to their alleged association with the extremist Allied Democratic Forces
      (ADF, aka ISIS-DRC or ISIS-Central Africa) group. In 2021, the State Department designated the ADF
      as a foreign terrorist organization. Police said the arrested individuals included the spouses and
      relatives of alleged ADF members, although the arrested individuals and community members denied
      the linkage.
