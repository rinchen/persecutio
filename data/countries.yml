    archive_od_brief: Omani citizens who convert to Christianity are put under pressure from the government,
      family and society to recant their faith. They can be expelled from the family home and from their
      jobs and face problems over child custody and inheritance. Expatriate Muslims converting to Christianity
      experience similar pressure as in their home countries, as they are often living within their own
      national or ethnic communities. Expatriate Christian communities are tolerated, but their facilities
      are restricted and Christian meetings are monitored to record any political statements and if any
      Omani nationals are attending. All religious organizations must be registered with the authorities.
    archive_od_url: https://www.opendoors.org/persecution/reports/Oman-Full_Country_Dossier-ODI-2025.pdf
    state_dept_executive_summary: The Basic Law declares Islam to be the state religion and declares sharia
      is the basis for legislation. It protects the right of individuals to practice other religions as
      long as doing so does not “disrupt public order or contradict morals.” According to the law, offending
      Islam or any other Abrahamic religion is a criminal offense. There is no provision of the law specifically
      addressing apostasy, conversion, or renunciation of religious belief. Proselytizing in public is
      illegal. All religious organizations must register with the government. In August, an appeals court
      heard the case of four individuals charged in 2021 with using the Internet and social media to denigrate
      Islamic values. The court took up the case although one of the four – Maryam al-Nuami – had been
      pardoned by the Sultan and released in April. Her pardon amounted to a commutation of her sentence
      and did not shield her from subsequent prosecution on other charges. The court in August sentenced
      al-Nuami for a variety of related misdemeanors, but those charges were dismissed on appeal in December.
      The Ministry of Endowments and Religious Affairs (MERA) formally approved registration for The Church
      of Jesus Christ of Latter-day Saints (Church of Jesus Christ) and the Sikh community and identified
      suitable, permanent places of worship for both groups. Some non-Muslim groups stated they were able
      to worship freely in private homes and government-approved houses of worship while others said MERA
      worked with them to coordinate the use of shared facilities for religious services. MERA continued
      to monitor sermons and distribute approved texts for all imams. One Christian nongovernmental organization
      (NGO) said that the government monitored church services to record any political statements and
      Omani nationals. The NGO also said the online activities of both individual Christians and churches
      could be monitored by the authorities.
