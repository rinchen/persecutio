- title: Egypt
  slug: egypt
  iso3: EGY
  status: severe
  persecution_level: Very High
  lat: 26.82
  lng: 30.01
  modern: Egyptian Christians, especially Coptic Orthodox and evangelical communities,
    face sectarian violence, discrimination in church licensing, and periodic suicide
    bombings and shootings by jihadist groups.
  historical: Egypt is the cradle of early monastic Christianity. Coptic tradition
    traces its origins to St. Mark; centuries of Islamic rule brought fluctuating
    protection, persecution, and coexistence before modern nationalist changes.
