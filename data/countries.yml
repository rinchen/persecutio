    archive_od_brief: 'Christianity in Iran is divided between constitutionally recognized and unrecognized
      Christians: • Recognized: The recognized historical communities of Armenian and Assyrian Christians
      are protected by the state but are treated as second-class citizens with the civil code containing
      many discriminatory legal provisions against non-Muslims. In addition, they are not allowed to worship
      in Persian, have contact with Christians of a Muslim background (speaking Persian) or have them
      attend church services. Christians from these historical communities that have supported converts,
      have received prison sentences. • Unrecognized: The unrecognized converts from Islam to Christianity
      bear the brunt of religious freedom violations, carried out by the government in particular and
      to a lesser extent by society and the converts'' families. The government sees these Iranian Christians
      as an attempt by Western countries to undermine Islam and the Islamic regime of Iran. Both leaders
      and ordinary members of Christian convert groups have been arrested, prosecuted and have received
      long prison sentences for ‘crimes against national security’.'
