- title: Algeria
  slug: algeria
  iso3: DZA
  status: warning
  persecution_level: Moderate
  lat: 28.03
  lng: 1.66
  modern: Authorities have closed Protestant churches, detained Christian leaders,
    and pressured house churches under restrictive worship laws. Evangelical Christians
    especially report fear of arrest and surveillance.
  historical: Christianity survived in North Africa through late antiquity, then receded
    after Arab conquest and Ottoman rule. Modern Catholic and Protestant missions
    expanded in colonial Algeria before post-independence restrictions limited organized
    Christian presence.
