    state_dept_executive_summary: The constitution provides for freedom of religion and the right to profess
      one’s religious beliefs. It prohibits discrimination based on religion. The Ministry of Interior
      (MOI) is responsible for formally recognizing churches, religious denominations, religious federations
      and confederations, and associations of religious ministers. During the year, the government enacted
      two new laws relating to religious freedom. On June 6, President Gustavo Petro signed Decree 922
      of 2023, granting eight additional religious groups authority to engage in activities such as marriages,
      funeral services, and spiritual assistance in public and private institutions. In May, the President
      signed Law 2294 of 2023 adopting the 2022-26 National Development Plan. The law created the National
      System of Freedom of Religion, Worship and Conscience; Social Dialogue; Total Peace; Equality and
      Nonstigmatization (SINALIBREC), which directs national and territorial government entities, coordinated
      by the MOI, to implement public policies advancing religious freedom, worship and conscience and
      strengthen the capacities of religious organizations. The Directorate of Religious Affairs (DRA)
      created the Interreligious Humanitarian Network to respond to humanitarian crises and also created
      the Interreligious Rural Network to strengthen the MOI’s institutional relationship with religious
      organizations to maintain peace and freedom of religion and belief in rural conflict areas. President
      Petro posted on social media numerous times following the Hamas October 7 terrorist attack on Israel,
      comparing the Israeli response to the Nazi regime. The Confederation of Jewish Communities of Colombia
      (CJCC) denounced the postings. The Attorney General’s Office (AGO) reported that nonstate actors
      killed four religious leaders during the year, compared with three in 2022. In addition, the office
      investigated two cases of forced displacement of religious leaders in Putumayo and an unknown location.
    state_dept_christian_mentions: true
    archive_modern_excerpt: Efforts to achieve peace in the country have been undermined by the persistent
      conflict between criminal groups and government forces. The promises made by President Gustavo Petro's
      administration (in office since August 2022) have yet to materialize, as c riminal groups continue
      to maintain territorial control over large parts of the country, and violence remains pervasive.
      The constitution provides for freedom of religion and the right to profess one’s religious beliefs.
      It prohibits discrimination based on religion. The Ministry of Interior (MOI) is responsible for
      formally recognizing churches, religious denominations, religious federations and confederations,
      and associations of religious ministers.
    archive_historical_excerpt: government estimates the total population at 49.3 million (midyear 2023).
      According to a 2023 survey by the NGO Latinobarometer, 64 percent of the population is Roman Catholic,
      17 percent Protestant, 2 percent atheist or agnostic, and 14 percent practices no religion. Groups
      that together constitute less than 2 percent of the population include nondenominational worshipers,
      Jews, Muslims,…
    archive_od_brief: 'Efforts to achieve peace in the country have been undermined by the persistent
      conflict between criminal groups and government forces. The promises made by President Gustavo Petro''s
      administration (in office since August 2022) have yet to materialize, as c riminal groups continue
      to maintain territorial control over large parts of the country, and violence remains pervasive.
      Temporary ceasefires have proven ineffective, as they have failed to include all armed groups (which
      continued their violent activities). Additionally, there is insufficient protection for stakeholders
      supporting peace processes, and previously signed peace agreements have not been effectively implemented.
      This is the context, in which church leaders continue to be threatened, harassed, extorted, and
      even murdered by non-state actors (such as guerrillas and other criminal groups), especially in
      rural and other neglected areas. In most cases, this violence was the direct result of Christians
      being involved in such activities as: • Speaking publicly about the ongoing corruption and violence;
      • Working in defense of human and environmental rights; • Working among youth; • Assisting in the
      country''s peace-process;'
