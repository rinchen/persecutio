    state_dept_executive_summary: The 2008 constitution was drafted by a previous military regime and,
      according to the SAC, remains in force following the military coup. The constitution guarantees
      every citizen “the right to freely profess and practice religion subject to public order, morality,
      or health and to the other provisions of this constitution.” The constitution prohibits speech or
      acts insulting or defaming any religion or religious beliefs. As was the case in previous years,
      it was sometimes difficult to categorize incidents as being based solely on religious identity due
      to the close linkage between religion and ethnicity. During the year, there were reports of threats,
      detentions, and violence targeting minority religious and ethnoreligious groups. Radio Free Asia
      (RFA) reported that in January, regime forces bombed Lu Thaw Township’s Laywa village in Kayin State,
      hitting a church and killing five persons, including a child, a Baptist pastor, and a Roman Catholic
      bishop. According to the International Commission of Jurists (ICJ), from February 2021 to April
      2023, the regime established military camps on at least 110 religious properties in as many as 12
      states and regions, using these properties as interrogation and detention centers and the occupants
      as human shields. ICJ reported authorities arrested some monks when they refused to allow regime
      forces to set up military bases in their monastic compounds. According to the Assistance Association
      for Political Prisoners (AAPP), a human rights organization based in Thailand and Burma, as of December
      31, the military regime had detained a total of 144 religious leaders, including 123 Buddhist monks
      and 20 Christian leaders and clerics, for participating in protests since the 2021 coup. Regime
      authorities detained 14 of the 123 Buddhist monks during the year. The regime also detained one
      Muslim leader.
