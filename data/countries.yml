    archive_od_url: https://www.opendoors.org/persecution/reports/Uzbekistan-Full_Country_Dossier-ODI-2025.pdf
    state_dept_executive_summary: An April revision to the constitution defines the country as a “secular
      state.” The constitution establishes a separation between the state and religious organizations
      and bars the interference of the state in the activities of religious organizations. The law on
      liberty of conscience and religious organizations provides for the right of citizens to choose their
      faith or not to profess a faith, and it bars coercion and proselytization and missionary work. The
      law forbids coercing minors to be involved in religious organizations against their or their parents’
      will. It forbids the use of religion to overthrow or undermine the state, infringe on the rights
      of others, incite hatred, or encroach on “the health and morals of citizens.” The law prohibits
      the creation of religiously based political parties as well as including religious materials in
      the public-school curriculum. Unlike in previous years, the government provided no data on prisoners
      held for alleged religious extremism crimes or for belonging to religious fundamentalist organizations.
      Local media outlets reported at least five individuals whom courts sentenced to either prison or
      house arrest due to their online religious activities. In May, a court sentenced Jakhongir Ulugmuradov,
      a student at Tashkent State University of Economics, to three years in prison for sending a religious
      song to his classmates. According to a BBC report, the mother of Sardor Rahmonkulov – who was sentenced
      to five years in prison in January for downloading and sharing a banned religious song but was alleged
      by the government to belong to a terrorist group – said her son was tortured in pretrial detention
      by members of the Tashkent Region police department to coerce him to confess to participating in
      extremist activities. In March, Rahmonkulov’s punishment was changed to conditional judgment, and
      he was released.
