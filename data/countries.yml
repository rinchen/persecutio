  modern: Al-Shabaab executes or violently expels suspected Christians. The weak federal government cannot
    protect religious minorities. Foreign Christian aid workers face surveillance, threats, and expulsion
    for religious activity, and no church buildings are operational. Somalia is one of the most hostile
    nations for Christians and Christianity. Christians in the country find themselves in an exceedingly
    precarious situation, marked by multiple layers of threats. Despite suffering military setbacks and
    facing rebellion from some clans, al -Shabaab remains a potent force, controlling large swathes of
    the country. The provisional federal constitution (PFC) provides for the right of individuals to practice
    their religion, makes Islam the state religion, prohibits the propagation of any religion other than
    Islam, and stipulates all laws must comply with the general principles of sharia.
  historical: Byzantine and Ethiopian trade linked early coastal Christian communities to wider Christian
    networks. European Catholic and Anglican missions grew in the late 19th and early 20th centuries,
    then were expelled or closed under Siad Barre's secular socialist rule after 1969. Civil war destroyed
    remaining institutions in the 1990s.
