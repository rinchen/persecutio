    wiki_url: https://en.wikipedia.org/wiki/India
    wiki_extract: India, officially the Republic of India, is a country in South Asia. It is the seventh-largest
      country by area, the most populous country in the world and, since its independence in 1947, the
      world's most populous democracy. Bounded by the Indian Ocean on the south, the Arabian Sea on the
      southwest, and the Bay of Bengal on the southeast, it shares land borders with Pakistan to the west;
      China, Nepal and Bhutan to the north; Bangladesh and Myanmar to the east. In the Indian Ocean, India
      is near Sri Lanka and the Maldives. Its Andaman and Nicobar Islands share a maritime border with
      Myanmar, Thailand and Indonesia.
