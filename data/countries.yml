    christian_population: 8170016
    christian_percentage: 8.33
    uscirf_designation: CPC
    uscirf_key_findings:
    - Religious freedom in Vietnam remains poor as the government regulates and controls
      religious affairs through state-sponsored organizations. Authorities routinely
      detain, arrest, imprison, and torture religious freedom advocates and members
      of unrecognized religious groups that seek to operate independent of state control.
      Various independent religious groups such as Cao Dai, Hoa Hao Buddhists, Khmer
      Krom Buddhists, and Hmong and Montagnard Christians continue to suffer under
      this persecution.
    uscirf_url: https://www.uscirf.gov/countries/vietnam
    state_dept_url: https://www.state.gov/reports/2023-report-on-international-religious-freedom/vietnam/
    state_dept_executive_summary: 'The constitution states that all individuals have
      the right to freedom of belief and religion. The law provides for significant
      government control over religious practices and includes vague provisions that
      permit restrictions on religious freedom in the stated interest of national
      security and social unity and enable local officials to make arbitrary decisions
      on registration and recognition of new religious groups or places of worship.
      The Law on Belief and Religion (LBR) maintains a multistage registration and
      recognition process for religious groups requiring such decisions at each stage. '
    state_dept_christian_mentions: true
- title: Yemen
  slug: yemen
  iso3: YEM
  status: severe
  persecution_level: Extreme
  lat: 15.55
  lng: 48.51
  modern: Civil war and Houthi authority have made Yemen unsafe for organized Christianity.
    Suspected converts face death or expulsion, foreign religious workers are expelled,
    and humanitarian aid access may be restricted when religious affiliation is discovered.
  historical: Ancient southern Arabian Christianity declined after the rise of Islam;
    the Himyarite kingdom saw a brief Christian period in the 5th-6th centuries. Ottoman
    and British colonial contact renewed small Catholic and Protestant communities
    that later contracted during 20th-century conflicts.
