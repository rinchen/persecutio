  modern: The government controls all recognized religious communities and effectively banned unregistered
    evangelical churches in 2002. Hundreds of unregistered Christians remain detained without charge,
    and children are interrogated about home worship. Military conscription is enforced under harsh conditions
    and can affect religious practice.
