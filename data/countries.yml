  modern: Converts from Islam to Christianity face imprisonment, surveillance, and
    coerced re-education. House churches are raided and leaders sentenced to long
    prison terms. Armenian and Assyrian communities retain limited state recognition
    but still face pressure over property transfer and educational rights.
  historical: Assyrian Christianity in Persia dates to the 1st century, with Armenian
    communities from the 4th century onward. After the 1979 Islamic Revolution, evangelistic
    institutions closed while officially recognized minorities kept restricted rights;
    apostasy charges grew in the 2000s.
