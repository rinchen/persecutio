    wiki_url: https://en.wikipedia.org/wiki/Colombia
    wiki_extract: Colombia, officially the Republic of Colombia, is a country located in South America,
      with insular regions in North America. Colombia's mainland is bordered by the Caribbean Sea to the
      north, Venezuela to the east, Brazil to the southeast, Peru and Ecuador to the south and southwest,
      the Pacific Ocean to the west, and Panama to the northwest. Colombia is divided into 32 departments.
      The Capital District of Bogotá is the country's largest city hosting the main financial and cultural
      hub. Other urban areas include Medellín, Cali, Barranquilla, Cartagena, Bucaramanga, Pereira, Santa
      Marta, Cúcuta, Ibagué, Villavicencio and Manizales. It covers an area of 1,141,748 square kilometers
      and has a population of around 52 million. Its rich cultural heritage—including language, religion,
      cuisine, and art—reflects its history as a colony, fusing cultural elements brought by immigration
      from Europe and the Middle East, with those brought by the African diaspora, as well as with those
      of Indigenous civilizations that predate colonization. Spanish is the official language, although
      Creole, English and 64 other languages are recognized regionally.
