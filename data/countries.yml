    wiki_url: https://en.wikipedia.org/wiki/Indonesia
    wiki_extract: Indonesia, officially the Republic of Indonesia, is a country in Southeast Asia and
      Oceania, between the Indian and Pacific oceans. Comprising about 17,000 islands, including Sumatra,
      Java, Sulawesi, and parts of Borneo and New Guinea, Indonesia is the world's largest archipelagic
      state and the 14th-largest country by area, at 1,904,569 square kilometres. Indonesia has significant
      areas of wilderness that support one of the world's highest levels of biodiversity. It shares land
      borders with Papua New Guinea, Timor-Leste, and Malaysia, as well as maritime borders with seven
      other countries, including Australia, Singapore, and the Philippines.
