    archive_od_brief: A recurrent problem for Christians who are open about their faith relates to Article
      220 of the Penal Code which criminalizes 'shaking the faith of a Muslim'. This puts many Christians,
      both Moroccan and foreign, who talk to others about their faith at risk of criminal prosecution
      and arrest. Advoc ates for the rights of Christians are being monitored by the government for their
      activities. While the law only punishes proselytization, Moroccan converts to Christianity can be
      punished in other ways, for instance by losing inheritance rights and custody of children. While
      some judges might on occasions even side with the convert, family pressure regularly forces Moroccan
      converts to be separated from their families.
    archive_od_url: https://www.opendoors.org/persecution/reports/Morocco-Full_Country_Dossier-ODI-2025.pdf
    state_dept_executive_summary: According to the constitution, Islam is the religion of the state, and
      the state guarantees freedom of thought, expression, and assembly. The constitution also says the
      state guarantees everyone the freedom to “practice their religious affairs.” The constitution states
      the King holds the title “Commander of the Faithful” and that he is the protector of Islam and the
      guarantor of the freedom of individuals “to practice their religious affairs” in the country. The
      constitution prohibits political parties founded on religion as well as political parties, parliamentarians,
      and constitutional amendments from denigrating or infringing on Islam. The law penalizes the use
      of enticements to convert a Muslim to another religion and prohibits criticism of Islam. It criminalizes
      acts and speech “undermining the Islamic religion.” Although the law allows registration of religious
      groups as associations, some minority religious groups reported the government delayed or rejected
      their registration requests. The Ministry of Endowments and Islamic Affairs (MEIA) continued to
      guide and monitor the content of sermons in mosques, Islamic religious education, and the dissemination
      of Islamic religious material by broadcast media – actions it said were intended to combat violent
      extremism. The government restricted the distribution of non-Islamic religious materials as well
      as Islamic materials it deemed inconsistent with the Maliki school of Sunni Islam. In February,
      the government extradited Shia Muslim Hassan al-Rabea, a Saudi citizen, to Saudi Arabia. Twenty-three
      human rights organizations, including Human Rights Watch (HRW) and Amnesty International, raised
      concerns in their joint statement to the Head of Government regarding al-Rabea’s treatment in Saudi
      Arabia because of his religion. In August, the Oued-Zem Court of First Instance (trial court) sentenced
      blogger Fatima Karim to two years in prison and fined her 50,000 dirhams ($5,000) for insulting
      Islam.
