- title: Iraq
  slug: iraq
  iso3: IRQ
  status: severe
  persecution_level: Very High
  lat: 33.22
  lng: 43.67
  modern: The 2014-2017 ISIS advance devastated Assyrian, Chaldean, and Armenian communities
    in Mosul and the Nineveh Plains. Many remain displaced. Returning Christians face
    militia pressure, land disputes, and fragile security. Church bombings and threats
    still recur.
  historical: Mesopotamia is the cradle of Eastern Christianity, with communities
    dating to the 1st-2nd centuries. These communities thrived under the Abbasids,
    endured Timurid and Mongol raids, and continued under the Ottoman millet system,
    only to face existential threat in the 21st century from jihadist violence and
    mass displacement.
  sources:
