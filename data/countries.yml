- title: Mexico
  slug: mexico
  iso3: MEX
  status: warning
  persecution_level: Moderate
  lat: 23.63
  lng: -102.55
  modern: Organized crime and local power disputes drive much anti-Christian violence.
    Priests have been kidnapped and killed, churches burned or extorted, and indigenous
    Catholic communities displaced in Chiapas, Michoacan, and Guerrero. Clergy defending
    migrants are also at risk.
  historical: Catholicism shaped colonial New Spain for three centuries. After independence,
    Mexico enacted restrictive constitutions and fought the Cristero War (1926-1929),
    which killed thousands. Religious freedom was restored through late-20th-century
    legal reforms.
  sources:
