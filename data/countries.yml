- title: Yemen
  slug: yemen
  iso3: YEM
  status: severe
  persecution_level: Extreme
  lat: 15.55
  lng: 48.51
  modern: Civil war and Houthi authority have made Yemen unsafe for organized Christianity.
    Suspected converts face death or expulsion, foreign religious workers are expelled,
    and humanitarian aid access may be restricted when religious affiliation is discovered.
  historical: Ancient southern Arabian Christianity declined after the rise of Islam;
    the Himyarite kingdom saw a brief Christian period in the 5th-6th centuries. Ottoman
    and British colonial contact renewed small Catholic and Protestant communities
    that later contracted during 20th-century conflicts.
