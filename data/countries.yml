- title: Haiti
  slug: haiti
  iso3: HTI
  status: persecution
  persecution_level: High
  lat: 18.97
  lng: -72.28
  modern: Gang violence and kidnapping target clergy, church workers, and congregations,
    while humanitarian collapse hampers worship, education, and relief. Priests and
    religious sisters have been abducted or killed.
  historical: Catholicism arrived with French colonization, followed by Protestant
    and independent missions. Haitian Vodou blended African and Catholic elements,
    while 20th and 21st-century instability undermined church life and safety.
