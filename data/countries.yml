- title: Zimbabwe
  slug: zimbabwe
  iso3: ZWE
  status: open
  persecution_level: Low
  lat: -19.01
  lng: 29.15
  modern: Christians generally worship freely in Zimbabwe, but occasional threats
    and land disputes target apostolic and marginalized groups, and some churches
    face pressure when leaders speak out on political issues.
  historical: Protestant and Catholic missions expanded education and health services
    during the colonial era, while post-independence politics sometimes clashed with
    outspoken bishops and missions aligned with labor and rights movements.
