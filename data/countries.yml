    archive_od_url: https://www.opendoors.org/persecution/reports/Cameroon-Full_Country_Dossier-ODI-2025.pdf
    state_dept_executive_summary: The constitution establishes the state as secular, prohibits religious
      harassment, and provides for freedom of religion and worship. According to media reports and religious
      leaders, a significant portion of abuses involving religious freedom continued to occur in the predominantly
      English-speaking Northwest and Southwest Regions (NOSO), where violence associated with a separatist
      crisis continued. Because religion, ethnicity, and political ideology are closely linked, it was
      often difficult to determine whether incidents were predominantly motivated by religion. In January,
      security forces killed a member of a secret society as he and colleagues performed traditional rituals
      during a memorial service in Bambui, Northwest Region. In July, security forces looking for separatists
      burned down the Mejang village palace, considered sacred in Northwest Region, killing the traditional
      ruler’s mother. Both incidents sparked widespread outrage. Religious leaders expressed frustration
      with the government’s long-running failure to register new religious groups and said many requests
      were pending, some for a decade or longer. The U.S.-designated foreign terrorist organizations Boko
      Haram and ISIS-West Africa (ISIS-WA) continued to launch violent attacks against local communities,
      disrupt church activities, and cause Christians to live in fear in the Far North Region. The overall
      number of terrorist incidents increased during the year, following a decrease the year prior. In
      August, ISIS-WA terrorists killed eight fishermen on the island of Darak in Lake Chad, where the
      limited presence of security and government authorities allowed them to establish a base from which
      to carry out attacks against those who oppose their ideology, including Christians. In June, during
      the feast of Eid al-Adha, ISIS-WA terrorists kidnapped 13 individuals, including women and children,
      in Mordas in the Far North Region and took them to their base in the Lake Chad Basin.
