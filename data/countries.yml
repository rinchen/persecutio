    state_dept_executive_summary: The constitution states freedom of conscience and belief is inviolable,
      provides for the free exercise of religious beliefs, and prohibits federal, state, and local governments
      from either supporting or hindering any religion. The law contains penalties for acts of religious
      intolerance and discrimination. Religious groups must register with the government to obtain tax-exempt
      status. Public schools are required by law to offer religious instruction, and all schools must
      teach Afro-Brazilian religion, history, and culture. In July, religious representatives from Santa
      Catarina’s Afro-Brazilian communities said, although there is a state law to combat religious intolerance,
      it remained difficult to exercise their right to religious freedom for members of their communities
      due to state and federal practices, including numerous military police invasions of terreiros (places
      of worship for Afro-Brazilian religious groups). In January, President Luiz Inacio Lula da Silva
      enacted a law imposing a sentence of two to five years for anyone who obstructs, prevents, or employs
      violence against any religious practice. In January, President Lula announced the establishment
      of the National Day of Traditions of African Roots and Candomble Nations, to be celebrated annually
      on March 21. On August 28, the District Federal Court of Justice prevented lawyer Gustavo Coutinho
      from defending his client in person because he was wearing traditional Candomble clothing, although
      judges said he could do so via an audio presentation. In July, police officials from four states
      simultaneously conducted 15 searches and seizures to combat neo-Nazism. In November, Rio de Janeiro
      and Sao Paulo became the first cities in the country to adopt the International Holocaust Remembrance
      Alliance (IHRA) working definition of antisemitism. While Brazil is an observer member of the IHRA,
      it has not adopted the working definition on a national level.
