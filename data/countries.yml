    state_dept_url: https://www.state.gov/reports/2023-report-on-international-religious-freedom/iran/
    state_dept_executive_summary: The constitution defines the country as an Islamic republic and specifies
      Twelver Ja’afari Shia Islam as the official state religion. It states all laws and regulations must
      be based on “Islamic criteria” and an official interpretation of sharia. The constitution states
      citizens shall enjoy human, political, economic, and other rights, “in conformity with Islamic criteria.”
      The penal code provides for hudud punishments (those mandated by sharia), including amputation,
      flogging, and stoning. It specifies the death penalty for moharebeh (“enmity against God”) and sabb
      al-nabi (“insulting the Prophet”). Prevailing fatwas prescribe the death penalty for apostasy. According
      to the penal code, the application of the death penalty varies depending on the religion of both
      the perpetrator and the victim. The penal code criminalizes insulting “divine religions or Islamic
      schools of thought” and committing “any deviant educational or proselytizing activity that contradicts
      or interferes with the sacred law of Islam.” Proselytization of religions other than Islam carries
      a punishment of up to 10 years in prison. Nongovernmental organizations (NGOs) said these provisions
      put religious minorities at a higher risk of persecution. The law, as typically interpreted, prohibits
      Muslim citizens from changing or renouncing their religious beliefs. The constitution states that
      Zoroastrians, Jews, and Christians are the only recognized religious minorities permitted to worship
      and form religious societies “within the limits of the law.” According to UN experts, numerous international
      human rights NGOs, and media reporting, the government convicted and executed peaceful protesters
      on charges of “enmity against God” and dissidents on charges of blasphemy and spreading anti-Islamic
      propaganda.
