      Party (PKK). In recent years, these attacks hit predominantly Christian villages as well, causing
      severe damage to civilian property and forcing many Christians to flee, leading to the emptying
      of these communities. Christians have still not recovered from the displacement and emigration caused
      by IS and are now barely able to cope with new displacement. According to a local expert, the main
      Turkish target is the PKK, but Christians are a 'soft' target to attack and perpetrators can easily
      get away with it. Although Christians are not the main target, the attacks make them particularly
      vulnerable. In addition, they have reportedly received no protection from the local government.
