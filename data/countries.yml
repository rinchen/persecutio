- title: Brazil
  slug: brazil
  iso3: BRA
  status: open
  persecution_level: Low
  lat: -14.23
  lng: -51.92
  modern: Brazil guarantees religious freedom and has one of the world's largest Christian
    populations. Occasional incidents of vandalism or anti-Christian rhetoric occur,
    but large-scale or state-led persecution is not present.
  historical: Catholicism dominated Brazil after Portuguese colonization, and evangelical
    Protestantism expanded rapidly in the 20th century. Religious competition sometimes
    triggers local tension, especially among indigenous communities and in favelas,
    but these have not reached systematic persecution.
