    services occur, and religious literature imports are controlled. Evangelism and proselytizing face
    legal limitations. Religious freedom is restricted by legislation dating back to September 2011 and
    the Kazakhstan government is constantly working at increasing its control over the whole of society,
    which means increased surveillance, raids on meetings and arrests. It is using the threat of militant
