    archive_od_brief: The main focus of pressure on Iraqi Christians following the territorial losses
      by the Islamic State group (IS) has been the Shia militias backed by Iran. However, IS continued
      its attacks against civilians, infrastructure and security forces in 2023, and to a lesser extent
      in 2024. Both Turkey and Iran also continued airstrikes and-in Turkey's case-ground operations in
