    uscirf_designation: SWL
    uscirf_key_findings:
    - Indonesia’s religious freedom conditions are poor. Despite constitutional FoRB protections, the
      Criminal Code and other laws restrict worship, targeting religious minorities such as Protestants,
      Catholics, Ahmadiyyah Muslims, Jehovah’s Witnesses, and Baha'is. A new Criminal Code came into effect
      in 2026, broadening the criminal definition of blasphemy. Religious minorities also encounter challenges
      when constructing places of worship as local authorities often refuse to issue permits.
    uscirf_url: https://www.uscirf.gov/countries/indonesia
    state_dept_url: https://www.state.gov/reports/2023-report-on-international-religious-freedom/indonesia/
    state_dept_executive_summary: 'The constitution provides a guarantee of freedom of religion and the
      right to worship according to one’s own beliefs, but it states that citizens must accept restrictions
      established by law to protect the rights of others and to satisfy “just demands based upon considerations
      of morality, religious values, security, and public order in a democratic society.” The Ministry
      of Religious Affairs (MORA) extends official recognition and support to groups in six faiths: Islam,
      Catholicism, Protestantism, Buddhism, Hinduism, and Confucianism. Some local and provincial governments,
      particularly in Aceh Province, have laws and regulations restricting religious observance, such
      as regulations banning Shia or Ahmadi Islamic practice. Authorities continued to detain and sentence
      individuals to prison for violations of blasphemy laws. In Aceh, the only province to follow sharia,
      authorities conducted numerous public canings for violations, such as consuming or selling alcohol,
      gambling, and extramarital sex. Residents from religious majorities in certain communities sometimes
      successfully pressured local authorities to delay or deny the construction or renovation of houses
      of worship for local religious minorities. Government officials and police also sometimes failed
      to prevent religious and religiously affiliated groups from committing other acts of intimidation,
      such as damaging or destroying houses of worship and homes. The 2023 annual report of the Setara
      Institute on Democracy and Peace cited a total of 230 actions infringing on religious freedom during
      the year. During the year, government institutions conducted numerous actions, including organizing
      forums and collaborative international events that publicly advocated religious tolerance and interfaith
      dialogue. Some religious minority groups reported success in obtaining permits to build houses of
      worship and rebuild destroyed structures.'
