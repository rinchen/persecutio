    uscirf_url: https://www.uscirf.gov/countries/vietnam
    state_dept_url: https://www.state.gov/reports/2023-report-on-international-religious-freedom/vietnam/
    state_dept_executive_summary: The constitution states that all individuals have the right to freedom
      of belief and religion. The law provides for significant government control over religious practices
      and includes vague provisions that permit restrictions on religious freedom in the stated interest
      of national security and social unity and enable local officials to make arbitrary decisions on
      registration and recognition of new religious groups or places of worship. The Law on Belief and
      Religion (LBR) maintains a multistage registration and recognition process for religious groups
      requiring such decisions at each stage. Nongovernmental organizations (NGOs) and faith adherents
      reported cases of government officials physically abusing individuals from religious minority groups,
      particularly ethnic minorities in the Central Highlands and Northern Highlands, although it was
      not clear whether the reported cases were related solely to religious affiliation. There were reports
      Dak Lak Province security officers physically abused two ethnic minority Protestants during interrogations
      about their religious affiliation and links to NGOs the authorities said were involved in the attacks.
      In the Northwest and Northern Highlands, leaders representing both registered and unregistered religious
      groups said authorities frequently used nonviolent or less physically aggressive approaches in their
      dealings with religious groups compared with prior years, for example, summoning representatives
      for periodic meetings or threatening or imposing administrative fines to pressure them to comply
      with government demands, including seeking registration and ceasing illegal gatherings. Members
      of unregistered religious groups reported authorities pressured recognized religious groups to interfere
      in the internal affairs of unregistered groups.
