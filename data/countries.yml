    uscirf_key_findings:
    - The Pakistani government’s systematic enforcement of blasphemy laws severely restricts freedom of
      religion or belief for all citizens, particularly targeting Ahmadiyya Muslims. Authorities’ failure
      to address mob violence associated with blasphemy accusations, as well as the forced conversions
      to Islam of individuals from religious minorities—including Christians, Hindus, and Sikhs—continues
      to reinforce a climate of fear and religious discrimination.
    uscirf_url: https://www.uscirf.gov/countries/pakistan
    state_dept_url: https://www.state.gov/reports/2023-report-on-international-religious-freedom/pakistan/
    state_dept_executive_summary: The constitution establishes Islam as the state religion and requires
      all provisions of the law to be consistent with Islam. The constitution states, “Subject to law,
      public order, and morality, every citizen shall have the right to profess, practice, and propagate
      his religion.” The penal code sets punishments for blasphemy that range from 10 years in prison
      to the death penalty, although the government has never executed anyone for blasphemy. It also states,
      “A person of the Qadiani group or the Lahori group (who call themselves Ahmadis) is a non-Muslim.”
      The constitution and penal code prohibit Ahmadis from acting or representing themselves as Muslims.
      Speech or action intended to incite religious hatred is punishable by up to seven years in prison.
      According to media reports, police at times killed or physically abused members of religious minorities
      or failed to protect individuals from violence linked to religion. Frequently, police accused of
      abuses were lightly sanctioned or not punished at all. In one case, police failed to protect a detainee
      facing blasphemy charges in Punjab’s Nankana Sahib district; a mob stormed a police station and
      lynched him on February 11. Police suspended two senior officers for failing to prevent the lynching
      and ordered an investigation. The officers were reinstated after a departmental inquiry found them
      “not guilty of negligence, incompetence, and cowardice.” According to the nongovernmental organization
      (NGO) Center for Social Justice (CSJ), 329 persons were accused of blasphemy during the year, of
      whom 75 percent were Muslims, 20 percent Ahmadi Muslims, and 3.3 percent Christians. One Hindu was
      also accused; the faith of the others was unknown. At least 171 persons were accused of blasphemy
      in 2022, according to CSJ. NGOs agreed the actual number of blasphemy cases was likely higher, but
      uneven reporting and lack of media coverage in many areas made it difficult to be precise.
