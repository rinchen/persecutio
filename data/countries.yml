    state_dept_executive_summary: The constitution defines the country as an Islamic republic and designates
      Islam as the sole religion of the citizenry and state. The law prohibits blasphemy and apostasy
      and defines them as crimes punishable by death; however, the government has never applied the death
      penalty for these crimes. On July 18, police in the town of Atar arrested a 19-year-old female student
      accused of writing blasphemous text directed at the Prophet Muhammad in answers on her end-of-year
      baccalaureate exam in violation of a 2018 amendment to the blasphemy provision of the country’s
      penal code. A teacher posted the exam answers on social media and was subsequently arrested and
      charged with publishing insults against the Prophet Muhammad on a social network. In August, the
      teacher was sentenced to six months in prison and another six months of judicial supervision. On
      November 27, judicial authorities released the teacher from prison. At year’s end, the student remained
      in custody pending prosecution. Religious groups advocating a strict interpretation of Islam placed
      intense public pressure on the government to severely punish the student, including imposing the
      death penalty. During the year, some militant Islamist groups made increased public calls for broader
      application of the country’s sharia-based criminal code. Civil society groups continued to report
      social inhibitions to challenging religious norms or discussing religious freedom and slavery. A
      Christian nongovernmental organization (NGO) reported that converts from Islam faced extreme societal
      and family pressure. U.S. embassy officials raised apostasy, blasphemy, and other religious freedom
      issues with authorities on multiple occasions. Embassy representatives, including the Ambassador,
      discussed religious tolerance with senior government officials, including the Minister of Justice.
      During Ramadan, the Ambassador hosted an iftar and raised religious tolerance with the religious
      leaders in attendance.
