    freedom_house_status: Not Free
    freedom_house_pr: 7
    freedom_house_cl: 5
    christian_population: 3758462
    christian_percentage: 19.29
    uscirf_designation: SWL
    uscirf_key_findings:
    - Religious freedom conditions in Kazakhstan are poor for all religious communities, particularly
      Muslims who deviate from the state’s preferred interpretation of Islam. Authorities arbitrarily
      enforce vague and often onerous provisions of the 2011 religion law and the 2005 extremism law to
      penalize peaceful religious activities. The government heavily promotes and invests in interfaith
      engagement to distract from its ongoing religious freedom violations.
    uscirf_url: https://www.uscirf.gov/countries/kazakhstan
    archive_modern_excerpt: Religious freedom is restricted by legislation dating back to September 2011
      and the Kazakhstan government is constantly working at increasing its control over the whole of
      society, which means increased surveillance, raids on meetings and arrests. It is using the threat
      of militant Islam to restrict more areas of freedom. The constitution defines the country as a secular
      state and provides for freedom of religion and belief as well as the freedom to decline religious
      affiliation. The Committee for Religious Affairs (CRA), part of the Ministry of Culture and Information
      (MCI), is responsible for religious issues.
    archive_historical_excerpt: government estimates the total population at 20.1 million (midyear 2023).
      While a 2019 CRA study indicates that 92.8 percent of the population self-identify as religious,
      according to a 2019 study by the government-affiliated Kazakhstan Institute for Strategic Studies
      think tank, nonbelievers and atheists constitute 18.7 percent of the population.
    archive_od_brief: Religious freedom is restricted by legislation dating back to September 2011 and
      the Kazakhstan government is constantly working at increasing its control over the whole of society,
      which means increased surveillance, raids on meetings and arrests. It is using the threat of militant
      Islam to restrict more areas of freedom. Russian Orthodox churches experience the least problems
      from the government as they do not usually attempt to make contact with the Kazakh population. It
      is the indigenous Christians with a Muslim background who are bearing the brunt of persecution both
      at the hands of the state and from family, friends and community. Some converts are locked up by
      their families for long periods, beaten and may eventually be expelled from their communities. Local
      imams also preach against them.
    archive_od_url: https://www.opendoors.org/persecution/reports/Kazakhstan-Full_Country_Dossier-ODI-2025.pdf
    state_dept_executive_summary: The constitution defines the country as a secular state and provides
      for freedom of religion and belief as well as the freedom to decline religious affiliation. The
      Committee for Religious Affairs (CRA), part of the Ministry of Culture and Information (MCI), is
      responsible for religious issues. According to multiple sources, while members of many registered
      religious organizations were able to practice religion without harassment or legal barriers within
      registered places of worship and private homes, authorities continued to fine, arrest, detain, or
      imprison individuals on account of their religious beliefs or affiliation. International religious
      freedom nongovernmental organization (NGO) Forum 18 reported eight Sunni Muslims were serving sentences
      connected to their religious activities or beliefs as of September. These included Dadash Mazhenov,
      serving an eight-year prison sentence for sharing religious talks on his social media page and denied
      transfer to a labor camp closer to his home as punishment for praying while standing after the lights
      were turned off for the evening. NGOs reported the actual number of Muslims serving prison sentences
      connected to peaceful religious activities or beliefs was likely higher. Freed prisoners continued
      to experience frozen bank accounts for extended periods and restrictions on their activities, including
      religious activities. The government continued not to approve the registration of Muslim groups
      apart from those observing the Sunni Hanafi school, although NGOs reported some non-Hanafi Muslim
      communities continued to worship informally without government interference. In October, the head
      of the National Security Committee told parliament legislation was necessary to make laws regulating
      religious activity more stringent.
    state_dept_url: https://www.state.gov/reports/2023-report-on-international-religious-freedom/kazakhstan/
