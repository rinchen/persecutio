    communities experience periodic violence, especially in Oromia and Amhara regions. Religious restrictions
    have increased under the current government. In Ethiopia, all three categories of Christian communities
    face violations of religious freedom, with non-traditional Christians suffering the most severe mistreatment
    from both the local government and the Ethiopian Orthodox Church (EOC). Converts to Christianity from
    a Muslim background, particularly in eastern and south -eastern regions, and 'cross -denominational
    converts' from Orthodox backgrounds endure harsh… The country is a secular state; the constitution
    requires the separation of religion and the state, establishes freedom of religious choice and practice,
    prohibits religious discrimination, and stipulates the government shall not interfere in the practice
    of any religion, nor shall any religion interfere in the affairs of the state.
  historical: Ethiopia is one of the oldest Christian nations, with traditions dating to the 4th century.
    The Ethiopian Orthodox Tewahedo Church has shaped national identity for centuries. Political and ethnic
    conflicts sometimes take on religious dimensions.
