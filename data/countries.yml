countries:
  - title: China
    slug: china
    iso3: CHN
    status: severe
    persecution_level: "Very High"
    lat: 35.86
    lng: 104.19
    modern: |
      China ranks among the world’s most restrictive environments for Christians.
      The government controls official state-approved churches through the Three-Self
      Patriotic Movement and the Chinese Catholic Patriotic Association, while
      unregistered “house churches” face crackdowns, surveillance, and demolition.
      Under recent regulations, unregistered religious personnel may be punished
      under administrative law. Outreach to minors and online religious content
      are restricted. Authorities frequently detain leaders and members of
      independent churches.
    historical: |
      Christianity entered China in the Tang dynasty through Nestorian missionaries,
      endured suppression during the Ming and Qing dynasties, and experienced
      periodic anti-Christian violence during the Boxer Rebellion (1899–1901),
      during which many missionaries and converts were killed. Catholic and
      Protestant missions expanded in the late 19th and early 20th centuries,
      only to be curtailed with the establishment of the People's Republic in 1949.
      The Cultural Revolution (1966–1976) targeted churches, destroyed religious
      sites, and incarcerated clergy.
    sources:
      - title: Open Doors World Watch List 2024
        url: https://www.opendoorsusa.org/christian-persecution/world-watch-list/
        date: 2024
      - title: USCIRF 2023 Annual Report — China
        url: https://www.uscirf.gov/countries/china
        date: 2023

  - title: North Korea
    slug: north-korea
    iso3: PRK
    status: severe
    persecution_level: "Extreme"
    lat: 40.34
    lng: 127.51
    modern: |
      The Democratic People's Republic of Korea is widely considered the most
      dangerous place in the world to be a Christian. Possession of a Bible,
      gathering for worship, or displaying symbols of the faith can result in
      imprisonment in kwan-liso (political prison camps). Defectors and
      underground networks report systematic elimination of religious practice.
      State ideology—Juche—functions as an enforced quasi-religion.
    historical: |
      Before 1945, Pyongyang was a center of Christian activity in East Asia,
      earning the nickname “Jerusalem of the East.” After the Korean War and the
      consolidation of the Kim regime, North Korea became officially atheist
      in materialist outlook. From the 1950s onward, clergy and lay leaders were
      purged, churches were closed, and religious practice was driven underground.
    sources:
      - title: Open Doors World Watch List 2024
        url: https://www.opendoorsusa.org/christian-persecution/world-watch-list/
        date: 2024
      - title: USCIRF 2023 Annual Report — North Korea
        url: https://www.uscirf.gov/countries/north-korea
        date: 2023

  - title: Nigeria
    slug: nigeria
    iso3: NGA
    status: persecution
    persecution_level: "High"
    lat: 9.08
    lng: 8.68
    modern: |
      Nigeria faces overlapping violence from Boko Haram, ISWAP, and armed bandits
      in the north, and communal violence in the Middle Belt. Christian villagers,
      pastors, and schools have been targeted in attacks involving killings,
      kidnappings, and displacement. Hundreds of churches have been destroyed or
      closed. Intercommunal violence along farmer–herder lines often carries
      religious overtones in states near the Jos Plateau.
    historical: |
      Christianity arrived in Nigeria in the 15th century via Portuguese explorers
      and missionaries, later deepening through 19th-century missionary activity.
      The religious violence of recent decades has roots in colonial legacies,
      post-independence political tensions, the 1967–1970 Biafran War, and the
      spread of Salafi-jihadist ideology across the Sahel in the late 20th century.
    sources:
      - title: Open Doors World Watch List 2024
        url: https://www.opendoorsusa.org/christian-persecution/world-watch-list/
        date: 2024
      - title: USCIRF 2023 Annual Report — Nigeria
        url: https://www.uscirf.gov/countries/nigeria
        date: 2023

  - title: India
    slug: india
    iso3: IND
    status: warning
    persecution_level: "Moderate/High"
    lat: 20.59
    lng: 78.96
    modern: |
      India, while religiously plural, has witnessed a rise in violence and
      intimidation targeting Christians, particularly following the 2014 election
      of the BJP-led central government. “Anti-conversion” laws enacted in
      several states restrict religious change and have been used to arrest
      pastors. Vigilante groups have forcibly re-converted Christians. Church
      attendance is discouraged in some educational settings.
    historical: |
      Thomas the Apostle is traditionally believed to have evangelized the Malabar
      Coast in the 1st century. After Portuguese arrival in 1498, Catholic
      missions grew; Protestant missions expanded from the 18th century. Anti-
      Christian legislation in colonial and princely states recurred, as did
      communal violence around the time of Partition and in later decades.
    sources:
      - title: Open Doors World Watch List 2024
        url: https://www.opendoorsusa.org/christian-persecution/world-watch-list/
        date: 2024
      - title: USCIRF 2023 Annual Report — India
        url: https://www.uscirf.gov/countries/india
        date: 2023

  - title: Pakistan
    slug: pakistan
    iso3: PAK
    status: severe
    persecution_level: "Very High"
    lat: 30.37
    lng: 69.34
    modern: |
      Pakistan’s blasphemy laws carry severe penalties, including death, and are
      frequently invoked against Christians. In 2022, Aanita, a Christian woman,
      and her family faced renewed threats after acquittal. Forced conversions
      and marriages of Christian girls remain a chronic issue. Churches are
      sometimes attacked during holidays, and security at places of worship
      remains a statewide concern.
    historical: |
      Catholics arrived with Portuguese traders and missionaries in the 16th
      century; Protestant missions flourished under British rule in Punjab and
      Sindh. Partition in 1947 created a Muslim-majority state with significant
      Christian minorities, particularly in Punjab. Anti-blasphemy legislation
      hardened from the 1980s onward under General Zia-ul-Haq.
    sources:
      - title: Open Doors World Watch List 2024
        url: https://www.opendoorsusa.org/christian-persecution/world-watch-list/
        date: 2024
      - title: USCIRF 2023 Annual Report — Pakistan
        url: https://www.uscirf.gov/countries/pakistan
        date: 2023

  - title: Afghanistan
    slug: afghanistan
    iso3: AFG
    status: severe
    persecution_level: "Extreme"
    lat: 33.93
    lng: 67.70
    modern: |
      After the Taliban’s return to power (August 2021), reports indicate near-
      total suppression of non-Islamic worship. Any known Christian converts
      risk death or expulsion; house churches operate covertly. Bibles and
      Christian media are illegal. Aid agencies with religious affiliations are
      kept under strict surveillance.
    historical: |
      Catholicism was introduced by Spanish Jesuit missionaries in the early
      17th century through Mughal court influence; later mission work was limited
      by geography and conflict. Christianity remained a marginal faith in Afghan
      society throughout the 20th century until the small indigenous community
      was suppressed first under Soviet occupation, then by the Taliban (1996–2001),
      and now again post-2021.
    sources:
      - title: Open Doors World Watch List 2024
        url: https://www.opendoorsusa.org/christian-persecution/world-watch-list/
        date: 2024
      - title: USCIRF 2023 Annual Report — Afghanistan
        url: https://www.uscirf.gov/countries/afghanistan
        date: 2023

  - title: Iran
    slug: iran
    iso3: IRN
    status: severe
    persecution_level: "Very High"
    lat: 32.42
    lng: 53.68
    modern: |
      Iran’s constitution recognizes Armenian and Assyrian Christian communities
      with reserved parliamentary representation, but converts from Islam face
      imprisonment, surveillance, and coerced “re-education.” House churches are
      raided; leaders receive lengthy sentences. Nationality laws restrict
      church-owned property transfers.
    historical: |
      Assyrian Christianity in Persia dates to the 1st century; Armenians have a
      continuous presence since the 4th century. After the 1979 Islamic Revolution,
      former Shah-era evangelistic institutions were closed; while “traditional”
      minorities retained some rights, apostasy charges rose in the 2000s.
    sources:
      - title: Open Doors World Watch List 2024
        url: https://www.opendoorsusa.org/christian-persecution/world-watch-list/
        date: 2024
      - title: USCIRF 2023 Annual Report — Iran
        url: https://www.uscirf.gov/countries/iran
        date: 2023

  - title: Saudi Arabia
    slug: saudi-arabia
    iso3: SAU
    status: severe
    persecution_level: "Very High"
    lat: 23.88
    lng: 45.07
    modern: |
      Saudi Arabia’s legal system is based on an interpretation of Sharia law
      under which conversion from Islam is legally punishable and can carry the
      death penalty. Though private worship by expatriate Christians sometimes
      occurs discreetly, organized Christian fellowship and public displays of
      faith are prohibited. Bibles are illegal to import and distribute.
    historical: |
      Christianity has deep historical roots in Arabia via Nabataean and Ghassanid
      communities, but became extinct on most of the Arabian Peninsula after the
      rise of Islam in the 7th century. From the 18th century onward, Catholic
      and Protestant missionaries operated under Ottoman and Hashemite authority;
      expansion came after oil-driven contact with the West in the 20th century.
    sources:
      - title: Open Doors World Watch List 2024
        url: https://www.opendoorsusa.org/christian-persecution/world-watch-list/
        date: 2024
      - title: USCIRF 2023 Annual Report — Saudi Arabia
        url: https://www.uscirf.gov/countries/saudi-arabia
        date: 2023

  - title: Yemen
    slug: yemen
    iso3: YEM
    status: severe
    persecution_level: "Extreme"
    lat: 15.55
    lng: 48.51
    modern: |
      Ongoing civil war involving Houthi, Saudi-led, and UAE-backed forces has
      devastated Yemen’s small Christian community. Houthi authorities impose
      strict religious controls. For Christians, humanitarian access and basic
      services can be restricted on the basis of religion or perceived loyalty.
      Proselytizing is banned under Houthi codes.
    historical: |
      After the Islamic conquests of the 7th century, Christianity in Yemen
      declined; the Himyarite kingdom had a brief Christian period in the 5th–6th
      centuries. Ottoman and British colonial contact renewed small Catholic and
      Protestant presences during the 19th century, which again contracted after
      mid-20th century conflicts.
    sources:
      - title: Open Doors World Watch List 2024
        url: https://www.opendoorsusa.org/christian-persecution/world-watch-list/
        date: 2024
      - title: USCIRF 2023 Annual Report — Yemen
        url: https://www.uscirf.gov/countries/yemen
        date: 2023

  - title: Eritrea
    slug: eritrea
    iso3: ERI
    status: severe
    persecution_level: "Very High"
    lat: 15.17
    lng: 39.78
    modern: |
      Eritrea extends tight state control over all recognized religious bodies—
      Orthodox, Catholic, Lutheran, and Sunni Islam. Unregistered evangelical
      churches were effectively banned in 2002; hundreds of unregistered
      Christians remain imprisoned without charge. Children are routinely
      interrogated about home worship.
    historical: |
      Christianity arrived in the 4th century through Syrian missionaries, making
      Eritrea one of Africa's oldest Christian regions. The Ethiopian Orthodox
      Tewahedo Church dominated for centuries; Latin Catholic presence grew after
      Italian colonization (1889–1941), and Protestant missions grew under British
      administration after World War II.
    sources:
      - title: Open Doors World Watch List 2024
        url: https://www.opendoorsusa.org/christian-persecution/world-watch-list/
        date: 2024
      - title: USCIRF 2023 Annual Report — Eritrea
        url: https://www.uscirf.gov/countries/eritrea
        date: 2023

  - title: Somalia
    slug: somalia
    iso3: SOM
    status: severe
    persecution_level: "Extreme"
    lat: 5.15
    lng: 46.19
    modern: |
      Somalia’s federal government has no capacity to protect religious minorities.
      Al-Shabaab executes individuals known or suspected of converting to
      Christianity. Any Christian witness is forced underground; foreign
      workers suspected of religious activity face expulsion.
    historical: |
      Early Christian communities existed on the Somali coast through trade with
      the Byzantine and Ethiopian worlds. From the 19th century onward, European
      Catholics and Anglicans established mission stations; most expelled or
      closed during Siad Barre’s socialist rule after 1969. Civil war destroyed
      remaining structures in the 1990s.
    sources:
      - title: Open Doors World Watch List 2024
        url: https://www.opendoorsusa.org/christian-persecution/world-watch-list/
        date: 2024
      - title: USCIRF 2023 Annual Report — Somalia
        url: https://www.uscirf.gov/countries/somalia
        date: 2023

  - title: Syria
    slug: syria
    iso3: SYR
    status: severe
    persecution_level: "Very High"
    lat: 34.80
    lng: 38.99
    modern: |
      Years of civil war and occupation by ISIS (2014–2017) devastated Syria’s
      historic Christian communities in Homs, Qamishli, and along the Khabour
      valley. Many Assyrian, Armenian, and Greek Orthodox Christians have fled
      abroad. Territorially contiguous Islamist factions in the north impose
      Sharia-based restrictions on public life.
    historical: |
      Syria hosts some of Christianity’s oldest sites—Damascus, Antioch, Qamishli—
      and has native traditions of Syriac Orthodoxy dating to the 1st century.
      Under late Ottoman rule and French mandate (1920–1946), communal militias
      and intercommunal tensions intensified. Baathist secularism from the 1960s
      onward restricted religious expression and closed religious courts.
    sources:
      - title: Open Doors World Watch List 2024
        url: https://www.opendoorsusa.org/christian-persecution/world-watch-list/
        date: 2024
      - title: USCIRF 2023 Annual Report — Syria
        url: https://www.uscirf.gov/countries/syria
        date: 2023

  - title: Iraq
    slug: iraq
    iso3: IRQ
    status: severe
    persecution_level: "Very High"
    lat: 33.22
    lng: 43.67
    modern: |
      Since 2003 and especially after the ISIS caliphate (2014–2017), Iraq’s
      ancient Christian communities in Mosul, Nineveh Plains, and Baghdad have
      been decimated through targeted violence and forced displacement. Although
      ISIS territorial control ended, security remains fragile, and returning
      Christians face property disputes, discrimination, and militia pressure.
    historical: |
      Mesopotamia is the cradle of Eastern Christianity—Assyrian, Chaldean, and
      Syriac traditions stretch back to the 1st and 2nd centuries.Communities
      thrived through the Abbasid era, endured Mongol campaigns and Timurid raids,
      and continued under Ottoman millet system. The 20th century saw fluctuating
      fortunes under monarchy, republic, Baathism, and the post-2003 republic.
    sources:
      - title: Open Doors World Watch List 2024
        url: https://www.opendoorsusa.org/christian-persecution/world-watch-list/
        date: 2024
      - title: USCIRF 2023 Annual Report — Iraq
        url: https://www.uscirf.gov/countries/iraq
        date: 2023

  - title: Cuba
    slug: cuba
    iso3: CUB
    status: restricted
    persecution_level: "Moderate"
    lat: 21.52
    lng: -77.78
    modern: |
      Cuba has experienced improved but uneven religious freedom since the 1990s.
      The Catholic Church has gained capacity for public social service, yet
      restrictions persist on registration of new churches, printing of religious
      materials, and access to state media. Leaders of independent Protestant
      house churches sometimes report harassment.
    historical: |
      Catholicism has dominated Cuba since colonial times; the 19th-century
      wars of independence were shaped by tensions between Spanish Catholic
      authority and Creole identity. After 1959, Fidel Castro’s government
      confiscated church property, expelled clergy, and banned Christian
      education. The Soviet period saw atheistic state ideology enforced
      almost absolutely; reforms began in the late 1980s and 1990s.
    sources:
      - title: Open Doors World Watch List 2024
        url: https://www.opendoorsusa.org/christian-persecution/world-watch-list/
        date: 2024
      - title: USCIRF 2023 Annual Report — Cuba
        url: https://www.uscirf.gov/countries/cuba
        date: 2023

  - title: Mexico
    slug: mexico
    iso3: MEX
    status: warning
    persecution_level: "Moderate"
    lat: 23.63
    lng: -102.55
    modern: |
      Violence against clergy and church property in Mexico is primarily linked
      to organized crime and local disputes over land and influence. In regions
      such as Chihuahua, Michoacán, Guerrero, and Oaxaca, priests have been
      kidnapped and killed, and churches extorted or burned. Indigenous Catholic
      communities in Chiapas have faced displacement.
    historical: |
      Catholicism arrived with the conquest in 1519; evangelization was tied to
      colonial governance. After independence (1821), Mexico oscillated between
      anti-clerical constitutions (1857, 1917) and periods of church-state
      conflict including the Cristero War (1926–1929). Religious freedom was
      gradually restored from the late 20th century onward.
    sources:
      - title: Open Doors World Watch List 2024
        url: https://www.opendoorsusa.org/christian-persecution/world-watch-list/
        date: 2024
      - title: USCIRF 2023 Annual Report — Mexico
        url: https://www.uscirf.gov/countries/mexico
        date: 2023

  - title: Colombia
    slug: colombia
    iso3: COL
    status: warning
    persecution_level: "Moderate"
    lat: 4.57
    lng: -74.30
    modern: |
      In Colombia’s conflict-heavy zones, guerrillas, paramilitaries, and criminal
      gangs have targeted Catholic clergy, Protestant pastors, and church leaders
      who defend human rights, oppose illegal economies, or mediate with
      communities. Killings and threats declined after the 2016 peace agreement
      but continue in Caquetá, Nariño, and Norte de Santander.
    historical: |
      Christianity was introduced through 16th-century missionaries working under
      the Spanish colonial system; Catholicism shaped civic life through
      haciendas, town festivals, and colonial institutions. Political violence
      between Liberals and Conservatives in the 19th and 20th centuries
      periodically targeted churches and their leadership.
    sources:
      - title: Open Doors World Watch List 2024
        url: https://www.opendoorsusa.org/christian-persecution/world-watch-list/
        date: 2024
      - title: USCIRF 2023 Annual Report — Colombia
        url: https://www.uscirf.gov/countries/colombia
        date: 2023

  - title: Nicaragua
    slug: nicaragua
    iso3: NIC
    status: restricted
    persecution_level: "Moderate/High"
    lat: 12.86
    lng: -85.20
    modern: |
      The Nicaraguan government under Daniel Ortega launched an unprecedented
      crackdown on the Catholic Church in 2018, arresting and exiling dozens of
      priests, closing Catholic media, and seizing church property. Dialogue
      between bishops and government collapsed; the apostolic nuncio was expelled.
      Opposition clergy face criminal charges or exile.
    historical: |
      Catholicism had an almost hegemonic role in Nicaragua from the 16th century
      until the 1979 Sandinista revolution, which initially permitted religious
      freedom but grew hostile after the radicalization of the 1980s. In the
      1990s, the church regained public influence and mediated political conflict.
    sources:
      - title: Open Doors World Watch List 2024
        url: https://www.opendoorsusa.org/christian-persecution/world-watch-list/
        date: 2024
      - title: USCIRF 2023 Annual Report — Nicaragua
        url: https://www.uscirf.gov/countries/nicaragua
        date: 2023

  - title: Laos
    slug: laos
    iso3: LAO
    status: restricted
    persecution_level: "High"
    lat: 19.85
    lng: 102.49
    modern: |
      The Lao government exercises strict control over all religious activity,
      restricting church construction, materials importation, and training of
      clergy. Protestant and Catholic converts face surveillance and local
      harassment; several Christians remain in prison. Decentralized village
      councils enforce local religious norms in many regions.
    historical: |
      Catholic missionaries arrived in the 17th century through Portuguese and
      French channels; Protestant missions grew during French colonial rule
      (1893–1953). After 1975, the Lao People's Democratic Republic imposed
      strict controls, restricting religious practice to state-sanctioned outlets
      and driving churches underground.
    sources:
      - title: Open Doors World Watch List 2024
        url: https://www.opendoorsusa.org/christian-persecution/world-watch-list/
        date: 2024
      - title: USCIRF 2023 Annual Report — Laos
        url: https://www.uscirf.gov/countries/laos
        date: 2023
  - title: Vietnam
    slug: vietnam
    iso3: VNM
    status: restricted
    persecution_level: "Moderate/High"
    lat: 14.05
    lng: 108.27
    modern: |
      Vietnam’s constitution guarantees religious freedom, but authorities require
      registration of religious organizations. Unregistered groups, particularly
      house churches and ethnic-minority Protestants in the Central Highlands
      and Northwest, face intermittent confiscation of property, harassment,
      detention, and pressure to renounce faith.
    historical: |
      Catholicism arrived with Portuguese and French missionaries from the 16th
      century, proliferating during French colonial rule (1858–1954) especially
      in the north. The Second Vatican Council energized Vietnamese Catholic
      leadership; the post-1975 communist government restricted foreign religious
      influence, sending clergy to re-education camps.
    sources:
      - title: Open Doors World Watch List 2024
        url: https://www.opendoorsusa.org/christian-persecution/world-watch-list/
        date: 2024
      - title: USCIRF 2023 Annual Report — Vietnam
        url: https://www.uscirf.gov/countries/vietnam
        date: 2023
  - title: Uzbekistan
    slug: uzbekistan
    iso3: UZB
    status: restricted
    persecution_level: "Moderate/High"
    lat: 41.37
    lng: 64.58
    modern: |
      Uzbekistan has gradually opened religious space since the late 2010s, yet
      restrictions on proselytizing, importation and printing of religious
      literature, and unregistered religious activity persist. Ethnic Uzbek and
      Russian converts to Christianity are occasionally fined or detained.
    historical: |
      Christianity arrived in Transoxiana through Byzantine, Persian, and later
      Russian influences. The Soviet period suppressed churches and mosques alike;
      independence in 1991 restored formal religious practice but retained state
      controls that hardened after the 2005 Andijan protests.
    sources:
      - title: Open Doors World Watch List 2024
        url: https://www.opendoorsusa.org/christian-persecution/world-watch-list/
        date: 2024
      - title: USCIRF 2023 Annual Report — Uzbekistan
        url: https://www.uscirf.gov/countries/uzbekistan
        date: 2023