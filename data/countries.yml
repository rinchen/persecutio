- title: United States
  slug: united-states
  iso3: USA
  status: open
  persecution_level: Low
  lat: 37.09
  lng: -95.71
  modern: The United States constitutionally protects religious freedom, and Christians
    generally worship openly. Concerns remain in the form of occasional hate crimes,
    zoning disputes over church construction, and broader cultural polarization rather
    than state-sponsored restrictions.
  historical: Catholicism arrived in Spanish Florida and French Louisiana, while Protestant
    groups shaped British colonies from the 17th century onward. First Amendment protections
    made religious freedom a national principle, though 19th-century nativist movements
    sometimes targeted Catholics and new immigrant churches.
