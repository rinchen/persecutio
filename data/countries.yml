    state_dept_executive_summary: The constitution declares Islam the state religion. It provides for
      freedom of thought and expression “within the limits of the law” but does not mention freedom of
      religion, belief, or conscience. The constitution states sharia is the source of all legislation,
      although it coexists with secular common law and civil code models of law in a hybrid legal system.
      The law prohibits denunciation of Islam, conversion from Islam to another religion, and proselytizing
      directed at Muslims. Apostasy is a capital offense, and blasphemy is punishable by fines or imprisonment.
      The conflict that began in 2014 between the government and the Iran-backed Houthi movement, also
      known as Ansar Allah, whose revolutionary ideology is grounded in its interpretation of Zaydi Shi’ism,
      continued throughout the year. Government control was limited in much of the country’s territory,
      which constrained its ability to address abuses of religious freedom, including those that security
      personnel, tribal leaders, or local military commanders committed in areas under its nominal control.
      In 2022, the then UN Special Rapporteur on freedom of religion or belief reported prominent Christian
      figures were subjected to intimidation or threats of being charged with apostasy, which carried
      the death penalty. The nongovernmental organization (NGO) Freedom House stated that assassinations
      and other violent attacks on clerics had increased since the war began in 2015, and that combatants
      from all sides of the conflict had destroyed many religious buildings across the country. The Aden
      Office of Religious Endowments reportedly issued directives requiring sermons not to open political,
      sectarian, or partisan divisions, while a Ministry of Endowments and Guidance October 9 directive
      instructed imams to devote Friday sermons to supporting the Palestinians in the wake of the Israel-Hamas
      conflict. Authorities took actions against clerics who violated these directives.
    state_dept_christian_mentions: true
    archive_modern_excerpt: Informal churches in the country have faced intensifying persecution over
      the last decades; both Yemenis and international partners have been assassinated for sharing their
      Christian faith. The indigenous Church in Yemen is composed mostly of Christians wi th a Muslim
      background and their children who need to live their faith in secret. The constitution declares
      Islam the state religion. It provides for freedom of thought and expression “within the limits of
      the law” but does not mention freedom of religion, belief, or conscience. The constitution states
      sharia is the source of all legislation, although it coexists with secular common law and civil
      code models of law in a hybrid legal system.
    archive_historical_excerpt: government estimates the total population at 31.6 million (midyear 2023).
      More than 99 percent of the population is Muslim (2020 estimate, the latest available), associating
      their beliefs with either the Shafi’i school of Sunni Islam or Zaydi Islam, a branch of Shia Islam.
      ACLED estimated in 2022 that 55 percent of Muslims is Shafi’i Sunni and 45 percent is Zaydi Shia.
    archive_od_brief: 'Informal churches in the country have faced intensifying persecution over the last
      decades; both Yemenis and international partners have been assassinated for sharing their Christian
      faith. The indigenous Church in Yemen is composed mostly of Christians wi th a Muslim background
      and their children who need to live their faith in secret. They face violations of religious freedom
      from their family and the authorities (both from the official authorities and from Houthi rebels
      acting as local authorities in cert ain areas) as well as from radical Islamic groups. Action against
      known converts includes more than just detention and interrogation; radical Muslims threaten apostates
      with death if they do not re-convert. There are also reports of compulsory Islamic teac hing within
      educational institutions and the imposition of Islamic cultural norms and dress codes in wider society.
      By birth, one belongs to a tribe and its internal norms: The tribal punishment for denouncing Islam
      can be death or banishment. Both male and female converts to Christianity married to Muslims risk
      divorce including losing custody of their children. Converts may also face loss of inheritance,
      enforced isolation'
