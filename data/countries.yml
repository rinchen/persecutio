      description: Following the August 2024 ousting of Bangladesh’s longtime leader Sheikh Hasina, the
        country fell into a power vacuum. Amid the ensuing upheaval, some people in this nation of 175
        million (91% Muslim, 8% Hindu, and about half of 1% Christian) seized the opportunity to attack
