      reforms by the civilian Transitional Council could have opened up politica l and civil space in
      the country, leading to more freedom for Christians. The 2019 constitutional declaration includes
      several provisions protecting the right to freedom of religious belief and worship “in accordance
      with the requirements of the law and public order.” As stipulated in the declaration, existing laws
      and institutions governing religion are to remain in effect while the government works to amend
      and restructure them.
    archive_historical_excerpt: government estimates the total population at 49.2 million (midyear 2023).
      The Pew Research Center’s 2020 data estimated that 91 percent of the population was Muslim, 5.4
      percent Christian, 2.8 percent followed indigenous religions, and the remainder followed other religions
      or were unaffiliated.
    archive_od_brief: 'It was believed that the downfall of the al-Bashir regime in April 2019 would lead
      to an improvement of the situation of Christians. Initially, that seemed very likely; the intended
      reforms by the civilian Transitional Council could have opened up politica l and civil space in
      the country, leading to more freedom for Christians. But these hopes were dashed by the October
      2021 coup. As before, all Christian communities in Sudan have to remain wary of talking about their
      faith with Sudanese Muslims as this might be construed as being an ‘act that encourages apostasy
      against Islam’. The ethnic-cultural landscape of the country is also complicated: Arab versus non-Arab,
      Muslim versus Christian. The secession of South Sudan in 2011 did not solve these problems. This
      is particularly true for non-Arabs, as a significant number are Christian and still living in the
      country. The level of hostility that converts and ethnic Africans face is severe. So as not to be
      discovered, converts from Islam to the Christian faith will often refrain from raising their children
      as Christians because this might attract the attention of the government and community leaders (since
      children might inadvertently'
