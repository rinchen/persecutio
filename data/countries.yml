    uscirf_key_findings:
    - Religious freedom conditions in Afghanistan are dire as the Taliban enforces
      a strict interpretation of Sunni Islam. Authorities use religious edicts to
      crack down on all Afghans who express dissent or different views of Islam, including
      women and religious minorities. Ongoing attacks by the Islamic State Khorasan
      Province (ISIS-K) also pose an ongoing threat to Shi’a Muslims in particular.
