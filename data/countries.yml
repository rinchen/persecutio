  modern: After the Taliban's return to power in August 2021, Afghanistan became one of the most restrictive
    places for Christians in the world. Christian converts from Islam risk death, abduction, or expulsion.
    House churches operate in extreme secrecy. Bibles, Christian media, and public worship are illegal.
    Aid agencies with religious ties face surveillance and expulsion.
  historical: Christianity has a long but small presence in Afghanistan, from ancient Silk Road churches
    in the north to modern Catholic and Protestant missionary activity. After years of war in the 1980s
    and 1990s, the 2001-2021 period saw small but increasing Christian communities, especially among foreign
    workers and a few indigenous converts. Post-2021 Taliban rule reversed what little space had opened.
