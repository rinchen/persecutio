- title: Syria
  slug: syria
  iso3: SYR
  status: severe
  persecution_level: Very High
  lat: 34.8
  lng: 38.99
  modern: ISIS control from 2014 to 2017 devastated ancient Christian communities
    across the Khabour valley, Homs, and Qamishli. Many Assyrian, Armenian, and Greek
    Orthodox Christians fled abroad, and returning civilians face property disputes,
    militia pressure, and occasional targeted attacks.
  historical: Damascus and Antioch are central to early Christianity. Syriac Orthodoxy,
    Eastern Catholicism, and Greek Orthodoxy have deep roots. From late Ottoman rule
    through French mandate and Baathist secularism, communal power and religious courts
    were progressively restricted.
