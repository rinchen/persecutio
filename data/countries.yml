    archive_od_brief: In Ethiopia, all three categories of Christian communities face violations of religious
      freedom, with non-traditional Christians suffering the most severe mistreatment from both the local
      government and the Ethiopian Orthodox Church (EOC). Converts to Christianity from a Muslim background,
      particularly in eastern and south-eastern regions, and 'cross-denominational converts' from Orthodox
      backgrounds endure harsh treatment from their families and communities. Christians in areas like
      Somali state and parts of Oromia face attacks by Islamic mobs and are often denied access to community
      resources, leading to social ostracization. The ongoing political violence over the last three years,
      coupled with recent conflicts in Tigray, Amhara and Oromia, has left Chris tians increasingly vulnerable,
      with many churches attacked and destroyed, and even those seeking refuge in churches have not been
      spared from violence.
    archive_od_url: https://www.opendoors.org/persecution/reports/Ethiopia-Full_Country_Dossier-ODI-2025.pdf
    state_dept_executive_summary: The country is a secular state; the constitution requires the separation
      of religion and the state, establishes freedom of religious choice and practice, prohibits religious
      discrimination, and stipulates the government shall not interfere in the practice of any religion,
      nor shall any religion interfere in the affairs of the state. In February, Oromia regional security
      forces shot and killed a number of Ethiopian Orthodox Tewahedo Church (EOTC) parishioners in a church
      in Shashemene town. According to the EOTC Secretariat, security forces shot the parishioners as
      they were trying to prevent the church from being seized by members of a splinter group, the Holy
      Synod of Oromia Nations and Nationalities (HSONN), which broke away from the EOTC in January. Investigators
      from the Ethiopian Human Rights Commission (EHRC) confirmed that eight individuals were killed in
      the shooting and determined police used “excessive force.” In February, Reuters reported Prime Minister
      Abiy Ahmed negotiated a settlement between the EOTC and HSONN. Multiple government agencies suspended
      employees who dressed in black January 6-8 following the EOTC’s call to wear black for the Nineveh
      fast. In May, the Oromia regional government reportedly demolished approximately 20 mosques in addition
      to numerous residences in the newly established Sheger City that it considered illegal constructions.
      The Ethiopian Islamic Affairs Supreme Council (EIASC) stated it had appealed to Prime Minister Abiy
      after the Oromia regional government failed to hear its grievances and continued with the demolitions.
      Protests against the mosque demolitions erupted following Friday prayer at Anwar Grand Mosque in
      Addis Ababa. The EHRC reported government security forces repeatedly used excessive force, resulting
      in civilian injuries and fatalities. According to Mahibere Kidusan, a church organization affiliated
      with the EOTC, unidentified individuals stoned to death an EOTC priest on the outskirts of Addis
      Ababa in March.
