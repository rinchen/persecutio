- title: Vietnam
  slug: vietnam
  iso3: VNM
  status: restricted
  persecution_level: Moderate/High
  lat: 14.05
  lng: 108.27
  modern: Religious activity requires state registration, and unregistered groups
    face surveillance and harassment. Catholic and Protestant communities are monitored,
    and land disputes over church property remain frequent, especially in the central
    highlands.
  historical: French colonial rule introduced Catholic and Protestant missions; after
    division and reunification under communist rule, religious life was restricted
    to government-approved bodies. Economic reform in the 1980s allowed some reopening,
    but controls remain.
