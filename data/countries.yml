- title: Indonesia
  slug: indonesia
  iso3: IDN
  status: warning
  persecution_level: Moderate
  lat: 0.79
  lng: 113.92
  modern: Indonesia is religiously plural but Christians in some provinces face official
    restrictions on building churches, societal pressure, and occasional mob violence.
    Blasphemy-related prosecutions and local regulations can target minority Christians,
    especially in Aceh and some Javanese districts.
  historical: Christianity arrived in the form of Portuguese Catholic missions and
    later Dutch Protestant missions in the Moluccas, Papua, and Batak lands. Communities
    in Flores and East Timor have long Catholic traditions, while Post-independence
    Pancasila ideology limited some religious expressions and generated periodic communal
    conflict.
  sources:
  - title: Open Doors World Watch List 2024
    url: https://www.opendoorsusa.org/christian-persecution/world-watch-list/
    date: '2024'
