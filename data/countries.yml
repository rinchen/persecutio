    wiki_extract: Vietnam, officially the Socialist Republic of Viet Nam (SRV), is a country at the eastern
      edge of Mainland Southeast Asia. With an area of about 331,000 square kilometres and a population
      of over 102 million, it is the world's 16th-most populous country. One of two communist states in
      Southeast Asia, Vietnam is bordered by China to the north, and Laos and Cambodia to the west; it
      lies along the Gulf of Thailand to the southwest and the South China Sea to the east, where it has
      shared and disputed maritime borders with other countries. Its capital is Hanoi, while its largest
      city is Ho Chi Minh City.
