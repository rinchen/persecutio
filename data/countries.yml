- title: North Korea
  slug: north-korea
  iso3: PRK
  status: severe
  persecution_level: Extreme
  lat: 40.34
  lng: 127.51
  modern: Possessing a Bible, attending a house church, or displaying Christian symbols
    can result in imprisonment in political prison camps. Defectors report systematic
    suppression of religion and enforced loyalty to the Juche ideology. No legal Christian
    practice is possible.
  historical: Before 1945, Pyongyang was known as the Jerusalem of the East. After
    the Korean War, the DPRK closed churches, purged clergy, and criminalized public
    religion. Small underground activity survived through refugees and defectors.
  sources:
