    archive_od_brief: The Central African Republic (CAR) has been engulfed in civil conflict since 2013,
      characterized by religious and ethnic violence. Much of the country is controlled by domestic and
      foreign armed groups responsible for various human rights abuses. Christian leaders who speak out
      against the violence face threats, and church buildings have been burned and ransacked. This conflict
      has displaced thousands of Christians, forcing them into camps and causing them to lose their homes
      and livelihoods. In addition to the widespread insecurity and violence affecting all Christians,
      converts to Christianity face persecution from their immediate family members. Local communities
      often ostracize Christian converts, sometimes using violence to pressure them to renounce their
      faith. Christians in CAR also face significant economic challenges, as the country remains one of
      the poorest in the world. This economic hardship has forced many civilians to migrate in search
      of better opportunities, which often disrupts their religious practices. CAR is also experiencing
