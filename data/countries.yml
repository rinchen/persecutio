- title: India
  slug: india
  iso3: IND
  status: warning
  persecution_level: Moderate/High
  lat: 20.59
  lng: 78.96
  modern: Christians face rising violence and legal restrictions linked to anti-conversion
    laws in multiple states. Vigilante groups have forced re-conversions and attacked
    churches; pastors are sometimes jailed under these laws. Religious minorities
    report increasing societal intimidation and educational pressure.
  historical: Tradition holds that Thomas the Apostle evangelized southern India in
    the first century. Portuguese, Catholic, and Protestant missions expanded from
    the 15th century onwards. Anti-Christian violence and legislation recurred during
    colonial, princely-state, and post-independence eras.
  sources:
