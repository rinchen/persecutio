      Islam, and the Baha’i Faith, with Buddhism paramount. Decree 315, rather than codified law, sets
      forth rules for religious practice and minimum land requirements for building houses of worship
      and defines the government as the final arbiter of permissible religious activities. Religious leaders
      continued to state that while authorities in urban areas and in some districts had a strong understanding
      of laws governing religious activities, improper restrictions on religious freedom remained prevalent
      in rural areas. Reports continued of local authorities, especially in isolated villages, discriminating
      against and sometimes expelling followers of minority religious groups, particularly Christians,
      for refusing to renounce their faith. Roman Catholic officials reported continued monitoring by
      government officials of their services in some locations. There was no information on the investigation
      into the abduction, beating, and killing in October 2022 of Christian convert and Lao Evangelical
      Church (LEC) Pastor Sy Sengmanee in Khammouane Province, although authorities said the case remained
      under investigation. In September and October, local officials in rural areas in Sa Mouay District,
      Salavan Province, reportedly destroyed homes of Christian converts across four villages, forcing
      families to leave. According to sources, officials offered land to some of the families for rebuilding
      homes in one village but without other compensation. Media outlets reported that in February, villagers
      in Luang Namtha Province forced more than a dozen Christian convert families and a pastor from their
      homes, and that officials’ attempts to intervene and mediate the dispute to allow families to return
      were unsuccessful.'
