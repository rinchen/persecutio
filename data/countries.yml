- title: Uganda
  slug: uganda
  iso3: UGA
  status: open
  persecution_level: Low
  lat: 1.37
  lng: 32.29
  modern: Uganda has generally respected Christian worship, though Muslim minorities
    in some regions report local friction and occasional attacks. Anti-LGBTQ laws
    have raised international concern, and some faith leaders have been targeted from
    multiple sides, but this is not systematic state persecution of Christians.
  historical: Catholic and Protestant missions shaped Ugandan education and society
    from the 19th century onward. The Uganda Martyrs became a powerful Catholic and
    Anglican symbol, and churches remained influential through colonialism and independence.
