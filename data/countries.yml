- title: Malaysia
  slug: malaysia
  iso3: MYS
  status: warning
  persecution_level: Moderate
  lat: 4.21
  lng: 101.97
  modern: Christians face local restrictions on church construction, religious education,
    and proselytization while societal tensions sometimes turn violent on the Malay
    peninsula and in East Malaysian states.
