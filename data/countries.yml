    wiki_url: https://en.wikipedia.org/wiki/Burkina_Faso
    wiki_extract: Burkina Faso is a landlocked country in West Africa. It is bordered by Mali to the northwest,
      Niger to the northeast, Benin to the southeast, Togo and Ghana to the south, and Ivory Coast to
      the southwest. It covers an area of 274,223 km2. In 2024, the country had an estimated population
      of approximately 23,286,000. After independence it was called the Republic of Upper Volta from 1958
      to 1984. It was renamed Burkina Faso by then-president Thomas Sankara. Its citizens are known as
      Burkinabes, and its capital and largest city is Ouagadougou.
