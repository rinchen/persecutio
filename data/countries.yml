    - Religious freedom conditions in Sudan have improved significantly, although serious challenges remain.
      Within the first several months of assuming power, the transitional government, under the leadership
      of Prime Minister Abdalla Hamdok, has made concrete moves to improve religious freedom.
    uscirf_url: https://www.uscirf.gov/countries/sudan
    state_dept_url: https://www.state.gov/reports/2023-report-on-international-religious-freedom/sudan/
    state_dept_executive_summary: The 2019 constitutional declaration includes several provisions protecting
      the right to freedom of religious belief and worship “in accordance with the requirements of the
      law and public order.” As stipulated in the declaration, existing laws and institutions governing
      religion are to remain in effect while the government works to amend and restructure them. The 2020
      Juba Peace Agreement (JPA), which was integrated into the 2019 constitutional declaration, includes
      provisions to respect and promote religious freedom and an agreement to establish a National Commission
      for Religious Freedom. While the previous constitution stated all national legislation should be
      based on sharia, the 2019 constitutional declaration makes no reference to sharia. After a military
      takeover in October 2021, the December 2022 Framework Political Agreement (FPA) outlined a process
      for a return to civilian rule and an overhaul of the security sector and contained a commitment
      for the government to support and protect religious freedom. In April, fighting broke out between
      the Sudanese Armed Forces (SAF) and the paramilitary Rapid Support Forces (RSF). As the conflict
      spread across the country during the year, civilian casualties, population displacement, and destruction
      of property, including places of worship, ensued. The government’s commitments to protecting religious
      freedom contained in the 2019 constitutional declaration, the JPA, and the FPA remained unimplemented.
      Both the SAF and the RSF attacked religious places, including mosques, churches, and religious communities,
      through targeted assaults and reports of indiscriminate shelling. On May 14, Christian advocacy
      organization CSW (formerly knowns as Christian Solidarity Worldwide) reported the Al Zareeba Mosque
      in El Geneina, West Darfur, was the target of an aerial strike that killed 280 persons and wounded
      more than 160 others.
