    uscirf_key_findings:
    - Religious communities in China face persecution when they refuse to submit to the government’s all-encompassing
      control over religious affairs. Authorities surveil, detain, fined, forcibly disappeared, imprison,
      torture, and deny medical care to Uyghur Muslims, Tibetan Buddhists, underground Catholics, house
      church Protestants, Falun Gong practitioners, Church of Almighty God members, and others. Authorities
      engage in transnational repression against religious freedom activists living abroad.
    uscirf_url: https://www.uscirf.gov/countries/china
    state_dept_url: https://www.state.gov/reports/2023-report-on-international-religious-freedom/china/
    state_dept_executive_summary: 'Reports on Hong Kong, Macau, Tibet, and Xinjiang are appended at the
      end of this report. The constitution of the People’s Republic of China (PRC), which cites the leadership
      of the Chinese Communist Party (CCP), states that citizens “enjoy freedom of religious belief” but
      limits protections for religious practice to “normal religious activities” without defining “normal.”
      The government recognizes five official religions: Buddhism, Taoism, Islam, Protestantism, and Catholicism.
      Only religious groups belonging to one of the five state-sanctioned “patriotic religious associations”
      representing these religions are permitted to register with the government and are officially permitted
      to hold worship services. Regulations require clergy to pledge allegiance to the CCP and socialism
      and to “resist illegal religious activities and religious extremist ideology, and resist infiltration
      by foreign forces using religion.” On September 1, new administrative measures took effect requiring
      monasteries, churches, mosques, temples, and other “places of religious activity” to uphold the
      leadership of the CCP, implement “Xi Jinping Thought on Socialism with Chinese Characteristics,”
      and promote the “Sinicization” of religion. The measures also stipulate that the content of sermons
      should both reflect “socialist core values” and be integrated with “traditional Chinese culture.”
      The law bans religious or spiritual groups that the government considers to be “cults” or promote
      heterodox teachings. Laws ban unauthorized domestically generated online religious content and prohibit
      overseas organizations and individuals from operating online religious information services in the
      country without a permit. National law prohibits organizations or individuals from interfering with
      the state educational system for minors, effectively barring individuals younger than 18 from participating
      in most religious activities or receiving religious education.'
