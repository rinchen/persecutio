  modern: Indonesia is religiously plural but Christians in some provinces face official restrictions
    on building churches, societal pressure, and occasional mob violence. Blasphemy-related prosecutions
    and local regulations can target minority Christians, especially in Aceh and some Javanese districts.
  historical: Christianity arrived in the form of Portuguese Catholic missions and later Dutch Protestant
    missions in the Moluccas, Papua, and Batak lands. Communities in Flores and East Timor have long Catholic
    traditions, while Post-independence Pancasila ideology limited some religious expressions and generated
    periodic communal conflict.
