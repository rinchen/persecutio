    archive_od_brief: The very strong Religious nationalism in society puts a lot of pressure on Christians.
      Society’s nationalism leaves almost no space for Christians to make an alternative message heard.
      In Turkey, nationalism and Islam are intrinsically linked and anyone who is not a Muslim, particularly
      a con vert or someone who openly lives out their different faith, is not seen to be a loyal Turk.
      Similarly, Turkish secularism is also strongly nationalistic, with Christianity being viewed by
      both Muslims and secularists as a negative Western influence. Although conversion from Islam to
      Christianity is not legally forbidden, converts from Islam can be put under pressure by their families
      and communities to return to Islam. Likewise, Turkish Christians coming from a more secular background
      also can face se vere pressure at times to recant their new faith. Once known, a Christian with
      a Muslim background may be threatened with divorce and the loss of inheritance rights by family
      members. Some Christians therefore lead a double life and hide their conversion. However, others
      boldly and openly live out their faith, reflecting diversity both within the Turkish church as well
      as within Turkish society.
