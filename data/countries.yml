    archive_od_brief: Christian communities in India are increasingly under threat from Hindu radicals
      who view all Christians as alien to the nation. They want to cleanse their country from Islam and
      Christianity and do not shy away from using violence to achieve this. Converts to Christianity from
      a Hindu background bear the brunt of the persecution in India and are constantly under pressure
      to return to Hinduism, especially via campaigns knows as Ghar Wapsi (”home-coming”). They are often
      physically assaulted and sometimes killed.
