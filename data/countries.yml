    state_dept_executive_summary: The constitution establishes Islam as the official religion and states
      that no law may be enacted contradicting the “established provisions of Islam.” It provides for
      freedom of religious belief and practice for all individuals, including Muslims, Christians, Yezidis,
      and Sabean-Mandeans, but it does not explicitly mention followers of other religions or atheists.
      Restrictions on freedom of religion remained widespread outside the Iraqi Kurdistan Region (IKR).
      Activities that promote the normalization of relations with Israel have long been illegal, with
      penalties as severe as life in prison and the death penalty. The legal code also prohibits Jews
      from joining the military and holding jobs in the public sector. The Iraqi High Commission for Human
      Rights (IHCHR) reported receiving hundreds of complaints from relatives of persons detained on terrorism
      charges, citing claims of arrests based on malicious prosecutions, torture, and forced disappearance.
      Sunni leaders said these abuses frequently targeted Sunnis held on terrorism charges. Sunni political
      leaders continued to protest the allegedly illegal detention of Sunni Arabs, who represent approximately
      90 percent of all prisoners in detention, including 9,000 who received death sentences. International
      and local nongovernmental organizations (NGOs) said the government continued to use the antiterrorism
      law as a pretext for detaining individuals without due process, most of whom were Sunni Arabs, including
      those suspected of having links to ISIS. Popular Mobilization Forces (PMF) militias frequently threatened
      members of Sunni and minority communities with terrorism charges to silence their dissent, especially
      in areas where the militias have taken over local land and economic activities and blocked the return
      of internally displaced persons (IDPs).
