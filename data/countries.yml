    wiki_url: https://en.wikipedia.org/wiki/Sri_Lanka
    wiki_extract: Sri Lanka, officially the Democratic Socialist Republic of Sri Lanka, formerly known
      as Ceylon, is an island country in South Asia. It is located in the Indian Ocean, southwest of the
      Bay of Bengal, and is separated from India by the Gulf of Mannar and the Palk Strait. Sri Lanka
      shares a maritime border with the Maldives to the southwest and India to the northwest, and lies
      across the Bay of Bengal from Bangladesh and Myanmar to the northeast and the Andaman and Nicobar
      Islands of India to the east. Its executive and judicial capital is Colombo, which is also its largest
      city and the political, financial and cultural centre of the country; neighboring Sri Jayawardenepura
      Kotte is the legislative capital. Sri Lanka's population is 22 million. About 74% of the population
      are Sinhalese, who speak the Sinhala language, and about 15% are Tamils who speak the Tamil language.
      Other long-established ethnic groups include the Moors, Indian Tamils, Burghers, Malays, Chinese,
      and Vedda.
