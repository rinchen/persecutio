    state_dept_executive_summary: The constitution provides all persons the right to religious freedom,
      including the right to engage in religious ceremonies and acts of worship. The constitution declares
      the country a secular state. Under the constitution, Indigenous communities enjoy a protected legal
      structure, allowing them some measure of self-governance to practice their own particular “uses
      and customs,” with the provision that the law must be applied in line with human rights guarantees
      in the constitution and in the international conventions to which the country is a party. The General
      Directorate for Religious Affairs (DGAR) within the Secretariat of the Interior (SEGOB) worked throughout
      the year with state and local officials on criminal investigations involving religious groups. In
      August, residents of majority-Roman Catholic Rancho Nuevo, Hidalgo State, robbed and destroyed the
      home of Baptist Pastor Rogelio Hernandez Baltazar. The vandalism was reportedly in retaliation for
      Hernandez’s efforts to intervene in a 2022 incident involving Catholic community leaders who severely
      beat an Indigenous Baptist woman. Authorities had not arrested any perpetrators of the two violent
      incidents, even though community members identified the assailants by name. In January, the Inter-American
      Commission on Human Rights issued precautionary measures in favor of 11 Jesuit priests facing a
      “grave and urgent” situation in Cerocahui, Chihuahua State. According to SEGOB, DGAR investigated
      three new religious freedom-related cases, compared with five in 2022. During the year, the National
      Council to Prevent Discrimination (CONAPRED) opened two religious discrimination cases, the same
      number as in 2022. DGAR registered 196 religious associations during the year, compared with 149
      in 2022. Nongovernmental organizations (NGOs) said municipal and state officials frequently sided
      with local leaders at the expense of members of minority religious groups.
