- title: Eritrea
  slug: eritrea
  iso3: ERI
  status: severe
  persecution_level: Very High
  lat: 15.17
  lng: 39.78
  modern: The government controls all recognized religious communities and effectively
    banned unregistered evangelical churches in 2002. Hundreds of unregistered Christians
    remain detained without charge, and children are interrogated about home worship.
    Military conscription is enforced under harsh conditions and can affect religious
    practice.
  historical: Christianity arrived in the 4th century and made Eritrea one of Africa's
    oldest Christian regions. Italian, British, and later Ethiopian rule shaped modern
    denominations. Since independence, restrictive religious policy has increased
    state oversight of worship.
  sources:
