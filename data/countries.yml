    wiki_url: https://en.wikipedia.org/wiki/Iran
    wiki_extract: Iran, officially the Islamic Republic of Iran, historically known as Persia, is a country
      in West Asia. It borders Iraq to the west, Turkey, Azerbaijan, and Armenia to the northwest, the
      Caspian Sea to the north, Turkmenistan to the northeast, Afghanistan to the east, Pakistan to the
      southeast, and the Gulf of Oman and the Persian Gulf to the south. With a population of over 92
      million, Iran ranks 17th globally in both geographic size and population. It is divided into five
      regions with 31 provinces. Tehran is the nation's capital and largest city and serves as its primary
      economic centre.
