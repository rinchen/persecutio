- title: Central African Republic
  slug: central-african-republic
  iso3: CAF
  status: persecution
  persecution_level: High
  lat: 6.61
  lng: 20.93
  modern: Armed groups attack churches, kill clergy, and displace Christian villages,
    while religious leaders are sometimes targeted for mobilizing peacebuilding. Militia
    violence and communal tensions remain acute.
  historical: Catholic and Protestant missions expanded in the late 19th and 20th
    centuries, but decades of coups, rebellions, and foreign intervention have repeatedly
    destabilized Christian communities and displaced populations.
