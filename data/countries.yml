    archive_od_brief: All Bhutanese citizens are expected to follow Buddhism. Christians have to make
      unofficial arrangements for meeting and are technically forced to worship illegally, since no Christian
      congregation has ever been allowed to build a church structure. Converts to Christianity will be
      watched with suspicion and efforts are usually made to bring them back to their former religion.
      Buddhist monks (or other religious leaders), the local community and family often cooperate in this.
      Christians are also mocked and singled out in social media. Apart from converts, many Christians
      come from the Nepalese minority. Local authorities often refuse to issue known Christians with a
      'non-objection certificate' which is needed for loan applications, registering property, applying
      for jobs and the renewal of ID cards.
    archive_od_url: https://www.opendoors.org/persecution/reports/Bhutan-Full_Country_Dossier-ODI-2025.pdf
    state_dept_executive_summary: The constitution recognizes Buddhism as the state’s “spiritual heritage,”
      provides for freedom of religion, and bans discrimination based on religious belief. The constitution
      states religious institutions and personalities shall remain “above politics.” The law restricts
      speech and written communication that promotes or attempts to promote enmity among religious groups
      and requires religious groups to obtain licenses to hold public religious gatherings. Unregistered
      religious groups, including Christians, reported being able to worship in private, although as unregistered
      groups, they were not permitted to organize publicly, own property, raise funds, conduct outreach
      activities, or import literature. According to the international Christian nongovernmental organization
      (NGO) Open Doors, no churches had obtained official state recognition, meaning any gatherings for
      worship were technically illegal. Christian groups continued to report their primary concern remained
      the inability to acquire burial plots and the lack of a governmental process to do so. Open Doors
      reported some Buddhist monks opposed the presence of Christians, sometimes putting pressure on them
      to reconvert. According to the report, deviation from traditional Buddhist beliefs was regarded
      as disrupting culturally valued social harmony; family and community members also put pressure on
      converts to return to Buddhism. Open Doors also reported that non-Christian individuals sometimes
      disrupted meetings of Christians and questioned the legality of their meeting. Some Christian pastors
      reported societal discrimination against Christians had faded significantly over the years and was
      largely a problem of the past, although they said some converts experienced familial pressure to
      return to Buddhism. The United States does not have formal diplomatic relations with Bhutan; the
      U.S. Embassy in New Delhi oversees unofficial bilateral relations.
