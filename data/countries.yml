    archive_od_brief: ''
    archive_od_url: https://www.opendoors.org/research-reports/country-dossiers/WWL-2025-Philippines-Persecution-Dynamics
    state_dept_executive_summary: The constitution provides for the free exercise of religion and religious
      worship and prohibits the establishment of a state religion. The constitution provides for the separation
      of religion and state, and religious groups are required to register to obtain tax-exempt status.
      As part of the government’s campaign against groups pursuing violent opposition to the state, particularly
      the Communist Party of the Philippines-New People’s Army (CPP-NPA), the government pursued court
      cases against some religious workers who were identified by the government as communist members
      or sympathizers. In March, a regional court convicted a financial official of the Rural Missionaries
      of the Philippines (RMP) of terrorist financing. Cases against others charged in 2022, including
      four Catholic nuns, remained pending. In October, authorities arrested drag performer Pura Luka
      Vega under the section of the criminal code that prohibits performances that “offend any race or
      religion.” In August, Senator Robin Padilla, a Muslim, urged the Senate to investigate a shooting
      earlier that month at a police station allegedly connected to discrimination and harassment against
      Muslims; the incident resulted in the death of a police officer and the serious wounding of another.
      The House of Representatives in January overwhelmingly approved the Magna Carta of Religious Freedom
      Act which specifies the rights of individuals related to religious beliefs as well as punishment
      of those who contravene such rights. Humanists, atheists, Muslims, and other religious minorities
      expressed continuing concern that the bill favored Christians and did not offer equal protections
      of the right to not believe in any form of religion. The Senate held a hearing on the legislation
      in August, and it remained pending at year’s end.
