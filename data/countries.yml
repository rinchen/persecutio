    state_dept_executive_summary: The constitution declares the state is secular and guarantees freedom
      of religion, equal rights irrespective of religious belief, and the right to worship and profess
      one’s religion. The law states government officials may prohibit the activity of a religious association
      for violating public order or engaging in “extremist activity.” The law allows the government to
      criminalize a broad spectrum of activities as extremist but does not precisely define extremism.
      A law enacted in 2022 authorizes creation of a confidential database of materials defined as extremist
      and a “unified register” of individuals in organizations defined as terrorist or extremist. Another
      2022 law requires certain organizations, including religious groups and individuals, to publicly
      identify themselves as foreign agents, which critics say is intended to discredit them. The law
      identifies Christianity, Islam, Judaism, and Buddhism as the country’s four “traditional” religions
      and recognizes the special role of the Russian Orthodox Church (ROC). Religious groups and nongovernmental
      organizations (NGOs) again reported authorities investigated, detained, imprisoned, tortured, and
      physically abused persons and seized their property because of their religious belief or affiliation
      or membership in groups designated “extremist,” “terrorist,” or “undesirable.” Targeted groups included
      Jehovah’s Witnesses, the Mejlis of the Crimean Tatars, Hizb ut-Tahrir, Tablighi Jamaat, followers
      of Turkish Muslim theologian Said Nursi, the Church of Scientology, Falun Gong, and multiple evangelical
      Protestant groups. In one example, the leader of a Saint Petersburg Church of Scientology received
      a sentence of six-and-a-half years in prison for incitement to hatred or enmity by an organized
      group and creation of an extremist community. According to Jehovah’s Witnesses representatives,
      as of December 18, 115 individuals were imprisoned under the charge of extremism.
