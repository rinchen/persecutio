    - Iraq’s religious communities face ongoing challenges 11 years after the Islamic State of Iraq and
      Syria (ISIS) waged genocide against religious and ethnic minorities. Iraq has improved some FoRB
      conditions while falling short in others, such as blasphemy laws and changes to personal status
