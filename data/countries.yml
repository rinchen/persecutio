    state_dept_executive_summary: The National Committee for Reconciliation and Development (CNRD), which
      came into power following a military coup d’etat in 2021, promulgated a Transition Charter, which
      serves in lieu of a constitution. The charter states the country is a secular state and any act
      undermining the secular nature of the state or an individual’s religious freedom is considered a
      “high crime” punishable by fines and imprisonment. The penal code provides for freedom of worship
      within limits defined by the law. The Transition Charter stipulates that two members of the country’s
      legislative body, the National Transition Council, be religious community representatives. The cabinet-level
      Secretariat General of Religious Affairs (SRA) issued weekly themes for inclusion in Friday sermons
      at mosques and Sunday sermons in churches. Although the SRA did not control sermons at every mosque
      and church, its inspectors continued to be present in every region and were responsible for ensuring
      that mosque and church sermons were consistent with SRA directives. In June, administrative authorities
      of the Labe region summoned 12 imams for leading the Eid al-Adha prayer a day later than the official
      date decreed by the SRA, interrogating them for more than seven hours. The imams were eventually
      freed following intervention from the Regional Islamic League and pledging to follow instructions
      from authorities in the future. Local human rights activist Mamadou Kaly Diallo criticized the authorities’
      actions in the media, noting that different Islamic groups follow different traditions and previous
      governments had not intervened in such a way. He called the authorities’ actions a threat to social
      peace. During a visit to the Kankan region in February, the Minister of Justice and Human Rights
      defended a local Muslim cleric who conducted prayers in the local vernacular rather than Arabic,
      a stance that was opposed by senior religious leaders.
