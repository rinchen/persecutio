    state_dept_executive_summary: The constitution provides for freedom of religion and prohibits discrimination
      based on religious belief. The law regulates the establishment and operation of religious groups.
      By law, eight major religious groups are charged with electing the head of the National Independent
      Electoral Commission (CENI). On August 30 in Goma, North Kivu Province, government security forces
      confronted members of the Natural Jewish Messianic Faith to the Nations (FNJMN), characterized by
      Human Rights Watch (HRW) as a mystic religious group, who were protesting the presence of peacekeepers
      from the United Nations Organization Stabilization Mission in the Democratic Republic of the Congo
      (MONUSCO) and the East African Community Regional Force (EACRF) and had threatened violence against
      the international community and peacekeepers. Security forces fired on the protesters, reportedly
      killing 57 and wounding at least 75, and arresting 158. One police officer was killed. Military
      tribunals convicted one military officer of murder in the incident and sentenced him to death; three
      officers were each sentenced to 10 years in prison. The tribunals convicted the FNJMN leader, a
      pastor, of murder and other charges and sentenced him to death; 63 other FNJMN members received
      sentences of death or 10-20 years’ imprisonment on similar charges. All the death sentences were
      commuted to life in prison. The Islamic State of Iraq and Syria-Democratic Republic of the Congo
      (ISIS-DRC), known locally as the Allied Democratic Forces (ADF), aU.S.-designated terrorist organization,
      continued to attack civilians indiscriminately in North Kivu and Ituri Provinces, on occasion targeting
      churches and religious leaders. The violence targeted all communities, but most victims were Christian,
      the religious majority. In January, ISIS-DRC/ADF detonated an explosive at a church baptism service
      in Kasindi, North Kivu Province, killing 16 and injuring at least 62.
