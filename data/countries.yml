- title: Bangladesh
  slug: bangladesh
  iso3: BGD
  status: severe
  persecution_level: Very High
  lat: 23.68
  lng: 90.35
  modern: Christians, especially converts and tribal communities, face violence, kidnapping,
    and pressure from Islamist actors. Anti-conversion narratives and blasphemy-related
    tensions put churches and leaders at risk.
  historical: Catholic and Protestant missions operated largely among tribal and remote
    communities and later expanded urban ministries. Communal violence and new legal
    restrictions in the late 20th and early 21st centuries increasingly targeted Christian
    minorities.
