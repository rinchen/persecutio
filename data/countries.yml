    wiki_extract: Syria, officially the Syrian Arab Republic, is a country in West Asia located in the
      Eastern Mediterranean and the Levant. It borders the Mediterranean Sea to the west, Turkey to the
      north and northwest, Iraq to the east and southeast, Jordan to the south, and Israel and Lebanon
      to the southwest. It is a republic under a provisional government and comprises 14 governorates.
      Damascus is the capital and largest city. With a population of 26 million across an area of 185,180
      square kilometres (71,500 sq mi), it is the 56th-most populous and 87th-largest country.
