    state_dept_executive_summary: The constitution prohibits discrimination based on religion; provides
      for freedom of belief, religion, and worship; and states no one “shall be obligated by coercive
      measures to declare his or her ideology or beliefs.” According to multiple media reports, nongovernmental
      organizations (NGOs), and international organizations, the government accelerated its attacks on
      the Roman Catholic Church and evangelical Christian (also known as evangelicals) groups, the two
      most observed faith traditions in the country. Throughout the year, police arrested 27 Catholic
      priests and two Catholic seminarians, detained many other Catholic priests for short periods of
      time for interrogation purposes, and expelled from the country 18 Nicaraguan and three foreign-national
      Catholic priests. In April, President Daniel Ortega called the country’s Catholic Church hierarchy
      “bishops of Satan.” In September, during the 54th session of the UN Human Rights Council, the UN
      High Commissioner for Human Rights reported his office “continued to document violations of freedom
      of religion and belief, mainly directed against the Roman Catholic Church, including arbitrary detentions.”
      In February, a judge sentenced Bishop Rolando Alvarez, without trial, to 26 years in prison and
      revoked his citizenship for committing treason and cybercrimes. The same month, the government exiled
      222 political prisoners who had been accepted for humanitarian parole into the United States, including
      six Catholic priests and five others affiliated with the Catholic Church. After the former political
      prisoners arrived in the United States, the Managua Court of Appeals declared those individuals
      “traitors” and declared the government had stripped them of their citizenship.
