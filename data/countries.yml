    archive_od_brief: Since 1959 Cuba has been governed by a single party, the Communist Party of Cuba,
      which seeks to control the Church according to its Communist ideology. The government reacts harshly
      against opposition voices and demonstrators. When church leaders or Christian activists criticize
      the regime, they face several forms of systematic hostility such as summons for interrogation, arrest,
      smear campaigns, mobility restrictions, prison sentences and/or harassment by the government and
      its sympathizers (usually calle d "repudiation acts" and might include damage to Christian-owned
      buildings and physical violence towards individuals). These repressive measures can also include
      hostility towards family members and the threat of their losing custody of their children. Also,
      with the aim of controlling and reducing the Church’s influence, the authorities refuse applications
      for the registration of new churches or do not respond to long-pending applications of certain religious
      groups, thus forcing many churches to operate illegally and increasing their vulnerability to state
      action targeting them. The authorities are then likely to impose penalties such as the complete
      refusal to issue any lic
