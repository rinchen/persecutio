      Central Asia. Dushanbe is the capital and largest city of the country, with a population of over
      1.2 million. Tajikistan borders Afghanistan to the south, Uzbekistan to the west, Kyrgyzstan to
      the north, and China to the east; it is narrowly separated from Pakistan by Afghanistan's Wakhan
      Corridor. Its total population exceeds 11 million.
