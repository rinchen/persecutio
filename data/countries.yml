      and communal worship often occurs under the threat of violence. The presence of such radical Islamic
      faction s has led to frequent physical attacks and kidnappings, significantly limiting the freedom
      and safety of Christians in these regions. Converts from Islam to Christianity face particularly
      harsh challenges. These individuals often endure severe hostility from their families, including
      threats and coercion to abandon their new faith. Social ostracism and pressure are common, making
      it extremely difficult for converts to practice their beliefs openly. This situation is exacerbated
      by legal and bureaucratic hurdles that complicate the registration and establishment of Christian
      congregations, further isolating converts and Christian communities. In addition to these threats,
      Christians in Niger face discrimination in employment, particularly in the public sector, and are
      frequently targeted in attacks against church-affiliated properties such as schools and healthcare
      facilities. The broader ins
    archive_od_url: https://www.opendoors.org/persecution/reports/Niger-Full_Country_Dossier-ODI-2025.pdf
    state_dept_executive_summary: The country has been under military rule since the July overthrow of
      President Mohamed Bazoum’s government by the Council for the Safeguard of the Homeland (CNSP). The
      constitution and government institutions have been suspended. The suspended constitution prohibits
      religious discrimination and provides for freedom of religion and worship consistent with public
      order, social peace, and national unity. It provides for the separation of state and religion and
      prohibits religiously affiliated political parties. In September, the CNSP released Muslim cleric
      Alfa Ali Boubacar from Filingue prison. He had previously been arrested and charged by officials
      in Mohamed Bazoum’s administration for uttering a fatwa against the administration while conducting
      prayers. The Bazoum administration did not achieve its stated intent to fully implement the 2019
      National Worship Strategy before the coup in July. As of year’s end, the CNSP had not given any
      indication of plans for a worship strategy. The previous administration provided guidance on sermons
      and encouraged preachers to focus on promoting national unity, brotherhood, and peaceful coexistence
      in their sermons, through the media, or in public places such as market stalls or occasional ceremonies.
      Since the coup, various religious groups, including Muslims, Christians, Baha’is, and Animists held
      prayer sessions in mosques, churches, or at anti-French protests across the country in support of
      the CNSP and against the sanctions imposed by the Economic Community of West African States (ECOWAS).
      Muslims and Christians also exchanged congratulatory messages marking major religious celebrations
      such as Mawlid that celebrates the Prophet Muhammad’s birthday, and Christmas, during which they
      reiterated calls for peaceful coexistence between their respective communities and within the country’s
      population in general.
