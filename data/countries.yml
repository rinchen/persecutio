  modern: The 2014-2017 ISIS advance devastated Assyrian, Chaldean, and Armenian communities in Mosul
    and the Nineveh Plains. Many remain displaced. Returning Christians face militia pressure, land disputes,
    and fragile security. Church bombings and threats still recur. The main focus of pressure on Iraqi
    Christians following the territorial losses by the Islamic State group (IS) has been the Shia militias
    backed by Iran. However, IS continued its attacks against civilians, infrastructure and security forces
    in 2023, and to a lesser extent in 2024. Both Turkey and Iran also continued airstrikes and - in Turkey's
    case - ground operations in various areas of the Iraqi Kurdistan… The constitution establishes Islam
    as the official religion and states that no law may be enacted contradicting the “established provisions
    of Islam.” It provides for freedom of religious belief and practice for all individuals, including
    Muslims, Christians, Yezidis, and Sabean-Mandeans, but it does not explicitly mention followers of
    other religions or atheists.
  historical: Mesopotamia is the cradle of Eastern Christianity, with communities dating to the 1st-2nd
    centuries. These communities thrived under the Abbasids, endured Timurid and Mongol raids, and continued
    under the Ottoman millet system, only to face existential threat in the 21st century from jihadist
    violence and mass displacement.
