  modern: Non-Muslim worship is permitted only in private or designated areas. Proselytizing Muslims is
    illegal. Christian expatriates worship quietly, but any public display or outreach is prohibited.
    Convert families face social pressure. Omani citizens who convert to Christianity are put under pressure
    from the government, family and society to recant their faith. They can be expelled from the family
    home and from their jobs and face problems over child custody and inheritance. Expatriate Muslims
    converting to Christianity experience similar pressure as in their home countries, as they are often
    living within their own national or ethnic communities. The Basic Law declares Islam to be the state
    religion and declares sharia is the basis for legislation. It protects the right of individuals to
    practice other religions as long as doing so does not “disrupt public order or contradict morals.”
    According to the law, offending Islam or any other Abrahamic religion is a criminal offense.
  historical: Ancient Christianity existed in Oman through the Church of the East. Islam became dominant
    from the 7th century. Modern Christian presence is largely due to expatriate workers from South Asia
    and the West.
