      a court sentenced five members of the Tizi Ghenif church to three years in prison and a fine for
      unauthorized worship and producing religious materials for distribution. In October, the same court
      sentenced Pastor Allahoum of the Ouacif church to two months in prison and a fine for opening a
      place of worship without authorization. Both cases were pending appeal. On February 1, the Supreme
      Court overturned on appeal the conviction of Said Djabelkhir, an Islamic scholar specializing in
      Sufism and a founder of the “Circle of Enlightenment for Free Thought,” of blasphemy. In 2021, Djabelkhir
