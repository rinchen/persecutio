    archive_od_brief: There are two categories of Christian communities in Qatar; they are separate from
      each other and have to be careful when interacting with each other. The largest group-the community
      of expatriate Christians-is made up of Christian migrant workers. Proselytizing Muslims is strictly
      forbidden and can lead to prosecution and deportation. However, large worship events have been allowed
      in the past. A major issue remains the lack of sufficient church space, since only a select number
      of churches have been allowed to establish buildings at the official Religious Complex outside the
      capital, Doha. Many migrant workers have to live and work in poor conditions, while their Christian
      faith adds to their vulnerability. The other group consists of converts from Islam to Christianity.
      Both converts from an indigenous and migrant background bear the brunt of persecution. Converts
      with Qatari citizenship face very high pressure from their Muslim families. Converts from a migrant
      background are primarily controlled by the social environment they live in. Often, the social norms
      of their home countries apply to them rather than Qatari cultural norms. In some cases, they can
      avoid pressure by l
    archive_od_url: https://www.opendoors.org/persecution/reports/Qatar-Full_Country_Dossier-ODI-2025.pdf
    state_dept_executive_summary: 'The constitution states Islam is the state religion and sharia shall
      be “a main source” of legislation. According to the constitution, the Emir must be Muslim. The constitution
      guarantees the freedom to practice religious rites in accordance with “the maintenance of public
      order and morality.” The law punishes “offending” Islam or any of its rites or beliefs or committing
      blasphemy against Islam, Christianity, or Judaism. Sunni and Shia Muslims and eight Christian denominations
      constitute the registered religious groups in the country. Unregistered religious groups are illegal,
      but authorities generally permit them to practice their faith in private. Proselytizing for any
      faith other than Islam is prohibited. In October, the UN Committee on Economic, Social and Cultural
      Rights (CESCR) raised concerns regarding reports of discrimination of religious minorities in the
      country, including the Baha’i Faith community, some of whom are citizens. According to CESCR, Baha’is
      were subjected to administrative deportation and blacklisting, resulting in loss of employment and
      familial separation. In March, the Baha’i International Community stated to the UN Human Rights
      Council, “Qatar is slowly pursuing a number of actions which will ultimately lead to the eradication
      of one of its religious minorities from society: the members of the Baha’i Faith, many of whom were
      born in Qatar and whose families have been there for generations.” In November, the Baha’i Faith
      community reported its members had recently experienced increased government intimidation, stating
      that the government denied several Baha’i foreign residents security clearances or certificates
      of good conduct when offered new jobs. In November, English language daily the New Indian Express
      reported that the 19 Indian schools operating in the country had removed Diwali as an official school
      holiday because of a government order to do so.'
