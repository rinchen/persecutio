    archive_od_url: https://www.opendoors.org/persecution/reports/Mali-Full_Country_Dossier-ODI-2025.pdf
    state_dept_executive_summary: The new constitution that came into force in July recognizes the country
      as secular and prohibits religious discrimination and grants individuals freedom of religion in
      conformity with the law. The law criminalizes abuses against religious freedom. Civil society organizations
      continued to report that the transition government and security forces struggled to control violence
      generated by extremist groups, including those with stated religious ideologies. In August, authorities
      sentenced Adama Fomba, an adherent of Kemetism, to five years imprisonment for a religious offense.
      In February, a Bamako court sentenced the leader of Kemetism, Fakoly Doumbia, to one year’s imprisonment,
      including eight months suspended, for “offenses of a religious nature capable of causing disturbance
      to public order.” The Ministry of Religious Affairs, Worship, and Customs (MARCC) supported the
      High Islamic Council (HCI)’s efforts to organize conferences and workshops on countering violent
      extremism. In collaboration with the HCI and representatives from Catholic and Protestant churches,
      MARCC published preaching guidelines in January aimed at combating violent extremism. MARCC also
      renewed a training program for imams with the Moroccan government. Individuals affiliated with organizations
      the government labels as terrorists, including organizations designated as such by the U.S. government,
      continued to use violence and launch attacks on civilians, security forces, peacekeepers, and others
      perceived as not adhering to the terrorists’ interpretation of Islam. According to media reports,
      on July 9, individuals affiliated with ISIS-Sahel, amputated the hands and feet of two men accused
      of collecting taxes falsely claimed to be on behalf of ISIS-Sahel in the local market of Inchinanane
      in the Menaka Region.
