    wiki_url: https://en.wikipedia.org/wiki/Cuba
    wiki_extract: Cuba, officially the Republic of Cuba, is an island country in the Caribbean. It comprises
      the eponymous main island as well as 4,195 islands, islets, and cays. Situated at the convergence
      of the Caribbean Sea, Gulf of Mexico, and Atlantic Ocean, Cuba is located east of the Yucatán Peninsula,
      south of both Florida and the Bahamas, west of Hispaniola, and north of Jamaica and the Cayman Islands.
      Havana is the largest city and capital. Cuba is the third-most populous country in the Caribbean
      after Haiti and Dominican Republic, with about 10 million inhabitants. It is the largest country
      in the Caribbean by area. Culturally, Cuba is considered part of Latin America.
