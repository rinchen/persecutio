      This has particularly been the case for the “Group for the Support of Islam and Muslims" (JNIM).
      Of concern, the tri-border zone of Mali, Burkina Faso and Niger has become a base for Islamic insurgency,
      with the continuous attacks by jihadist groups highlighting the ongoing instability and security
      challenges in the region. Christi ans have been targeted and killed and churches have been destroyed.
      Christians of Muslim background are the most persecuted Christian group in the country. Similar
      attacks in Niger, Mali and the greater Sahel region are making the situation in Burkina Fas o very
      serious. Christians have been targeted in villages, churches and workplaces. Hundreds of churches
      have been closed due to jihadist activities. Family and community members reject converts and try
      to force them to renounce their Christian faith, making them afraid to express their faith in public
      because of such threats. The scope for religious freedom for Christians is contracting as jihadist
      ideologies gain traction an
    archive_od_url: https://www.opendoors.org/persecution/reports/Burkina-Faso-Full_Country_Dossier-ODI-2025.pdf
    state_dept_executive_summary: The Transitional Charter, which supersedes the constitution and operates
      as the guiding legal text under the military government of Transition President Ibrahim Traore,
      states that all legal matters are determined by the 1991 constitution unless the transitional legislature
      decides otherwise. The constitution declares that the country is a secular state. The constitution
      and other laws provide for the right of individuals to choose and change their religion and to practice
      the religion of their choice. The government, known as the Transitional Authorities (TA), generally
      maintained policies permitting the free practice of religion in areas it controlled, according to
      government officials and members of religious groups and associations. Nongovernmental organization
      (NGO) sources said state security forces illegally arrested and then rendered incommunicado religious
      leaders because they were from the Fulani ethnic group, which the NGOs said was often suspected
      of siding with terrorists because armed groups recruited within the mostly Muslim Fulani community.
      Because religion and ethnicity are closely linked, it was difficult to categorize most arrests as
      being solely based on religious identity, however, and the TA condemned the stigmatization of vulnerable
      communities, especially the Fulanis. Media reported that some Muslims were arrested for posting
      information on social media that the TA considered threatening. On January 20, Transition President
      Traore met with leaders of the Federation of Islamic Associations of Burkina (FAIB) and encouraged
      them to promote peace and social cohesion. In October, the speaker of the Transitional Legislative
      Assembly (ALT) said the ALT would pass a bill on religious freedom which the drafters said was designed
      to avoid abuses that could undermine efforts for peace and social cohesion, to combat what they
      called religious fanaticism, and to promote interreligious dialogue.
