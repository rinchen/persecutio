- title: Democratic Republic of Congo
  slug: democratic-republic-of-congo
  iso3: COD
  status: persecution
  persecution_level: High
  lat: -4.04
  lng: 21.76
  modern: The Allied Democratic Forces (ADF) and other armed groups attack Christian communities in eastern
    Congo, destroying churches and displacing thousands. Church leaders are targeted for peacebuilding
    efforts, and religious institutions face extortion. Christians in Eastern Congo face significant persecution
    and violence, particularly from the violent Islamic group Alliance of Democratic Forces (ADF-NALU),
    known for its brutal attacks on Christians and churches in North Kivu and Uganda. The ADF , linked
    t o the Islamic State group (IS), has claimed responsibility for several attacks, creating an environment
    of fear and insecurity for Christians in the region. The constitution provides for freedom of religion
    and prohibits discrimination based on religious belief. The law regulates the establishment and operation
    of religious groups. By law, eight major religious groups are charged with electing the head of the
    National Independent Electoral Commission (CENI).
  historical: Catholic and Protestant missions played central roles in education and healthcare during
    the colonial period. Churches remain influential in Congolese society, and religious leaders have
    historically been voices for peace and democracy.
