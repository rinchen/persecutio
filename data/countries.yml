    archive_od_brief: Under President Ortega, churches and Christians are viewed as destabilizing agents,
      thus making them a target for intimidation, harassment, monitoring, legal prosecution, closure and
      expropriation of many Christian organizations (including universities and churches) in addition
      to violent actions with the aim of 'suffocating' the Church and silencing its voice. This has progressively
      intensified since 2018 as church leaders and others have continued to denounce the injustices and
      human rights violations perpetrated by the government. The November 2021 elections and changes to
      the legal framework have been used for increasing restrictions on the Church and Christian leaders
      who publicly called for the rule of law to be respected-especially during and after the election
      period-and who helped those most in need, including those considered opponents by the ruling Sandinista
      Party. Government repression has affected the life, freedom and integrity of Christians in the country,
      as well as the possibility for churches to carry out their activities normally.
