    archive_od_brief: As 2025 sees Myanmar entering a fifth year of an increasingly violent conflict,
      solutions-or even just a ceasefire-are nowhere in sight. After the army staged a coup on 1 February
      2021, fighting has continued and increased in many parts of the country; with the levels of violence
      rising, the government resorts more and more to aerial and missile attacks. An offensive named "Operation
      1027" mounted in Northern Shan state in October 2023 by three powerful ethnic armed groups is still
      ongoing, but has overall put the military junta on the backfoot and forced it to focus more on the
      Burmese heartlands. Mounted by the "Brotherhood Alliance" of t he Arakan Army, the Myanmar National
      Democratic Alliance Army and the Ta'ang National Liberation Army, the offensive overran and occupied
      more than 100 army posts, posing a formidable challenge to an already overstretched army (Reuters,
      10 November 2023). However, the government forces are far from being defeated. The Christian minority
      is among those bearing the brunt of attacks. Even well-established churches belonging to historical
      Christian communities are being attacked in predominantly Christian states like Chin, Kachin and
      Kayah stat
