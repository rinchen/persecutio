  modern: Conversion from Islam is restricted and socially dangerous. Christian worship is generally permitted,
    but proselytizing Muslims is illegal. Convert families face honor-related threats, and churches avoid
    public outreach. Most Christians in Jordan belong to Orthodox or Roman Catholic churches. Overall,
    they enjoy a certain level of religious freedom but experience discrimination in employment and restrictions
    against public preaching. However, an open testimony of faith by a Christian with Muslim background
    can lead to beatings, arrest and killing. The constitution declares Islam the religion of the state
    but safeguards “the free exercise of all forms of worship and religious rites” if they are consistent
    with public order and morality. It stipulates there shall be no discrimination based on religion.
    It does not address the right to convert to another faith, nor are there penalties under civil law
    for doing so.
  historical: Jordan has ancient Christian roots from the early church. Arab Christian communities have
    existed for centuries. Modern Jordan maintains relative tolerance, but legal and social restrictions
    affect converts from Islam.
