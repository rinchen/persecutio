    archive_od_brief: The increased presence of several criminal groups and their struggle for territorial
      control has caused Christians and church leaders living in affected areas to face the constant risk
      of being targeted. This occurs whenever Christians are perceived as being a threat to criminal operations
      or have disregarded criminal group demands. In indigenous communities, those who decide to abandon
      the community religious beliefs (often syncretistic practices related to Catholicism) face rejection
      and punishments Mexico – Persecution Dynamics – December 2024 such as fines, incarceration and forced
      displacement, without any proper investigation and support from state authorities. Hostility towards
      the presence of Christian faith and values in the public arena is becoming more evident, especially
      when Christians express traditional faith-based opinions on marriage, family and life issues. Public
      expressions of Christian faith face strict legal scrutiny.
