- title: Colombia
  slug: colombia
  iso3: COL
  status: warning
  persecution_level: Moderate
  lat: 4.57
  lng: -74.3
  modern: Catholic clergy, Protestant pastors, and Christian human rights defenders
    continue to be targeted by guerrillas, paramilitaries, and criminal gangs, especially
    in Caqueta, Narino, and Norte de Santander. Killings and threats persist despite
    the 2016 peace agreement, and indigenous and Afro-Colombian Christian communities
    are especially vulnerable.
  historical: Catholicism arrived with 16th-century Spanish colonization and shaped
    civic and cultural life for centuries. Political violence between Liberals and
    Conservatives in the 19th and 20th centuries sometimes targeted churches and their
    leaders, and church-state conflict recurred through constitutional and agrarian
    disputes.
  sources:
