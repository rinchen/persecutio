- title: Nicaragua
  slug: nicaragua
  iso3: NIC
  status: restricted
  persecution_level: Moderate/High
  lat: 12.86
  lng: -85.2
  modern: Since 2018 and accelerating after 2021, the Ortega government has arrested,
    exiled, and criminalized opposition clergy. Catholic media and schools have been
    closed or seized, and bishops and priests face charges and house arrest. Religious
    institutions are under severe state scrutiny.
  historical: Catholicism dominated Nicaraguan civic life from the 16th century through
    the 1979 revolution. The Sandinista period initially tolerated, then restricted,
    religious expression; after peace accords in the 1990s the church regained public
    stature before being again targeted in the 2020s.
  sources:
