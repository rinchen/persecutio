- title: Qatar
  slug: qatar
  iso3: QAT
  status: warning
  persecution_level: Moderate
  lat: 25.35
  lng: 51.18
  modern: Proselytizing Muslims is illegal. Non-Muslim worship is permitted only in designated areas.
    Christian expatriates worship with caution, and convert families face social and legal pressure. There
    are two categories of Christian communities in Qatar; they are separate from each other and have to
    be careful when interacting with each other. The largest group - the community of expatriate Christians
    - is made up of Christian migrant workers. Proselytizing Muslims is strictly forbidden and can lead
    to prosecution and deportation. The constitution states Islam is the state religion and sharia shall
    be “a main source” of legislation. According to the constitution, the Emir must be Muslim. The constitution
    guarantees the freedom to practice religious rites in accordance with “the maintenance of public order
    and morality.” The law punishes “offending” Islam or any of its rites or beliefs or committing… Official
    curriculum promotes and endorses discrimination against Christians, Jews, nonbelievers, and Shi’a
    Muslims.
  historical: Qatar has been Muslim since the 7th century. Modern Christian presence is largely due to
    expatriate workers. The government allows limited non-Muslim worship but restricts public expression.
    government estimates the total population at 2.5 million (midyear 2023). Citizens make up approximately
    11 percent of the population, while noncitizens account for approximately 89 percent. Most citizens
    are Sunni Muslims, and almost all others are Shia Muslims.
