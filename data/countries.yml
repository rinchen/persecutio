    loyalty to the Juche ideology. No legal Christian practice is possible. No matter whether North Korean
    Christians are heirs of the Christian communities from the time before the Korean War or whether they
    found Christian faith in other ways (e.g., during the great famine in the 1990s which caused tens
    of thousands of citizens to seek help in China, often finding it in Chinese churches), or whether
    they have come to faith more recently: When discovered by the North Korea – Persecution… The constitution
    provides for freedom of religious belief, with the stipulation that “religion must not be used as
    a pretext for drawing in foreign forces or for harming the State or social order.” In 2022, the UN
    Secretary-General reported that “the right to freedom of thought, conscience, and religion [in the
    DPRK] also continues to be denied, with no alternative belief… North Korean refugees in China face
    severe punishment upon repatriation if they engage in religious activi'
