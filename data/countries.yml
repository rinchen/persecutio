      Religious Council “on all matters relating to the Islamic Religion.” The Sultan may, after consultation
      with the Religious Council, make laws in respect of matters relating to the practice of Islam. The
      government enforces the Sharia Penal Code (SPC), which states offenses such as apostasy and blasphemy
      are punishable by corporal and capital punishment, including stoning to death, amputation of hands
      or feet, or caning, although no capital or corporal sentences were issued or enforced during the
      year. The SPC, in parallel with the secular penal code, applies to both Muslims and non-Muslims,
      including foreigners, with non-Muslims exempted from certain sections. Under the SPC, the Royal
      Brunei Police Force (RBPF) and Religious Enforcement Division officers under the Ministry of Religious
      Affairs (MORA) cooperate on investigations of crimes covered by both secular law and sharia. During
      the annual Legislative Council session in March, the Minister of Religious Affairs reported that
      MORA had increased efforts to investigate crimes related to sharia violations, citing 326 prosecutions
      in 2022, compared with 168 in 2021. The government permitted members of non-Muslim religious minorities
      to practice their faiths but continued to ban religious groups it considered “deviant,” including
      the Ahmadiyya Muslim Community, the Baha’i Faith, and Jehovah’s Witnesses. MORA continued to provide
