    wiki_url: https://en.wikipedia.org/wiki/Libya
    wiki_extract: Libya, officially the State of Libya, is a country in the Maghreb region of North Africa.
      It borders the Mediterranean Sea to the north, Egypt to the east, Sudan to the southeast, Chad to
      the south, Niger to the southwest, Algeria to the west, and Tunisia to the northwest. With an area
      of almost 1.8 million km2 (700,000 sq mi), Libya is the fourth-largest country in Africa and the
      Arab world, and the 16th-largest in the world. The country claims 32,000 square kilometres of southeastern
      Algeria, south of the Libyan town of Ghat. The capital and largest city is Tripoli, located in the
      northwest and containing over a million of Libya's seven million people.
