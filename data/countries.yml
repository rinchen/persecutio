    archive_od_brief: The local authorities have considerable power and tend to be under the influence
      of the local Muslim community. This has strong repercussions for converts to Christianity. It is
      the indigenous Christians with a Muslim background who are bearing the brunt of persecution. Some
      converts are locked up for long periods by their families and beaten. Local Islamic teachers preach
      against them and may cause them to be expelled from their communities. Russian Orthodox churches
      experience the least problems from the government as they do not usually attempt to make contact
      with the Kyrgyz population.
    archive_od_url: https://www.opendoors.org/persecution/reports/Kyrgyzstan-Full_Country_Dossier-ODI-2025.pdf
    state_dept_executive_summary: The constitution provides for freedom of conscience and religion and
      bans religious groups from undertaking actions inciting religious hatred. It establishes the separation
      of religion and state and prohibits pursuit of political goals by religious groups. The law requires
      all religious groups to register with the government and prohibits activity by unregistered religious
      groups. The government maintained bans on 21 “religiously oriented” groups it considered to be extremist,
      including Muslim groups such as Hizb ut-Tahrir and Yakyn Inkar. Under the law, banned groups may
      not conduct any activities within the country, including publishing material online. According to
      local press, the government arrested at least 43 individuals it said were members of Hizb ut-Tahrir
      during the year, compared with nine the previous year. The 39 were detained under suspicion of distributing
      banned religious materials, either through in-person meetings or via social media networks, or for
      holding leadership positions in the organization. From March through June, local media reported
      that a total of 25 Yakyn Inkar members were arrested in the capital of Bishkek and in Chui and Jalalabad
      regions. According to the security services, four Yakyn Inkar members were charged with financing
      the organization’s activities. In March, State Commission on Religious Affairs (SCRA) representatives
      and security personnel raided St. Nicholas Catholic Church in Talas after Sunday evening Mass. Persons
      leaving the state-registered church were forced back into the church by officers, some of whom were
      carrying weapons. Security personnel accused two Slovak nuns of “illegal missionary activities”
      and did not allow congregants to depart the church until the two nuns signed a statement admitting
      to “illegal missionary activities” and “spreading their ideology.” In August, the government raided
      houses of worship in the southern Osh region and shut down 39 mosques and 21 madrassahs.
