    state_dept_executive_summary: The constitution stipulates the separation of religion and state and
      the equality of all religions before the law. It also protects the right of individuals to express
      their religious beliefs and to practice religious rituals, provided these do not violate public
      order or public morality. The law prohibits the government from interfering in religious activities;
      it also states the government and citizens have a responsibility to combat “religious extremism”
      and “radicalism.” The law specifies the government may dissolve religious organizations if they
      cause racial, national, religious, or social animosity; proselytize in a way that “degrades human
      dignity;” or hinder secular education. The State Committee on Religious Associations of the Republic
      of Azerbaijan (SCWRA) appoints religious personnel in all mosques. The government also has authority
      to approve the appointment of religious leaders in non-Islamic religious communities. Local human
      rights groups and detainees said the government continued to physically abuse, temporarily hold
      incommunicado, arrest, and imprison religious activists, and that many arrests and convictions of
      religious figures, including on drug possession charges, were politically motivated. Nongovernmental
      organizations (NGOs) and international observers estimated the government arrested hundreds of activists
      and Shia Muslims whom the government considered “nonconforming.” Many of these arrests occurred
      in conjunction with the country’s escalated tensions with Iran, which included an attack on Azerbaijan’s
      embassy in Tehran in January and the attempted assassination in March in Azerbaijan of a member
      of parliament who was known for his criticism of Iran. The government charged most of the detainees
      with drug possession, but many of those arrested said they believed their arrests were related to
      their online support for Shia clerics in Iran, fundraising for prisoners of conscience, or participation
      in religious pilgrimages to Iran.
