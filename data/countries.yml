    christian_percentage: 0.42
    uscirf_designation: SWL
    uscirf_key_findings:
    - Religious freedom conditions in Azerbaijan are poor. Authorities detain Shi’a
      Muslims whose religious practice falls outside the government's preferred interpretation
      of Islam, and they reportedly subject detainees to mistreatment. Azerbaijan’s
      religion law mandates strict state oversight of religious practice. Ongoing
      repression of independent civil society limits reporting on religious freedom
      violations, and historic Armenian religious sites in Nagorno-Karabakh remain
      at risk of destruction.
