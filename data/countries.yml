    wiki_url: https://en.wikipedia.org/wiki/Myanmar
    wiki_extract: Myanmar, officially the Republic of the Union of Myanmar and also referred to as Burma,
      is a country in northwest Southeast Asia. It is the largest country by area in Mainland Southeast
      Asia and has a population of about 55 million. It is bordered by India and Bangladesh to the northwest,
      China to the northeast, Laos and Thailand to the east and southeast, and the Andaman Sea and the
      Bay of Bengal to the south and southwest. The country's capital city is Naypyidaw, while its largest
      city is Yangon.
