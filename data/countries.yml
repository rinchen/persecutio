    wiki_url: https://en.wikipedia.org/wiki/United_States
    wiki_extract: The United States of America (USA), also known as the United States (U.S.) or America,
      is a country primarily located in North America. It is a federal republic consisting of 50 states
      and a federal capital district, Washington, D.C. The 48 contiguous states border Canada to the north
      and Mexico to the south, with the semi-exclave of Alaska in the northwest and the archipelago of
      Hawaii in the Pacific Ocean. The United States also asserts sovereignty over five major island territories
      and various uninhabited islands in Oceania and the Caribbean. It is a megadiverse country, with
      the world's third-largest land area and third-largest population, exceeding 341 million.
