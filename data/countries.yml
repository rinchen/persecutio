    state_dept_executive_summary: A new constitution went into effect in August. Both the previous constitution
      and the new constitution establish the country as a secular state. The new constitution provides
      for the right to manifest one’s religion, “subject to respect for the law, public order, good morals,
      and the rights of others.” Religious groups other than animists are required to register, and registration
      may be denied to groups deemed morally offensive or subversive. The head of state must take an oath
      to fulfill duties of the office without consideration of religion. The UN Multidimensional Integrated
      Stabilization Mission in the Central African Republic (MINUSCA) said government forces targeted
      Muslims, including Fulani pastoralists, carrying out arbitrary arrests and mistreating detainees.
      In February, according to MINUSCA, soldiers killed a Muslim Fulani herder in Mbres village, Nana-Grebizi
      Prefecture, and stole the cattle of 12 other herders. In May, soldiers severely beat two Fulani
      herders in Ouandago, killing one and detaining the other. In September, authorities arrested Abdoulaye
      Hissene, former leader of a group belonging to the Seleka, an erstwhile coalition of mostly Muslim
      armed groups, charging him with attacks carried out in 2017, and Edmond Patrick Abrou, leader of
      the predominantly Christian anti-Balaka armed coalition, charging him with persecution on religious
      grounds and crimes against humanity. At year’s end, both men remained in detention pending trial.
      In October, the prosecutor at the International Criminal Court (ICC) dropped his case against Maxime
      Mokom, a founder of the anti-Balaka movement, on charges of war crimes and crimes against humanity.
      ICC trials of two other anti-Balaka leaders continued. MINUSCA and Muslim leaders reported government
      discrimination against Muslims, particularly in the issuance of identity cards.
