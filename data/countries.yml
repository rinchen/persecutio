    archive_od_url: https://www.opendoors.org/persecution/reports/Tajikistan-Full_Country_Dossier-ODI-2025.pdf
    state_dept_executive_summary: The constitution provides for the right, individually or jointly with
      others, to adhere to any religion or to no religion and to participate in religious customs and
      ceremonies. The constitution states, “Religious associations shall be separate from the state and
      shall not interfere in state affairs.” The law restricts Islamic prayer to specific locations, regulates
      the registration and location of mosques, and prohibits persons younger than 18 from participating
      in public religious activities. The government’s Committee on Religion, Regulation of Traditions,
      Celebrations, and Ceremonies (CRA) maintains a broad mandate that includes approving registration
      of religious associations, construction of houses of worship, participation of children in religious
      education, and the dissemination of religious literature. The government maintains a list of banned
      extremist organizations. Law enforcement agencies continued to arrest and detain individuals suspected
      of membership in, or of supporting, prohibited groups. The government arrested 195 suspected members
      of “extremist” and “terrorist” organizations in the first half of 2023. Authorities continued a
      crackdown on Ismaili followers of the Aga Khan in the Gorno-Badakhshon Autonomous Region (GBAO),
      populated by the ethnically and religiously distinct Pamiri minority. Authorities reportedly seized
      several properties associated with the Aga Khan. On May 16, Jehovah’s Witnesses member Shamil Khakimov,
      imprisoned since 2019, was released from prison after serving a four-and-a-half-year sentence. Khakimov’s
      health condition seriously deteriorated during his incarceration. On April 11, the Khatlon Regional
      Court sentenced imam Abduhannon Usmonov to six years’ imprisonment “for public calls to extremist
      activities” and “obstructing basic compulsory education.”
