    state_dept_executive_summary: The constitution provides for freedom of religion on the condition its
      practice does not violate public morality, decency, or public order. A 1964 concordat governs relations
      between Venezuela and the Holy See and provides for state funding for Catholic Church-run schools.
      An antihate law criminalizes political party activities promoting “fascism, intolerance, or hatred.”
      Religious groups said they generally enjoyed freedom of religion or belief so long as they refrained
      from criticizing Nicolas Maduro-aligned figures or policies. Representatives of the conference of
      Roman Catholic bishops (the Catholic Episcopal Conference of Venezuela (CEV)), and the Evangelical
      Council of Venezuela (ECV) said Maduro supporters continued to verbally harass clergy and other
      members of their religious communities for calling attention to the country’s humanitarian crisis
      and other criticisms of Maduro. In January, Jorge Rodriguez, president of the Maduro-controlled
      entity calling itself the national assembly, accused the Catholic Church of meddling in political
      issues and supporting U.S. “interventionist” actions. During the year, the Observatory of Religious
      Freedom in Latin America (OLIRE) reported criminal organizations and other nonstate groups operating
      in the country with Maduro’s approval put at risk the security of religious leaders who attempted
      to prevent or denounce the recruitment of youth for armed groups or who disrupted the status quo
      imposed by these groups by providing humanitarian aid. In January, Maduro ordered the National Telecommunications
      Commission (CONATEL) to create a working group to discuss increased access for evangelical Protestant
      churches to radio programming. In October, CONATEL ordered the closure of Catholic-associated radio
      station Radio Fe y Alegria.
