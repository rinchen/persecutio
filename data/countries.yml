    wiki_url: https://en.wikipedia.org/wiki/Central_African_Republic
    wiki_extract: The Central African Republic (CAR) is a landlocked country located in Central Africa.
      It is bordered by Chad to the north, Sudan to the northeast, South Sudan to the east, the Democratic
      Republic of the Congo to the south, the Republic of the Congo to the southwest, and Cameroon to
      the west. The Central African Republic covers a land area of about 620,000 square kilometres (240,000 sq mi).
      As of 2024, it has a population of 5,357,744, consisting of about 80 ethnic groups. Having been
      a French colony under the name Ubangi-Shari, French is its official language, with Sango, a Ngbandi-based
      creole language, as the national and co-official language. Its capital and largest city is Bangui,
      which is on the southern border with the Democratic Republic of the Congo.
