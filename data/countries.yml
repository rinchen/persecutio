    archive_od_brief: ''
    archive_od_url: https://www.opendoors.org/research-reports/country-dossiers/WWL-2025-Sri-Lanka-Persecution-Dynamics
    state_dept_executive_summary: 'The constitution provides for freedom of thought, conscience, and religion,
      including the freedom to change religion. The law recognizes four religions: Buddhism, Islam, Hinduism,
      and Christianity. The constitution and other laws accord Buddhism the “foremost place” among the
      country’s religious faiths and commit the government to protecting it while respecting the rights
      of religious minorities. The trials of the individuals indicted for their involvement in 2019 Easter
      Sunday attacks on Christian churches and luxury hotels that killed 268 persons began on October
      10 and remained in progress at year’s end. According to civil society groups, as of year’s end,
      31 Muslims accused of involvement in the attacks remained in custody, including the 25 who were
      indicted. The other six were detained in prolonged pretrial detention under the Prevention of Terrorism
      Act (PTA), some for more than three years. In response to allegations of government complicity in
      the 2019 Easter bombings, President Ranil Wickremesinghe announced he would appoint an investigative
      committee. Civil society groups said that during the year the government used the country’s International
      Covenant on Civil and Political Rights (ICCPR) Act to curtail freedom of expression and to arrest
      persons for threatening religious harmony and inciting religious hatred. On May 15, President Wickremesinghe
      ordered an investigation into Protestant Christian pastor Jerome Fernando for making derogatory
      statements about Buddhism and followers of other religions in a sermon on social media. Some civil
      society critics and lawyers said the 2022 circular mandating registration for all places of worship
      and outlining requirements for construction and maintenance of religious places was not constitutional.
      Civil society representatives said the government used the regulation to unfairly target minority
      places of worship.'
