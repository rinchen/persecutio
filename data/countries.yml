    archive_od_brief: All categories of Christian communities (except expatriate Christians) are experiencing
      some form of pressure and violence on grounds of their faith. Russian Orthodox churches face the
      least problems from the government as they do not usually attempt to make contact with the Uzbek
      population. It is the indigenous Christians with a Muslim background who are bearing the brunt of
