    - North Korea’s ruling ideology, Kimilsungism-Kimjongilism, treats religion as an existential threat.
      Punishments for defying draconian religious restrictions include forced labor, prison, torture,
      and execution. North Korean refugees in China face severe punishment upon repatriation if they engage
      in religious activities, including contact with Christian missionaries and NGOs. Authorities harshly
      punish traditional shamanistic practices and youth caught engaging in religious activities.
    uscirf_url: https://www.uscirf.gov/countries/north-korea
    state_dept_url: https://www.state.gov/reports/2023-report-on-international-religious-freedom/north-korea/
    state_dept_executive_summary: The constitution provides for freedom of religious belief, with the
      stipulation that “religion must not be used as a pretext for drawing in foreign forces or for harming
      the State or social order.” In 2022, the UN Secretary-General reported that “the right to freedom
      of thought, conscience, and religion [in the DPRK] also continues to be denied, with no alternative
      belief systems tolerated by the authorities.” Multiple sources indicated the situation had not fundamentally
      changed since publication of the 2014 UN Commission of Inquiry (COI) report on human rights in the
      DPRK, which found that authorities almost completely denied the rights to freedom of thought, conscience,
      and religion and determined the government in many instances committed violations of human rights
      that constituted crimes against humanity. The government reportedly continued to execute, torture,
      arrest, and physically abuse individuals for their religious activities. Despite some relaxation
      beginning in the middle of the year, COVID-19 restrictions on travel to and from the country further
      reduced information regarding conditions, making details on cases of abuse and estimates involving
      religious groups difficult to verify. In April, Radio Free Asia (RFA) reported authorities had initiated
      a nationwide “antisuperstition campaign” targeting a range of “superstitious practices” such as
      fortune telling. In a 2021 report, the nongovernmental organization (NGO) Korea Future described
      the government’s denial of religious freedom as absolute and cited multiple incidents of arbitrary
      arrest and detention, torture and inhuman treatment, and executions of persons because of their
      religious belief. Officials principally targeted Christians and followers of Shamanism. Of the 244
      victims documented in the report, 150 adhered to Shamanism, 91 adhered to Christianity, one to Cheondoism,
      and one to other beliefs.
