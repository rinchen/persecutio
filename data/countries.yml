    wiki_extract: Oman, officially the Sultanate of Oman, is a country in the southeastern Arabian Peninsula
      in West Asia. It shares land borders with Saudi Arabia, the United Arab Emirates, and Yemen, while
      also sharing maritime borders with Iran and Pakistan. Oman's coastline faces the Arabian Sea to
      the southeast and the Gulf of Oman on the northeast. The exclaves of Madha and Musandam are surrounded
      by the United Arab Emirates on their land borders, while Musandam's coastal boundaries are formed
      by the Strait of Hormuz and the Gulf of Oman. It has a population of approximately 5.46 million
      and an area of 315,331 km2. Muscat is the capital and largest city and Islam is the state religion.
