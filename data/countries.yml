    uscirf_key_findings:
    - Religious freedom conditions in Afghanistan are dire as the Taliban enforces a strict interpretation
      of Sunni Islam. Authorities use religious edicts to crack down on all Afghans who express dissent
      or different views of Islam, including women and religious minorities. Ongoing attacks by the Islamic
      State Khorasan Province (ISIS-K) also pose an ongoing threat to Shi’a Muslims in particular.
    uscirf_url: https://www.uscirf.gov/countries/afghanistan
    state_dept_url: https://www.state.gov/reports/2023-report-on-international-religious-freedom/afghanistan/
    state_dept_executive_summary: According to the Taliban, Sunni Hanafi jurisprudence is the basis for
      the legal system, and at present, the country does not have in place a cohesive legal framework,
      judicial system, or enforcement mechanism that enables the clear and consistent application of the
      rule of law throughout the country. According to the Taliban, laws enacted under the pre-August
      2021 government remain in effect unless the laws violate sharia. Taliban leaders largely impose
      their policies on citizens through guidelines or recommendations specifying acceptable behaviors
      they justify under their interpretation of sharia and prevalent cultural norms the Taliban consider
      acceptable. According to the annual report of the UN High Commissioner for Human Rights, “Despite
      some progress over the last two decades, minorities in Afghanistan have never enjoyed full protection
      of their human rights, and this is the case with religious minorities in particular.” In January,
      unidentified gunmen shot and killed Salafi cleric Mawlawi Laeeq, one of dozens of such killings
      of Salafi practitioners since the Taliban takeover. During the year, multiple sources said the Taliban
      had marginalized the minority Shia Muslim population in an effort to force them to leave the country.
      In late September, Hazara leaders said the Taliban detained a Hazara man and his son on the road
      to Uruzgan and later beheaded them. According to sources in the Hazara community, most of whom are
      Shia, the Taliban’s “killing, torture, and forced displacement” of ethnic Hazaras and seizure of
      their lands and houses continued in multiple provinces. An ever-dwindling number of Sikh and Hindu
      citizens expressed concerns regarding their security and safety under the “caretaker government”
      announced by the Taliban in August 2021. In July, International Christian Concern (ICC) stated,
      “The Taliban are working to completely erase Christianity or any religious minority from the country.”
    state_dept_christian_mentions: true
    archive_modern_excerpt: Almost all Afghan Christians are converts from Islam and are not able to practice
      their faith openly. Leaving Islam is considered shameful and punishable by death under Islamic law,
      implementation of which has continued in the WWL 2025 report period throug hout the country by the
      Taliban government, which took over the country on 15 August 2021. According to the Taliban, Sunni
      Hanafi jurisprudence is the basis for the legal system, and at present, the country does not have
      in place a cohesive legal framework, judicial system, or enforcement mechanism that enables the
      clear and consistent application of the rule of law throughout the country.
    archive_od_brief: Almost all Afghan Christians are converts from Islam and are not able to practice
      their faith openly. Leaving Islam is considered shameful and punishable by death under Islamic law,
      implementation of which has continued in the WWL 2025 report period throug hout the country by the
      Taliban government, which took over the country on 15 August 2021. If exposed, Christian converts
      have to leave their place of living, many try to flee the country. The family, clan or tribe must
      save its ‘honor’ and deal with any known convert. After the Taliban took over, most Christians tried
      to leave the country and/or went into hiding. The take-over meant a reintroduction of stringent
      restrictions on the role of women in public life, but also less freedom for ethnic and religiou
      s minorities, including Christian converts, who are seen as apostates. Now that Taliban control
      is consolidated-although an occasional dissenting voice can be heard -, Christian converts are having
      to adapt and conform to the rigid form of society implemented.
