    wiki_url: https://en.wikipedia.org/wiki/China
    wiki_extract: China, officially the People's Republic of China (PRC), is a country in East Asia. It
      is the world's second-most populous country after India, with a population exceeding 1.4 billion,
      across an area of 9.6 million square kilometers (3,700,000 sq mi), making it the third-largest country
      by area. It is divided into 33 province-level divisions, including two special administrative regions.
      Beijing is the capital, while Shanghai is the most populous city by urban area. Its geography features
      the vast Central Plain, major rivers such as the Yangtze and Yellow River, deserts, subtropical
      and temperate forests, plateaus, and mountain ranges such as the Himalayas.
