    wiki_url: https://en.wikipedia.org/wiki/Turkey
    wiki_extract: Turkey, officially the Republic of Türkiye, is a country mainly located in Anatolia
      in West Asia, with a smaller part called East Thrace in Southeast Europe. It borders the Black Sea
      to the north; Georgia, Armenia, Azerbaijan, and Iran to the east; Iraq, Syria, and the Mediterranean
      Sea to the south; and the Aegean Sea, Greece, and Bulgaria to the west. Turkey is home to over 86
      million people; most are ethnic Turks, while Kurds are the largest ethnic minority. Officially a
      secular state, Turkey has a Muslim-majority population. Ankara is Turkey's capital and second-largest
      city. Istanbul is its largest city and economic center. Other major cities include İzmir, Bursa,
      and Antalya.
