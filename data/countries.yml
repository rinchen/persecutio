- title: Turkey
  slug: turkey
  iso3: TUR
  status: warning
  persecution_level: Moderate
  lat: 38.96
  lng: 35.24
  modern: Christians experience state restrictions on worship, property, and clergy,
    including closures of churches and detentions, alongside occasional societal harassment
    and hostility across the countryside and major cities.
  historical: Ancient Christian communities in Anatolia produced ecumenical councils
    and monastic movements, then declined through Byzantine-Muslim frontier raiding,
    the Ottoman millet system, and the Republic's secular nationalism.
