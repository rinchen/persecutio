- title: Laos
  slug: laos
  iso3: LAO
  status: restricted
  persecution_level: High
  lat: 19.85
  lng: 102.49
  modern: 'The Lao state oversees all religious activity, restricting church construction, religious education
    and training, and material imports. Protestant and Catholic groups face local harassment and surveillance;
    some Christians remain imprisoned, especially in remote villages. Christians in Laos were shocked
    by the killing of a pastor in October 2022. While they are no strangers to being treated violently,
    such a killing has normally been a rare event. Nevertheless, further killings of Christians followed
    and in July 2024, a Khmu pastor and LEC provincial head of Oudomxay, was shot dead at his home after
    several warnings to stop his Christian activities. The constitution provides citizens with “the right
    and freedom to believe or not to believe in religion.” The government officially recognizes four religions:
    Buddhism, Christianity, Islam, and the Baha’i Faith, with Buddhism paramount. Decree 315, rather than
    codified law, sets forth rules for religious practice and minimum land requirements for building houses
    of worship…'
  historical: Catholic missionaries arrived in the 17th century; French colonial rule expanded Protestant
    and Catholic presence. After 1975, the communist government restricted religious life to state-sanctioned
    bodies and drove many churches underground.
