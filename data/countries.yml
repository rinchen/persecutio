    uscirf_key_findings:
    - The Cuban government’s legal framework for controlling religious activity extends state authority
      over virtually all worship and practice, and religious leaders and communities continually face
      threats and harassment. The government criminalizes and heavily persecutes unregistered religious
      groups, and it continues to wrongfully imprison religious leaders while denying prisoners their
      religious freedom rights across the prison system.
    uscirf_url: https://www.uscirf.gov/countries/cuba
    state_dept_url: https://www.state.gov/reports/2023-report-on-international-religious-freedom/cuba/
    state_dept_executive_summary: The constitution contains written provisions for religious freedom and
      prohibitions against discrimination based on religious grounds; however, provisions in the penal
      and administrative codes contravene these protections. The constitution declares the country a secular
      state and provides for the separation of religious institutions and the state, but the Cuban Communist
      Party (CCP), through its Office of Religious Affairs (ORA) and the Ministry of Justice (MOJ), regulates
      religious practice. The law requires all religious groups to apply to the MOJ for official registration.
      By law, membership in or association with an unregistered group is a crime. The penal code stipulates
      a minimum sentence of six months’ incarceration, a fine, or both for individuals who attempt to
      conscientiously object to military service or prevent minors from attending public school, including
      those whose objections are based on their religious beliefs. It also imposes sentences of up to
      10 years’ imprisonment on persons receiving funding from foreign organizations or for financing
      activities considered to be directed against the state or its constitutional order. The family code
      states parents have the responsibility to instill in children love for the homeland, respect for
      its symbols, and respect for government authorities. In its annual Watch List , the Christian nongovernmental
      organization (NGO) Open Doors reported an increase in government persecution of Christians from
      2019 to 2023, including use of repressive tactics against religious leaders and activists opposing
      CCP ideology through arrests, exile, arbitrary fines, surveillance, denials of licenses, religious
      visas, freedom of movement, and physical and mental abuse. According to CSW’s (formerly known as
      Christian Solidarity Worldwide) annual report released in February and covering 2022, there were
      657 violations of freedom of religion or belief compared with 272 reported violations in 2021.
