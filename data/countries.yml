- title: China
  slug: china
  iso3: CHN
  status: severe
  persecution_level: Very High
  lat: 35.86
  lng: 104.19
  modern: China ranks among the world's most restrictive environments for Christians. The government controls
    official churches through state associations, while unregistered house churches face raids, demolition,
    surveillance, and detention. Regulations have tightened cross-border religious ties, youth religious
    activity is restricted, and online religious content is censored.
  historical: Christianity first arrived in China by the Tang dynasty through Nestorian missionaries.
    Catholic and Protestant missions expanded from the 16th century onward, then were curtailed after
    1949. The Cultural Revolution targeted churches and religious leaders severely; limited revival occurred
    after 1979, followed by new state-control measures from the 2010s onward.
  sources:
