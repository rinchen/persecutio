      volatile. In the second half of the reporting period things calmed down, when in April 2024 President
      Muizzu's party an
    archive_od_url: https://www.opendoors.org/persecution/reports/Maldives-Full_Country_Dossier-ODI-2025.pdf
    state_dept_executive_summary: The constitution designates Islam as the state religion, requires citizens
      to be Muslim, and requires public office holders, including the President, to be followers of Sunni
      Islam. The constitution provides for limitations on rights and freedoms “to protect and maintain
      the tenets of Islam” and does not specifically establish religious freedom nor identify religion
      as a category on which discrimination is prohibited. The law states that both the government and
      the people must protect religious unity, and propagation of any religion other than Islam is a criminal
      offense. The law criminalizes “criticism of Islam” and speech “in a manner likely to cause religious
      segregation.” The penal code permits the administration of certain sharia punishments, such as flogging,
      stoning, and amputation of hands. At year’s end, trial hearings against six of the nine individuals
      charged under the Prevention of Terrorism Act for the May 2021 attack on Speaker of Parliament Mohamed
      Nasheed continued. One other was convicted, and another was acquitted. Two women were sentenced
      to flogging for fornication and two men sentenced to flogging for fornication and alcohol consumption.
      Victims of online harassment and threats continued to say they believed themselves vulnerable because
      of past lack of police responsiveness and because past online harassment had sometimes led to violence.
      Many investigations in criminal cases involving religious freedom issues continued without much
      visible progress. The Communications Authority of Maldives continued to maintain an unpublished
      blacklist of websites containing material it deemed un-Islamic or anti-Islamic. The Ministry of
      Islamic Affairs (MIA) continued to maintain control over all matters related to religion and religious
      belief, including requiring imams to use government-approved sermons in Friday services. The government
      maintained its ownership and control of all mosques, including their maintenance and funding.
