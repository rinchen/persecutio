    archive_od_url: https://www.opendoors.org/persecution/reports/Jordan-Full_Country_Dossier-ODI-2025.pdf
    state_dept_executive_summary: The constitution declares Islam the religion of the state but safeguards
      “the free exercise of all forms of worship and religious rites” if they are consistent with public
      order and morality. It stipulates there shall be no discrimination based on religion. It does not
      address the right to convert to another faith, nor are there penalties under civil law for doing
      so. According to the constitution, matters concerning the personal and family status of Muslims
      come under the jurisdiction of sharia courts. Under the predominant Sunni interpretations of sharia,
      converts from Islam are regarded as apostates but still considered Muslims and therefore subject
      to sharia as such. Islamic religious groups are granted recognition through the constitution and
      do not need to register with the government. Non-Islamic religious groups must obtain official recognition
      through registration. In September, the country enacted a cybercrimes law that penalizes the use
      of a website, social media network, or information network to “disrespect religion” with a term
      of imprisonment not less than three months and a fine of up to 50,000 dinars ($71,000). Converts
      from Islam to Christianity continued to report security officials questioned them regarding their
      religious beliefs and practices as well as some instances of surveillance. They reported that security
      officials continued to question them to determine their “true” religious beliefs and practices.
      The Ministry of Awqaf [religious endowments], Islamic Affairs, and Holy Places (MOA) continued to
      monitor sermons at mosques and required that preachers refrain from political commentary that the
      government had not approved. The government continued to deny official recognition to some religious
      groups, including Baha’is and Jehovah’s Witnesses. Members of some unregistered religious groups
      continued to face problems registering their marriages and the religious affiliation of their children
      as well as in renewing their residency permits.
