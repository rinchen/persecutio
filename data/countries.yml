    uscirf_url: https://www.uscirf.gov/countries/libya
    state_dept_url: https://www.state.gov/reports/2023-report-on-international-religious-freedom/libya/
    state_dept_executive_summary: The 2011 Constitutional Declaration functions as the interim constitution
      and states Islam is the state religion and sharia the principal source of legislation. Proselytizing
      and the distribution or publication of information aimed at changing the country’s “social structure”
      is illegal, and the circulation of non-Islamic religious materials, missionary activity, or speech
      considered “offensive to Muslims” is banned. The criminal code effectively prohibits conversion
      from Islam. The Government of National Unity (GNU) exerted limited control outside Tripoli and relied
      heavily on armed groups to remain in power. The Tripoli-based Internal Security Agency (ISA), nominally
      under the authority of the Presidential Council (PC) but aligned to GNU Prime Minister Abdulhamid
      Dabaiba, arrested numerous individuals for Christian proselytizing and conversion from Islam to
      Christianity. The ISA posted video “confessions” online, allegedly obtained under duress. The Special
      Deterrence Force, an armed group that reports to the PC and whose senior leadership adheres to the
      Salafist Madkhali strain of Islam, arrested and detained individuals for violating Islamic law.
      In May, a court in Misrata handed down sentences to 37 persons convicted in the beheading of 21
      foreign Coptic Christians in Sirte in 2015, with 23 receiving the death penalty and 14 receiving
      prison terms. In May, the GNU General Authority for Endowments and Islamic Affairs (GAEIA) established
      the “Guardians of Virtue” to protect Islamic values; critics compared it to a “secret police” organization.
      The GNU GAEIA also issued orders against Sufi traditional celebrations of the Prophet’s birthday
      in September, which typically includes dancing, beating drums, and chanting. Following the Hamas
      terrorist attacks on Israel in October and the Israeli response, the head of the GNU GAEIA requested
      imams deliver a Friday sermon warning Muslims of “the danger of Jews.”
