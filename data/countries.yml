    uscirf_key_findings:
    - Religious freedom remains under threat in Turkey, as authorities continue to prosecute theological
      dissenters for perceived insults to Islam; exert undue administrative control over religious groups’
      classification and registration; and impede some communities’ access to houses of worship and clergy—including
      expelling foreign Christian pastors under false pretenses of national security risks. Some refugees
      face unlawful deportation to countries where they face severe religious persecution.
    uscirf_url: https://www.uscirf.gov/countries/turkey
    state_dept_url: https://www.state.gov/reports/2023-report-on-international-religious-freedom/turkey/
    state_dept_executive_summary: The constitution defines the country as a secular state. It provides
      for freedom of conscience, religious belief, conviction, expression, and worship and prohibits discrimination
      based on religious grounds. The Presidency of Religious Affairs (Diyanet), a state institution,
      governs and coordinates religious matters related to Islam; its mandate is to enable the practice
      of Islam, provide religious education, and manage religious institutions. The penal code prohibits
      blasphemy and provides punishment for “inciting hatred and enmity,” including showing public disrespect
      for religious beliefs, and it criminalizes “insulting values held sacred by a religion.” The court
      case continued of nine Kurdish imams arrested in 2021 on terrorism-related charges for preaching
      in their native language; three defendants remained under judicial control (reporting to a local
      police station) at year’s end. The government continued to limit the rights of non-Muslim religious
      minorities, especially those not recognized under the government’s interpretation of the 1923 Lausanne
      Treaty, which includes only Armenian Apostolic Orthodox Christians, Jews, and Greek Orthodox Christians.
      The government continued to categorize Alevi worship as cultural rather than religious and did not
      recognize Alevi houses of worship, while Alevis continued to state that their faith deserved government
      recognition as such. Media outlets and nongovernmental organizations (NGOs) reported continued entry
      bans and deportations of noncitizen members of Protestant congregations, and the Alliance Defending
      Freedom (ADF) International said authorities “continued to undermine religious freedom by deliberately
      attempting to stifle the spread of Christianity.” Government authorities in Bolu Province, who in
      January arrested 17 Iranian Christians and held them in removal centers for potential deportation
      back to Iran, later released them after they reportedly agreed to cease their home-based worship.
