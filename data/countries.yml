- title: Yemen
  slug: yemen
  iso3: YEM
  status: severe
  persecution_level: Extreme
  lat: 15.55
  lng: 48.51
  modern: Civil war and Houthi authority have made Yemen unsafe for organized Christianity. Suspected
    converts face death or expulsion, foreign religious workers are expelled, and humanitarian aid access
    may be restricted when religious affiliation is discovered. Informal churches in the country have
    faced intensifying persecution over the last decades; both Yemenis and international partners have
    been assassinated for sharing their Christian faith. The indigenous Church in Yemen is composed mostly
    of Christians wi th a Muslim background and their children who need to live their faith in secret.
    The constitution declares Islam the state religion. It provides for freedom of thought and expression
    “within the limits of the law” but does not mention freedom of religion, belief, or conscience. The
    constitution states sharia is the source of all legislation, although it coexists with secular common
    law and civil code models of law in a hybrid legal system.
  historical: Ancient southern Arabian Christianity declined after the rise of Islam; the Himyarite kingdom
    saw a brief Christian period in the 5th-6th centuries. Ottoman and British colonial contact renewed
    small Catholic and Protestant communities that later contracted during 20th-century conflicts.
