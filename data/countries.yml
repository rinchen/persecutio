- title: Nigeria
  slug: nigeria
  iso3: NGA
  status: persecution
  persecution_level: High
  lat: 9.08
  lng: 8.68
  modern: Boko Haram, ISWAP, and criminal bandits have killed, kidnapped, and displaced
    Christian villagers and pastors across northern Nigeria. Hundreds of churches
    have been destroyed. In the Middle Belt, communal violence often carries religious
    dimensions along farmer-herder lines near the Jos Plateau.
  historical: Christianity arrived through Portuguese traders in the 15th century
    and expanded through 19th-century missions and colonial education. Post-independence
    political tensions, the 1967-1970 Biafran War, and the late-20th-century spread
    of Salafi-jihadist ideology in the Sahel created fertile ground for present-day
    violence.
