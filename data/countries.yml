- title: Pakistan
  slug: pakistan
  iso3: PAK
  status: severe
  persecution_level: Very High
  lat: 30.37
  lng: 69.34
  modern: Blasphemy laws can carry life imprisonment or death and have been used against
    Christians. Forced conversions and marriages of Christian girls remain common.
    Churches are occasionally attacked during holidays or communal tensions, and security
    for worship remains weak.
  historical: Catholicism arrived with Portuguese traders; Protestant missions expanded
    under British rule in Punjab and Sindh. Partition created a Muslim-majority state
    with large Christian minorities centered in Punjab. Anti-blasphemy legislation
    hardened under Zia-ul-Haq in the 1980s, and since then legal and societal pressures
    have increased.
