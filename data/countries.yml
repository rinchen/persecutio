    archive_od_url: https://www.opendoors.org/persecution/reports/Tunisia-Full_Country_Dossier-ODI-2025.pdf
    state_dept_executive_summary: The constitution requires the state to support and advance the purposes
      of Islam and provides that “Tunisia is part of the Islamic Umma [community or nation],” and that
      the state must work to achieve the purposes of Islam in preserving “life, honor, property, religion,
      and freedom.” The constitution also states that this will be carried out “within the framework of
      a democratic system.” The constitution states that it guarantees freedom of belief and conscience,
      as well as the freedom to worship. It requires the president to be Muslim. On May 9, a member of
      the National Guard shot and killed two civilians and three security officers near the al-Ghriba
      Synagogue during the Lag b’Omer festival, an annual Jewish pilgrimage on the island of Djerba. The
      government announced that it would fully investigate the attack. On May 17, President Saied met
      with leaders of the country’s three primary religious communities. According to country’s Chief
      Rabbi, the president assured them that such an attack “would not happen again.” On October 17, in
      the wake of Hamas’ attack on southern Israel, pro-Palestinian rioters defaced and set fire to a
      closed synagogue and shrine in central Tunisia. Local police responded but were overwhelmed by the
      rioters. In response, President Saied publicly called on Tunisians to stand by the Palestinian people
      “without attacking anyone or any property.” Authorities had not reported any arrests associated
      with the incident as of year’s end. On February 22, police detained the president and vice-president
      of the Federation of Evangelical, Protestant, and Pentecostal Christian Churches after a local television
      station profiled “house churches” associated with their organization. Authorities released the men
      without charges on March 10. Police detained another Christian in February, as he left church in
      Tunis, and interrogated him regarding his religion and books in his possession; he was released
      the same day without charges.
