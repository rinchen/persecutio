    wiki_extract: Guinea, officially the Republic of Guinea, is a coastal country located in West Africa.
      It borders the Atlantic Ocean to the west, Guinea-Bissau to the northwest, Senegal to the north,
      Mali to the northeast, Ivory Coast to the southeast, and Sierra Leone and Liberia to the south.
      It is sometimes referred to as Guinea-Conakry, after its capital Conakry, to distinguish it from
      other territories in the eponymous region, such as Guinea-Bissau and Equatorial Guinea. At the census
      held on 1 July 2025, Guinea had a population of over 17.5 million and an area of 245,857 square
      kilometres (94,926 sq mi).
