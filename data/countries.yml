      state institutions from behaving in a manner that infringes on Islamic morals. The law grants all
      individuals the right to practice their religion if they respect public order and regulations. “Offending
      or insulting” any religion is a criminal offense. The law criminalizes blasphemy but not apostasy.
      Proselytizing to Muslims by non-Muslims is a crime. At the end of the year, Ahmadi Muslim community
