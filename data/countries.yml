    uscirf_key_findings:
    - Indonesia’s religious freedom conditions are poor. Despite constitutional FoRB
      protections, the Criminal Code and other laws restrict worship, targeting religious
      minorities such as Protestants, Catholics, Ahmadiyyah Muslims, Jehovah’s Witnesses,
      and Baha'is. A new Criminal Code came into effect in 2026, broadening the criminal
      definition of blasphemy. Religious minorities also encounter challenges when
      constructing places of worship as local authorities often refuse to issue permits.
    uscirf_url: https://www.uscirf.gov/countries/indonesia
