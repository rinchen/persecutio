    wiki_url: https://en.wikipedia.org/wiki/Morocco
    wiki_extract: Morocco, officially the Kingdom of Morocco, is a country in the Maghreb region of North
      Africa. It has coastlines on the Mediterranean Sea to the north and the Atlantic Ocean to the west,
      and has land borders with Algeria to the east; the Spanish exclaves of Ceuta, Melilla and Peñón
      de Vélez de la Gomera along the north, which it claims together with several small Spanish-controlled
      islands; and the disputed territory of Western Sahara to the south, partly occupied by Morocco since
      1975. Morocco also claims to share a border with Mauritania through the disputed territory of Western
      Sahara. It has a population of approximately 37 million. Its capital is Rabat, while its largest
      city is Casablanca.
