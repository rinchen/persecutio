    state_dept_url: https://www.state.gov/reports/2023-report-on-international-religious-freedom/bangladesh/
    state_dept_executive_summary: The constitution designates Islam as the state religion but upholds
      the principle of secularism. It prohibits religious discrimination and provides for equality for
      all religions. Family law, enforced in secular courts, contains separate provisions for different
      religious groups. In March, Ahmadi Muslim leaders said law enforcement and government officials
      stood by as hundreds of persons attacked the Ahmadi community during its annual convention in Ahmednagar.
      The violence resulted in two deaths, dozens of injuries, and the looting and destruction of hundreds
      of Ahmadi houses, one Ahmadi mosque and an Ahmadi medical clinic. In the aftermath, police filed
      cases against thousands of unnamed individuals and arrested more than 200, including the alleged
      instigators of the violence. Leaders of religious minority communities continued to say the government
      frequently used laws such as the Digital Security Act (DSA) to target members of religious minority
      groups, particularly Hindus, for “hurting the religious sentiments” of Muslim populations. In almost
      all cases, courts took harsher measures against members of religious minorities for posting allegedly
      derogatory content on Facebook than against the perpetrators of retaliatory violence. Several cases
      followed this pattern during the year. Muslim leaders said the government continued to influence
      the appointment and removal of imams and provide guidance on the content of sermons to imams throughout
      the country. In September, the Bangladesh Hindu Buddhist Christian Unity Council (BHBCUC) announced
      a hunger strike to demand implementation of past election pledges to implement a law allowing citizens
      (mostly Hindu) to recover property seized by the government following independence, form a national
      minority commission, enact a special law for the safety of religious minority communities, and reinstate
      the government employment quota system for members of religious minorities.
