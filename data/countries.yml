    uscirf_url: https://www.uscirf.gov/countries/nigeria
    state_dept_url: https://www.state.gov/reports/2023-report-on-international-religious-freedom/nigeria/
    state_dept_executive_summary: The constitution bars the federal and state governments from adopting
      a state religion, prohibits religious discrimination, and provides for individuals’ freedom to choose,
      practice, propagate, or change their religion. The constitution provides for states to establish
      courts based on sharia or customary (traditional) law in addition to common law civil courts, although
      civil courts have preeminence over all other courts. Sentences may be appealed from sharia and customary
      courts to civil courts. In addition to civil courts, sharia courts function in 12 northern states
      and the Federal Capital Territory, and customary courts in most of the 36 states. In May, the Sultan
      of Sokoto and cochair of the Nigeria Inter-Religious Council (NIREC), Muhammadu Sa’ad Abubakar III,
      said the resurgence of insecurity and killings across the country was worrisome. The Sultan said
      NIREC would engage with the new government to find a solution to the insecurity. In a statement
      issued in September, Catholic bishops urged the state and national governments to stand up to their
      “primary responsibility of safeguarding the lives and property of Nigerians.” The Christian-oriented
      research group Observatory for Religious Freedom in Africa (ORFA) stated in an April report that
      both criminal gangs and terrorist organizations were increasingly attacking local communities, particularly
      Christian communities, leading to a climate of fear and displacement of populations, and the government
      in many cases failed to protect citizens against the attacks. Media reported that military and police
      attacked members of the government-proscribed Islamic Movement in Nigeria (IMN) during an Ashura
      procession in Abuja, with one person shot in the head and two individuals sustaining fractures in
      their legs.
    state_dept_christian_mentions: true
