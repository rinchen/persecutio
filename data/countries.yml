    uscirf_key_findings:
    - Religious freedom in Vietnam remains poor as the government regulates and controls religious affairs
      through state-sponsored organizations. Authorities routinely detain, arrest, imprison, and torture
      religious freedom advocates and members of unrecognized religious groups that seek to operate independent
      of state control. Various independent religious groups such as Cao Dai, Hoa Hao Buddhists, Khmer
