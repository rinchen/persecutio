    state_dept_executive_summary: The provisional federal constitution (PFC) provides for the right of
      individuals to practice their religion, makes Islam the state religion, prohibits the propagation
      of any religion other than Islam, and stipulates all laws must comply with the general principles
      of sharia. Much of the country beyond greater Mogadishu remains outside federal government control.
      Federal member state (FMS) administrations, including Puntland, Jubaland, South West State, Hirshabelle,
      Galmudug, and self-declared independent Somaliland, govern their respective jurisdictions through
      local legislation but do not fully control them. Somaliland’s constitution declares Islam its official
      religion, prohibits Muslims from converting to another religion, bars the propagation of any religion
      other than Islam, and requires all laws to comply with the principles of sharia. Despite the federal
      government’s attempts to strengthen governance, reform key security institutions, and carry out
      operations to combat terrorism, it continued to confront serious problems, including a persistent
      threat from al-Shabaab – a terrorist organization that promotes violence through its interpretations
      of Islamic doctrine; volatile relations with the FMS governments; and attempts by external actors,
      including foreign countries, to increase their influence within the country. Al-Shabaab continued
      to attack government-linked forces and civilians throughout the country. The group also continued
      to pressure civilians to support its violent extremist ideology. According to media reports, al-Shabaab
      killed, injured, or harassed persons for a variety of reasons, including failure to adhere to the
      group’s religious edicts. During the year, al-Shabaab was responsible for the killings of civilians,
      government officials, government security forces, police, and troops from contributing countries
      of the African Union Transition Mission in Somalia (ATMIS).
