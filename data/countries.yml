- title: Saudi Arabia
  slug: saudi-arabia
  iso3: SAU
  status: severe
  persecution_level: Very High
  lat: 23.88
  lng: 45.07
  modern: Conversion from Islam can carry the death penalty. Organized Christian fellowship
    and public worship by Muslims-turned-Christians are illegal. Expatriate Christians
    sometimes worship discreetly in private homes, while importing or distributing
    Bibles remains criminalized.
  historical: Christian communities once existed in Arabia but were largely extinguished
    after Islam's rise. 19th- and 20th-century Catholic and Protestant missions operated
    under Ottoman and later Saudi administration, but eventually all organized Christian
    community activity was restricted.
