    wiki_extract: Bahrain, officially the Kingdom of Bahrain, is an island country in the eastern part
      of Arabian Peninsula in West Asia. Situated near the western shore of the Persian Gulf, the country
      comprises a small archipelago of 33 natural islands and an additional 50 artificial islands, centered
      on Bahrain Island, which makes up around 80 percent of the country's landmass. Bahrain is situated
      between Qatar and the northeastern coast of Saudi Arabia, to which it is connected by the King Fahd
      Causeway. The population is 1,588,670 as of 2024, of whom 739,736 are Bahraini nationals, and 848,934
      are expatriates. Bahrain spans some 760 square kilometres (290 sq mi) and is the third-smallest
      nation in Asia after Maldives and Singapore. The capital and largest city is Manama.
