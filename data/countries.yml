    wiki_url: https://en.wikipedia.org/wiki/Ethiopia
    wiki_extract: Ethiopia, officially the Federal Democratic Republic of Ethiopia (FDRE), is a landlocked
      country located in the Horn of Africa region of East Africa. It shares borders with Eritrea to the
      north, Djibouti to the northeast, Somalia to the southeast, Kenya to the south, South Sudan to the
      west, and Sudan to the northwest. Ethiopia covers a land area of 1,104,300 km2 (426,400 sq mi).
      As of 2026, it has around 138 million inhabitants, making it the 10th-most populous country in the
      world. The national capital and largest city, Addis Ababa, lies several kilometres west of the East
      African Rift that splits the country into the African and Somali tectonic plates.
