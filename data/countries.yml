- title: Bangladesh
  slug: bangladesh
  iso3: BGD
  status: severe
  persecution_level: Very High
  lat: 23.68
  lng: 90.35
  modern: Christians, especially converts and tribal communities, face violence, kidnapping, and pressure
    from Islamist actors. Anti-conversion narratives and blasphemy-related tensions put churches and leaders
    at risk. Bangladesh is one of the few countries in the world where converts to Christian faith originate
    from four different backgrounds, namely from Muslim, Hindu, Buddhist and ethnic/tribal background.
    All, however, face restrictions, discrimination and attacks. They often gather in small house churches
    or secret groups due to fear of attack. The constitution designates Islam as the state religion but
    upholds the principle of secularism. It prohibits religious discrimination and provides for equality
    for all religions. Family law, enforced in secular courts, contains separate provisions for different
    religious groups.
  historical: Catholic and Protestant missions operated largely among tribal and remote communities and
    later expanded urban ministries. Communal violence and new legal restrictions in the late 20th and
    early 21st centuries increasingly targeted Christian minorities.
