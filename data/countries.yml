    wiki_url: https://en.wikipedia.org/wiki/Bangladesh
    wiki_extract: Bangladesh, officially the People's Republic of Bangladesh, is a country in South Asia.
      It is the eighth-most populous country in the world and among the most densely populated with a
      population of almost 176 million within an area of 148,461 square kilometres (57,321 sq mi). Bangladesh
      shares land borders with India to the north, west, and east, and Myanmar to the southeast. It has
      a coastline along the Bay of Bengal to its south and is separated from Bhutan and Nepal by the Siliguri
      Corridor, and from China by the Indian state of Sikkim to its north. Dhaka, the capital and largest
      city, is the nation's political, financial, and cultural centre. Chittagong is the second-largest
      city and the busiest port of the country.
