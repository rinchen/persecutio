    uscirf_key_findings:
    - Although President Bashar al-Assad’s government fell in December 2024, ending that regime’s years
      of religious freedom and broader human rights violations, Syria’s diverse religious communities
      face other threats. Both the interim authorities in Damascus—led by U.S.-designated terrorists and
      longstanding FoRB violator Hay’at Tahrir al-Sham (HTS)—and Turkish-backed Islamist militias in the
      north and east pose threats to FoRB and to the future stability of the country.
    uscirf_url: https://www.uscirf.gov/countries/syria
    state_dept_url: https://www.state.gov/reports/2023-report-on-international-religious-freedom/syria/
    state_dept_executive_summary: The constitution declares the state shall respect all religions and
      shall ensure the freedom to perform religious rituals as long as these “do not disturb the public
      order.” There is no official state religion, although the constitution states, “Islam is the religion
      of the President of the republic.” The constitution states Islamic jurisprudence shall be a major
      source of legislation, and the law prohibits conversion from Islam. Membership in the Muslim Brotherhood
      or “Salafist” organizations remains illegal and punishable with imprisonment or death. Sectarian
      violence continued during the year due to tensions among religious groups that, according to nongovernmental
      organizations (NGOs) and media sources, were exacerbated by regime actions, continued economic deterioration,
      and the broader ongoing conflict in the country. At year’s end, more than half of the country’s
      prewar population remained displaced, including 6.8 million internally displaced persons (IDPs)
      and 5.1 million refugees. Regime and proregime forces continued aerial and ground offensives in
      the country’s northwest, killing civilians and displacing over 10,000 additional persons. The Syrian
      Network for Human Rights (SNHR) documented at least 33 attacks on mosques in the country during
      the year, attributing 31 attacks to the regime (94 percent) and two (6 percent) attacks to the Syrian
      Democratic Forces (SDF). There were widespread reports that the regime, supported by its Russian
      and Iranian allies, continued to commit human rights abuses against its perceived opponents, the
      majority of whom, reflecting the country’s demographics, were Sunni Muslims that the regime described
      as violent extremists. There also continued to be reports that the regime and its foreign supporters
      engaged in the extensive destruction of hospitals, homes, and other civilian infrastructure.
