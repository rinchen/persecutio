    uscirf_key_findings:
    - The Indian government tolerates and perpetrates widespread harassment and violence against religious
      minorities at the national and state level. The BJP-led government has introduced and enforced discriminatory
      legislation that disenfranchises religious minorities, including the Citizenship Amendment Act (CAA),
      the National Register of Citizens, the Unlawful Activities Prevention Act (UAPA), and various state-level
      anti-conversion and cow slaughter laws.
    uscirf_url: https://www.uscirf.gov/countries/india
    state_dept_url: https://www.state.gov/reports/2023-report-on-international-religious-freedom/india/
    state_dept_executive_summary: The constitution provides for freedom of conscience and the right of
      all individuals to freely profess, practice, and propagate religion; mandates a secular state; requires
      the state to treat all religions impartially; and prohibits discrimination based on religion. It
      also states citizens must practice their faith in a way that does not adversely affect public order,
      morality, or health. Ten of 28 states have laws restricting religious conversions for all faiths.
      Some of these states also impose penalties specifically against forced religious conversions for
      the purpose of marriage. During the year, some members of religious minority groups challenged the
      government’s ability and willingness to protect them from violence, investigate crimes against members
      of religious minority groups, and protect their freedom of religion or belief. In February, a crowd
      of 20,000 Christians gathered in New Delhi to protest increasing violence against them and request
      greater protections for the Christian community. In March, a group of 93 former senior civil servants
      wrote an open letter to Prime Minister Narendra Modi expressing concerns regarding “continued harassment”
      of Christians in particular by government officials and political party leaders associated with
      the government. Christians and Muslims were arrested under laws banning forced religious conversions,
      which religious groups said in some cases were used to harass and imprison members of religious
      minority groups on false and fabricated charges or for lawful religious practices. In some cases,
      Christian groups said local police aided mobs that disrupted worship services over accusations of
      conversion activities or stood by while mobs attacked Christians and then arrested the victims on
      conversion charges. In December, Parliament approved new criminal laws that included provisions
      to criminalize making false promises and concealing one’s identity to sexually exploit a woman,
      including for marriage.
