    archive_od_brief: Turkmenistan is ruled by an authoritarian government where state agents constantly
      monitor religious groups and individuals, and impose restrictions. Even Russian Orthodox and Armenian
      Apostolic churches may experience Sunday services being monitored. The printing or importing of
      Christian materials is restricted. Christians from a Muslim background bear the brunt of the rights
      violations both at the hands of the state and from family, friends and community.
    archive_od_url: https://www.opendoors.org/persecution/reports/Turkmenistan-Full_Country_Dossier-ODI-2025.pdf
    state_dept_executive_summary: The constitution establishes the republic as a secular country and provides
      for freedom of religion and the right of individuals to choose their religion, express and disseminate
      their religious beliefs, and participate in religious observances and ceremonies. The constitution
      separates the roles of government and religion and stipulates that religious organizations are prohibited
      from “interference” in state affairs. The constitution provides for the equality of citizens before
      the law, regardless of their religious preference. Opposition media outlets reported on August 30
      that Russia deported Turkmen citizen Ashyrbay Bekiyev to Turkmenistan for violation of Russian migration
      laws. Media outlets further reported that the Dashoguz regional court sentenced Bekiyev to 23 years
      in prison on “trumped-up charges” of Islamic extremism. Jehovah’s Witnesses reported 14 cases of
      security officers detaining their members, summoning them to appear at law enforcement agencies,
      questioning them for a few hours, then releasing them. Radio Free Europe/Radio Liberty ’s (RFE/RL)
      Turkmenistan Service reported that police in the Balkan Province raided the homes of Muslims in
      mid-August and seized religious literature. Some religious leaders reported fewer barriers to re-registration
      during the year and the ability to hold normal religious activities, including services and events.
      Others stated that they struggled to find adequate spaces to hold services, at times due to reported
      government pressure on the owners of establishments to not make their locations available for religious
      activities. Jehovah’s Witnesses reported that they could only meet in private homes, putting them
      at risk of detention due to the group’s lack of registration.
