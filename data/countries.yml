    wiki_url: https://en.wikipedia.org/wiki/Cameroon
    wiki_extract: Cameroon, officially the Republic of Cameroon, is a country in Central Africa. It shares
      boundaries with Nigeria to the west and north, Chad to the northeast, the Central African Republic
      to the east, and Equatorial Guinea, Gabon, and the Republic of the Congo to the south. Its coastline
      lies on the Bight of Biafra, part of the Gulf of Guinea, and the Atlantic Ocean. Due to its strategic
      position at the crossroads between West Africa and Central Africa, it has been categorized as being
      in both geostrategic locations. Cameroon's population of nearly 31 million people speak 250 native
      languages, in addition to the national tongues of English and French. The capital city of the country
      is Yaoundé.
