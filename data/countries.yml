    uscirf_key_findings:
    - Religious freedom conditions in Sri Lanka are concerning. The government enforces
      discriminatory legislation such as the Prevention of Terrorism Act (PTA) and
      the International Covenant on Civil and Political Rights (ICCPR) Act to arbitrarily
      detain religious minorities. Additionally, the government has coordinated with
      Buddhist clergy to identify and expropriate land from Hindus and Muslims in
      the North and East for the construction of Buddhist sites.
