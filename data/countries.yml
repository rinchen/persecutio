    archive_od_brief: In Mozambique, Christians face a multifaceted web of persecution stemming from violent
      Islamic militants, drug trafficking, government restrictions, conflict-related violence and social
      discrimination. The rise of radical Islam, particularly in northern regions like Cabo Delgado, has
      led to targeted attacks on Christian communities, with churches destroyed, pastors abducted, and
      lives lost as extremists aim to establish an Islamic state. The pervasive presence of drug trafficking
      exacerbates this hostility, as criminal cartels view church youth-workers opposing organized crime
      as a threat to their operations, leading to intimidation and violence. Government-imposed restrictions
      further hinder religious freedom through complex church registration processes, l imitations on
      Christian education, and surveillance. The ongoing conflict between government forces and jihadists
      has worsened security, forcing many Christians to flee their homes and live in precarious conditions.
      Social discrimination also plays a signi ficant role, particularly for converts from Islam, who
      often face severe opposition and ostracization from their families and communities.
    archive_od_url: https://www.opendoors.org/persecution/reports/Mozambique-Full_Country_Dossier-ODI-2025.pdf
    state_dept_executive_summary: The constitution provides for the right to practice freely or not to
      practice religion and prohibits discrimination based on religion. The constitution prohibits political
      parties from using names or symbols associated with religious groups. Religious groups have the
      right to organize, worship, and operate schools. An insurgency led by the Islamic State-affiliated
      terrorist group, ISIS-Mozambique (ISIS-M), that sources said was motivated by political and socioeconomic
      grievances and exploited by religious extremists with a stated aim to establish an Islamic state,
      continued in the northern part of the country. The level of violence against civilians decreased
      during the year, and a senior leader of the insurgent forces was killed in August. In January, a
      Muslim umbrella organization condemned a group of young persons who were attempting to establish
      a madrassah and whom the government arrested in December 2022 on suspicion of radicalization; the
      organization criticized the individuals for acting without consulting religious authorities and
      for suspected links with terrorists. In January, the government banned a religious group that it
      stated was promoting child marriage, and, according to a government official, it banned other religious
      groups with “obscure purposes.” Religious organizations and leaders played large roles in municipal
      elections in October, including as polling station observers, election officials, and commentators.
      ISIS-M continued to attack rural communities and kill civilians in Cabo Delgado Province in the
      northern part of the country. In September, an ISIS-M attack reportedly killed at least 11 Christians;
      media reports quoted survivors as stating the group separated villagers based on their names before
      opening fire on those they supposed to be Christians. Media reports indicated that ISIS-M targeted
      both Muslim and Christian communities.
