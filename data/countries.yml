  modern: Religious freedom has improved since the 1990s but remains uneven. The Catholic Church provides
    social services yet cannot register new churches freely, import materials without restriction, or
    access state media easily. Independent Protestant house churches still report occasional harassment
    and economic pressure.
  historical: Catholicism dominated colonial Cuba for centuries. After 1959, the revolutionary government
    confiscated church property, expelled clergy, and banned Christian education. The Soviet period enforced
    atheistic ideology almost absolutely; reforms began in the late 1980s and 1990s, allowing greater
    religious expression.
