    state_dept_executive_summary: The constitution prohibits religious discrimination and provides for
      freedom of religion, including the freedom to practice, propagate, and give expression to one’s
      religion, in public or in private and alone or with others. The criminal code prohibits statements
      that are “insulting” or “grossly provocative” and that cause offense to persons of a particular
      race, tribe, place of origin, color, creed, or religion, or intend to cause such offense. In September,
      the government enacted the Marriages Act that prohibits marriage under the age of 18. The act also
      explicitly recognizes the roles of faith leaders practicing Islam, Judaism, Hinduism, and “any religion”
      to solemnize marriages according to the rites of their faiths. According to one faith leader, security
      services targeted religious officials who criticized the government, and while the government respected
      freedom of worship, it did not respect freedom of speech, forcing some religious leaders to self-censor.
      In September, President Emmerson Dambudzo Mnangagwa implored Parliament to prioritize finalizing
      amendments to the Private Voluntary Organization (PVO) Act. If passed, the amendments would require
      all trusts, including faith-based organizations, to register as PVOs. Some religious leaders said
      they planned to urge Parliament to reject the amendments. In the lead up to the August elections,
      government and Zimbabwe African National Union – Patriotic Front (ZANU-PF) leaders embarked on an
      outreach campaign to religious groups to bolster support for their electoral victory. A Christian
      leader stated in some cases the government coerced religious leaders to invite the President and
      other senior government and party officials to religious gatherings where they sometimes pledged
      their electoral support. Religious leaders were active in calling for peace around and monitoring
      the elections.
