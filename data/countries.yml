  modern: Blasphemy laws can carry life imprisonment or death and have been used against Christians. Forced
    conversions and marriages of Christian girls remain common. Churches are occasionally attacked during
    holidays or communal tensions, and security for worship remains weak. Pakistan – Persecution Dynamics
    – December 2024 The constitution establishes Islam as the state religion and requires all provisions
    of the law to be consistent with Islam. The constitution states, “Subject to law, public order, and
    morality, every citizen shall have the right to profess, practice, and propagate his religion.” The
    penal code sets punishments for blasphemy that range from 10 years in prison to the death… Authorities’
    failure to address mob violence associated with blasphemy accusations, as well as the forced conversions
    to Islam of individuals from religious minorities—including Christians, Hindus, and Sikhs—continues
    to reinforce a climate of fear and religious discrimination.
  historical: Catholicism arrived with Portuguese traders; Protestant missions expanded under British
    rule in Punjab and Sindh. Partition created a Muslim-majority state with large Christian minorities
    centered in Punjab. Anti-blasphemy legislation hardened under Zia-ul-Haq in the 1980s, and since then
    legal and societal pressures have increased.
