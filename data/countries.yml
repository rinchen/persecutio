    archive_od_brief: ''
    archive_od_url: https://www.opendoors.org/research-reports/country-dossiers/WWL-2025-Bahrain-Persecution-Dynamics
    state_dept_executive_summary: The constitution declares Islam to be the official religion and sharia
      the principal source for legislation. It provides for freedom of conscience, the inviolability of
      places of worship, and freedom to perform religious rites. The constitution guarantees the right
      to express and publish opinions, provided these do not infringe on the “fundamental beliefs of Islamic
      doctrine.” The law prohibits anti-Islamic publications and mandates imprisonment for “exposing the
      state’s official religion to offense and criticism.” It is a crime to mock or disdain a religious
      group. In public schools, Islamic studies, based on Sunni doctrine, are mandatory for Muslim students
      in grades one through 12. The constitution provides for women’s equality with men, but “without
      breaching the provisions” of sharia. Nongovernmental organizations (NGOs) and human rights activists
      continued to state some Shia prisoners received inadequate medical treatment. In August-September,
      more than 800 prisoners at Jau prison, many of them Shia dissidents, engaged in a hunger strike
      for improved conditions, including better medical care and the right to pray together in groups.
      Demonstrators in Manama reportedly marched in support of the strikers. Prisoners suspended the strike
      in September after press reported the government agreed to implement changes. Separately, the government
      placed the Ministry of Health in charge of prisoner care, relieving the Ministry of Interior (MOI)
      of this responsibility. In May, a lower criminal court sentenced three members of the Al Tajdeed
      Society (Shia) to one year in prison for undermining Islamic values. On December 14, the King pardoned
      the three men, who had remained free on bail while appealing their case. The government continued
      to regulate the content of sermons of both Sunni and Shia religious leaders and the collection of
      funds, including charitable donations, by religious organizations.
